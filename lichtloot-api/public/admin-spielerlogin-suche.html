<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LichtLoot SpielerLogin Suche</title>
  <style>
    :root{
      color-scheme:dark;
      --bg:#070b14;
      --panel:#101827;
      --line:#273247;
      --text:#f8fafc;
      --muted:#9ca3af;
      --gold:#facc15;
      --good:#86efac;
      --bad:#fca5a5;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      padding:34px 14px;
      background:linear-gradient(135deg,#070b14,#111827);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
    }
    main{
      width:min(1180px,100%);
      margin:0 auto;
    }
    .admin-shell{
      border:1px solid rgba(250,204,21,.35);
      border-radius:8px;
      background:rgba(16,24,39,.94);
      box-shadow:0 18px 48px rgba(0,0,0,.42);
      padding:18px;
    }
    .admin-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:14px}
    h1{font-size:22px;margin:0;color:var(--gold)}
    h2{font-size:17px;margin:0;color:var(--gold)}
    .hint{margin:6px 0 0;color:var(--muted);font-size:13px;font-weight:700}
    .admin-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;align-items:start}
    .side-stack{display:grid;gap:14px}
    .tool-card{
      border:1px solid rgba(255,255,255,.11);
      border-radius:8px;
      background:rgba(7,11,20,.58);
      padding:14px;
    }
    .tool-card header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
    .badge{font-size:11px;font-weight:900;color:var(--gold);text-transform:uppercase}
    label{display:block;margin:12px 0 6px;font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase}
    input,
    select{
      width:100%;
      padding:11px 12px;
      border-radius:6px;
      border:1px solid var(--line);
      background:#070b14;
      color:var(--text);
      font-weight:800;
    }
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row.three{grid-template-columns:1fr 1fr 1fr}
    button{
      width:100%;
      margin-top:14px;
      padding:11px 14px;
      border-radius:6px;
      border:1px solid rgba(250,204,21,.45);
      background:rgba(250,204,21,.14);
      color:var(--text);
      font-weight:900;
      cursor:pointer;
    }
    button.secondary{background:#111827;border-color:var(--line);color:var(--muted)}
    .button-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .danger{border-color:rgba(252,165,165,.5);background:rgba(239,68,68,.16)}
    .item-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;border:1px solid var(--line);border-radius:6px;padding:10px;margin-top:10px;background:#080d18}
    .item-row strong{color:var(--gold)}
    .item-row small{display:block;color:var(--muted);margin-top:4px}
    .item-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;min-width:260px}
    .item-actions input{grid-column:1 / -1}
    #result{
      margin-top:14px;
      padding:12px;
      border-radius:6px;
      border:1px solid var(--line);
      background:#080d18;
      min-height:46px;
      color:var(--muted);
      line-height:1.45;
    }
    .result-box{
      margin-top:10px;
      padding:12px;
      border-radius:6px;
      border:1px solid var(--line);
      background:#080d18;
      min-height:42px;
      color:var(--muted);
      line-height:1.45;
    }
    .pin{
      display:inline-block;
      margin-top:6px;
      padding:8px 10px;
      border-radius:6px;
      background:#111827;
      color:var(--gold);
      font-size:22px;
      font-weight:900;
      letter-spacing:.08em;
    }
    .ok{color:var(--good);font-weight:900}
    .bad{color:var(--bad);font-weight:900}
    .muted{color:var(--muted)}
    @media(max-width:900px){.admin-grid{grid-template-columns:1fr}}
    @media(max-width:700px){body{padding:14px}.admin-head,.row,.row.three,.button-row,.item-row{grid-template-columns:1fr;display:grid}.item-actions{min-width:0}}
  </style>
</head>
<body>
  <main>
    <div class="admin-shell">
      <div class="admin-head">
        <div>
          <h1>Admin-Werkzeuge</h1>
          <p class="hint">Ein Master-Code oben, darunter SpielerLogin, Passwort und Items.</p>
        </div>
        <span class="badge">Railway API</span>
      </div>

      <label for="masterCode">Master-Code</label>
      <input id="masterCode" type="password" autocomplete="current-password" placeholder="Aktueller Master-Code">

      <div class="admin-grid">
        <section class="tool-card">
          <header>
            <h2>SpielerLogin suchen</h2>
            <span class="badge">PIN</span>
          </header>
          <div class="row">
            <div>
              <label for="character">Charakter</label>
              <input id="character" value="Loujsa" autocomplete="off">
            </div>
            <div>
              <label for="server">Server</label>
              <input id="server" value="Everlook" autocomplete="off">
            </div>
          </div>
          <button type="button" onclick="lookupPlayerLogin()">SpielerLogin anzeigen</button>
          <div id="result">Master-Code eingeben und suchen.</div>
        </section>

        <div class="side-stack">
          <section class="tool-card">
            <header>
              <h2>Passwort ändern</h2>
              <span class="badge">Leitung</span>
            </header>
            <label for="newMasterCode">Neues Passwort</label>
            <input id="newMasterCode" type="password" autocomplete="new-password" placeholder="Neuer Master-Code">
            <button type="button" onclick="changeMasterCode()">Passwort ändern</button>
            <div id="passwordResult" class="result-box">Aktuellen Master-Code oben eintragen.</div>
          </section>

          <section class="tool-card">
            <header>
              <h2>Items verwalten</h2>
              <span class="badge">DB</span>
            </header>
            <div class="row">
              <div>
                <label for="itemSearch">Item suchen</label>
                <input id="itemSearch" placeholder="Itemname">
              </div>
              <div>
                <label for="itemRaid">Raid</label>
                <input id="itemRaid" placeholder="aq40, bwl, naxx ...">
              </div>
            </div>
            <button type="button" onclick="searchItems()">Items suchen</button>
            <div class="row">
              <div>
                <label for="newItemRaid">Raid</label>
                <select id="newItemRaid">
                  <option value="mc">MC</option>
                  <option value="bwl">BWL</option>
                  <option value="aq40">AQ40</option>
                  <option value="naxx">Naxx</option>
                  <option value="zg">ZG</option>
                  <option value="aq20">AQ20</option>
                  <option value="ony">Ony</option>
                </select>
              </div>
              <div>
                <label for="newItemName">Neues Item</label>
                <input id="newItemName" placeholder="Itemname">
              </div>
            </div>
            <div class="row three">
              <div>
                <label for="newItemId">ItemID</label>
                <input id="newItemId" placeholder="z. B. 18823">
              </div>
              <div>
                <label for="newItemQuality">Qualität</label>
                <select id="newItemQuality">
                  <option value="epic">epic</option>
                  <option value="rare">rare</option>
                  <option value="uncommon">uncommon</option>
                  <option value="legendary">legendary</option>
                  <option value="">leer</option>
                </select>
              </div>
              <div>
                <label for="newItemIcon">Icon</label>
                <input id="newItemIcon" placeholder="Iconname oder URL">
              </div>
            </div>
            <button type="button" onclick="createItem()">Item hinzufügen</button>
            <div id="itemResult" class="result-box">Suchen, dann Icon ändern oder Item löschen.</div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script>
    const API_URL="https://lichtloot-production.up.railway.app/api/apps-script";

    function normalize(value){
      return String(value || "").trim().toLowerCase();
    }

    function setResult(html){
      document.getElementById("result").innerHTML=html;
    }

    async function apiFetch(params){
      const query=new URLSearchParams(Object.assign({guild:"lichtloot"},params,{t:Date.now()}));
      const response=await fetch(API_URL+"?"+query.toString(),{cache:"no-store"});
      const data=await response.json().catch(()=>null);
      if(data) return data;
      if(!response.ok) throw new Error("API-Fehler "+response.status+".");
      if(!data) throw new Error("API konnte nicht gelesen werden.");
      return data;
    }

    function masterCode(){
      return document.getElementById("masterCode").value.trim();
    }

    async function lookupPlayerLogin(){
      const character=document.getElementById("character").value.trim();
      const server=document.getElementById("server").value.trim();
      const masterCode=document.getElementById("masterCode").value.trim();

      if(!character || !server || !masterCode){
        setResult('<span class="bad">Bitte Charakter, Server und Master-Code ausfüllen.</span>');
        return;
      }

      setResult("Backup wird geladen ...");

      try{
        const data=await apiFetch({
          action:"guildExportBackup",
          masterCode
        });

        if(!data || !data.success){
          setResult('<span class="bad">'+String((data && data.error) || "Backup konnte nicht geladen werden.")+'</span>');
          return;
        }

        const rows=data.playersAndCharacters || [];
        const match=rows.find(row =>
          normalize(row.character_name) === normalize(character) &&
          normalize(row.server) === normalize(server)
        );

        if(!match){
          setResult('<span class="bad">Kein Eintrag für diesen Charakter gefunden.</span>');
          return;
        }

        setResult(
          '<span class="ok">Gefunden:</span><br>'+
          '<strong>'+String(match.character_name || character)+'</strong> <span class="muted">'+String(match.server || server)+'</span><br>'+
          '<span class="pin">'+String(match.player_pin || "-")+'</span>'
        );
      }catch(error){
        setResult('<span class="bad">'+String(error.message || "Abfrage fehlgeschlagen.")+'</span>');
      }
    }

    async function changeMasterCode(){
      const current=masterCode();
      const next=document.getElementById("newMasterCode").value.trim();
      const box=document.getElementById("passwordResult");
      if(!current || !next){
        box.innerHTML='<span class="bad">Bitte aktuellen Master-Code oben und neues Passwort eingeben.</span>';
        return;
      }
      if(next.length < 6){
        box.innerHTML='<span class="bad">Das neue Passwort muss mindestens 6 Zeichen haben.</span>';
        return;
      }
      try{
        const data=await apiFetch({action:"guildSetMasterCode",masterCode:current,newMasterCode:next});
        if(!data.success){
          box.innerHTML='<span class="bad">'+String(data.error || "Passwort konnte nicht geändert werden.")+'</span>';
          return;
        }
        document.getElementById("masterCode").value=next;
        document.getElementById("newMasterCode").value="";
        box.innerHTML='<span class="ok">Passwort wurde geändert.</span>';
      }catch(error){
        box.innerHTML='<span class="bad">'+String(error.message || "Passwort konnte nicht geändert werden.")+'</span>';
      }
    }

    async function searchItems(){
      const box=document.getElementById("itemResult");
      const search=document.getElementById("itemSearch").value.trim();
      const raid=document.getElementById("itemRaid").value.trim();
      if(!masterCode()){
        box.innerHTML='<span class="bad">Bitte Master-Code eingeben.</span>';
        return;
      }
      box.textContent="Items werden geladen ...";
      try{
        const data=await apiFetch({action:"guildAdminSearchItems",masterCode:masterCode(),search,raid});
        if(!data.success){
          box.innerHTML='<span class="bad">'+String(data.error || "Items konnten nicht geladen werden.")+'</span>';
          return;
        }
        renderItems(data.items || []);
      }catch(error){
        box.innerHTML='<span class="bad">'+String(error.message || "Items konnten nicht geladen werden.")+'</span>';
      }
    }

    async function createItem(){
      const box=document.getElementById("itemResult");
      const raid=document.getElementById("newItemRaid").value.trim();
      const name=document.getElementById("newItemName").value.trim();
      const itemGameId=document.getElementById("newItemId").value.trim();
      const quality=document.getElementById("newItemQuality").value.trim();
      const iconUrl=document.getElementById("newItemIcon").value.trim();
      if(!masterCode()){
        box.innerHTML='<span class="bad">Bitte Master-Code eingeben.</span>';
        return;
      }
      if(!raid || !name){
        box.innerHTML='<span class="bad">Bitte Raid und Itemname ausfüllen.</span>';
        return;
      }
      box.textContent="Item wird gespeichert ...";
      try{
        const data=await apiFetch({action:"guildAdminCreateItem",masterCode:masterCode(),raid,name,itemGameId,quality,iconUrl});
        if(!data.success) throw new Error(data.error || "Item konnte nicht gespeichert werden.");
        document.getElementById("itemSearch").value=name;
        document.getElementById("itemRaid").value=raid;
        document.getElementById("newItemName").value="";
        document.getElementById("newItemId").value="";
        document.getElementById("newItemIcon").value="";
        await searchItems();
        box.insertAdjacentHTML("afterbegin",'<div class="ok">Item wurde gespeichert.</div>');
      }catch(error){
        box.innerHTML='<span class="bad">'+escapeHtml(error.message || "Item konnte nicht gespeichert werden.")+'</span>';
      }
    }

    function renderItems(items){
      const box=document.getElementById("itemResult");
      if(!items.length){
        box.innerHTML='<span class="bad">Keine Items gefunden.</span>';
        return;
      }
      box.innerHTML=items.map(item=>{
        const id=String(item.id || "");
        const icon=String(item.icon_url || "");
        return `
          <div class="item-row">
            <div>
              <strong>${escapeHtml(item.name || "-")}</strong>
              <small>${escapeHtml(item.raid_type || "")} · ItemID: ${escapeHtml(item.item_id || "-")} · Prios: ${Number(item.prio_count || 0)} · P0+: ${Number(item.p0plus_count || 0)}</small>
              ${icon ? `<small>Icon: ${escapeHtml(icon)}</small>` : ""}
            </div>
            <div class="item-actions">
              <input id="icon_${id}" placeholder="Icon-URL oder Iconname" value="${escapeAttr(icon)}">
              <button type="button" onclick="updateItemIcon('${escapeAttr(id)}')">Icon ändern</button>
              <button class="danger" type="button" onclick="deleteItem('${escapeAttr(id)}','${escapeAttr(item.name || "")}')">Löschen</button>
            </div>
          </div>
        `;
      }).join("");
    }

    async function updateItemIcon(id){
      const icon=document.getElementById("icon_"+id).value.trim();
      const box=document.getElementById("itemResult");
      try{
        const data=await apiFetch({action:"guildAdminUpdateItem",masterCode:masterCode(),id,iconUrl:icon});
        if(!data.success) throw new Error(data.error || "Icon konnte nicht geändert werden.");
        await searchItems();
      }catch(error){
        box.insertAdjacentHTML("afterbegin",'<div class="bad">'+escapeHtml(error.message || "Icon konnte nicht geändert werden.")+'</div>');
      }
    }

    async function deleteItem(id,name){
      const ok=confirm(`Item "${name}" wirklich aus der Datenbank löschen? Verknüpfte Prios/P0+ verlieren dieses Item.`);
      if(!ok) return;
      const typed=prompt("Zum Löschen bitte Itemname eingeben:");
      if(normalize(typed) !== normalize(name)) return;
      const box=document.getElementById("itemResult");
      try{
        const data=await apiFetch({action:"guildAdminDeleteItem",masterCode:masterCode(),id});
        if(!data.success) throw new Error(data.error || "Item konnte nicht gelöscht werden.");
        await searchItems();
      }catch(error){
        box.insertAdjacentHTML("afterbegin",'<div class="bad">'+escapeHtml(error.message || "Item konnte nicht gelöscht werden.")+'</div>');
      }
    }

    function escapeHtml(value){
      return String(value || "").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]));
    }
    function escapeAttr(value){ return escapeHtml(value); }
  </script>
</body>
</html>
