<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lichtbringer – Prio 0 Naxxramas</title>

  <style>
    :root{
      --gold:#facc15;
      --panel:rgba(12,18,32,.82);
      --panel-strong:rgba(15,23,42,.92);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --line:rgba(255,255,255,.11);
      --shadow:0 22px 55px rgba(0,0,0,.48);
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(8,17,31,.78), rgba(8,17,31,.92)),
        url('./images/back.jpeg');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:fixed;
    }

    .page{min-height:100vh;backdrop-filter:blur(3px);padding:28px 24px 70px;}

    .topbar{
      width:min(1500px,100%);
      margin:0 auto 28px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .back{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:46px;
      padding:0 18px;
      border-radius:999px;
      color:var(--gold);
      text-decoration:none;
      font-weight:900;
      background:rgba(12,18,32,.78);
      border:1px solid rgba(250,204,21,.25);
      box-shadow:0 10px 28px rgba(0,0,0,.35);
    }

    .status-pill{
      padding:12px 16px;
      border-radius:999px;
      color:#dbeafe;
      font-size:13px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      background:rgba(12,18,32,.78);
      border:1px solid rgba(96,165,250,.22);
      box-shadow:0 10px 28px rgba(0,0,0,.28);
    }

    .hero{
      width:min(1500px,100%);
      margin:0 auto 34px;
      position:relative;
      overflow:visible;
      min-height:330px;
      border-radius:34px;
      border:1px solid rgba(250,204,21,.22);
      background:
        linear-gradient(120deg, rgba(8,17,31,.88), rgba(67,56,202,.34)),
        url('./images/naxx.jpg');
      background-size:cover;
      background-position:center;
      box-shadow:var(--shadow);
      display:flex;
      align-items:flex-end;
    }

    .hero::after{
      content:'';
      position:absolute;
      inset:0;
      border-radius:34px;
      background:
        radial-gradient(circle at 15% 20%, rgba(250,204,21,.22), transparent 30%),
        linear-gradient(to top, rgba(8,17,31,.98), rgba(8,17,31,.15));
      pointer-events:none;
    }

    .hero-content{
      position:relative;
      z-index:2;
      padding:38px;
      width:100%;
      display:flex;
      align-items:flex-end;
      gap:24px;
    }

    .hero-icon{
      width:150px;
      height:150px;
      flex:0 0 auto;
      border-radius:50%;
      object-fit:cover;
      border:4px solid var(--gold);
      background:#111827;
      box-shadow:0 0 35px rgba(250,204,21,.38), 0 18px 45px rgba(0,0,0,.55);
    }

    .hero-text h1{
      font-size:clamp(36px,5vw,70px);
      line-height:1;
      font-weight:950;
      text-shadow:0 0 24px rgba(250,204,21,.28);
    }

    .hero-tags{margin-top:18px;display:flex;flex-wrap:wrap;gap:10px;}

    .tag{
      padding:8px 12px;
      border-radius:999px;
      color:#f8fafc;
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      background:rgba(250,204,21,.13);
      border:1px solid rgba(250,204,21,.22);
    }

    .hero-search{position:relative;margin-top:20px;width:min(680px,100%);}

    #globalSearch{
      width:100%;
      padding:15px 18px;
      border-radius:18px;
      border:1px solid rgba(250,204,21,.34);
      background:rgba(8,17,31,.88);
      color:var(--text);
      font-size:16px;
      font-weight:850;
      box-shadow:0 12px 28px rgba(0,0,0,.34);
    }

    .search-results{
      display:none;
      position:absolute;
      left:0;
      right:0;
      top:calc(100% + 10px);
      z-index:30;
      max-height:360px;
      overflow:auto;
      padding:10px;
      border-radius:18px;
      background:rgba(12,18,32,.98);
      border:1px solid rgba(255,255,255,.13);
      box-shadow:0 22px 45px rgba(0,0,0,.58);
    }

    .search-result-btn{
      width:100%;
      display:block;
      margin:6px 0;
      padding:12px 14px;
      border:0;
      border-radius:14px;
      cursor:pointer;
      text-align:left;
      color:var(--text);
      background:rgba(255,255,255,.06);
      font-weight:950;
    }

    .search-small{
      display:block;
      margin-top:4px;
      color:#cbd5e1;
      font-size:12px;
      font-weight:750;
    }

    .layout{
      width:min(1500px,100%);
      margin:auto;
      display:grid;
      grid-template-columns:260px minmax(360px,1fr) minmax(400px,1.1fr);
      gap:24px;
      align-items:start;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }

    .panel-head{padding:20px 20px 0;}

    .panel-title{
      color:var(--gold);
      font-size:14px;
      letter-spacing:.15em;
      text-transform:uppercase;
      font-weight:950;
    }

    .slots{padding:18px;display:grid;gap:10px;}

    .slot-btn{
      width:100%;
      padding:14px 15px;
      border:0;
      cursor:pointer;
      border-radius:16px;
      color:var(--text);
      text-align:left;
      font-size:15px;
      font-weight:900;
      background:linear-gradient(135deg, rgba(37,56,91,.98), rgba(16,25,45,.98));
      border-left:5px solid rgba(250,204,21,.58);
    }

    .slot-btn.active,
    .slot-btn:hover{
      transform:translateX(5px);
      box-shadow:0 0 0 3px rgba(250,204,21,.20), 0 12px 28px rgba(0,0,0,.32);
    }

    .items-panel{padding:20px;}

    .items-title-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:18px;
    }

    .item-count{
      color:#dbeafe;
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.10em;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(96,165,250,.12);
      border:1px solid rgba(96,165,250,.18);
      white-space:nowrap;
    }

    .items{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:14px;
    }

    .item-card{
      min-height:92px;
      padding:18px;
      border:0;
      cursor:pointer;
      border-radius:22px;
      color:var(--text);
      text-align:left;
      background:
        radial-gradient(circle at top left, rgba(250,204,21,.13), transparent 35%),
        linear-gradient(180deg, rgba(37,56,91,.98), rgba(16,25,45,.98));
      border:1px solid rgba(255,255,255,.11);
      box-shadow:0 12px 28px rgba(0,0,0,.28);
      position:relative;
    }

    .item-card::before{
      content:'✦';
      color:var(--gold);
      font-size:18px;
      position:absolute;
      right:16px;
      top:14px;
    }

    .item-card.active,
    .item-card:hover{
      transform:translateY(-4px);
      border-color:rgba(250,204,21,.42);
      box-shadow:0 0 0 2px rgba(250,204,21,.18), 0 18px 38px rgba(0,0,0,.42);
    }

    .item-name{
      display:block;
      padding-right:24px;
      font-size:17px;
      font-weight:950;
      line-height:1.28;
    }

    .details{
      padding:24px;
      min-height:610px;
      background:
        radial-gradient(circle at top left, rgba(250,204,21,.10), transparent 30%),
        var(--panel-strong);
    }

    .details-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
      padding-bottom:18px;
      margin-bottom:18px;
      border-bottom:1px solid rgba(250,204,21,.18);
    }

    .details h2{
      color:var(--gold);
      font-size:clamp(25px,3vw,38px);
      line-height:1.12;
      font-weight:950;
    }

    .wowhead-link{
      display:inline-flex;
      padding:10px 14px;
      border-radius:999px;
      color:var(--gold);
      text-decoration:none;
      border:1px solid rgba(250,204,21,.35);
      background:rgba(250,204,21,.08);
      font-size:13px;
      font-weight:950;
    }

    table{
      width:100%;
      border-collapse:collapse;
      border-radius:18px;
      overflow:hidden;
      background:rgba(255,255,255,.035);
    }

    th{
      padding:14px 13px;
      background:linear-gradient(90deg, rgba(250,204,21,.28), rgba(96,165,250,.18));
      color:var(--text);
      text-align:left;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    td{
      padding:15px 13px;
      border-bottom:1px solid rgba(255,255,255,.09);
      color:var(--muted);
      font-weight:800;
    }

    .prio-badge{
      display:inline-flex;
      min-width:42px;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      color:var(--gold);
      background:rgba(250,204,21,.10);
      border:1px solid rgba(250,204,21,.24);
      font-weight:950;
    }

    .empty{
      padding:20px;
      border:1px dashed rgba(250,204,21,.32);
      border-radius:20px;
      color:var(--muted);
      background:rgba(250,204,21,.055);
      line-height:1.55;
      font-weight:800;
    }

    @media(max-width:1180px){
      .layout{grid-template-columns:1fr;}
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="topbar">
      <a class="back" href="index.html">← Zur Startseite</a>
      <div class="status-pill">Naxxramas · Prio 0 Plus</div>
    </div>

    <section class="hero">
      <div class="hero-content">
        <img class="hero-icon" src="./images/naxx.jpg" alt="Naxx Icon" />

        <div class="hero-text">
          <h1>Naxxramas</h1>

          <div class="hero-tags">
            <span class="tag">NAXX</span>
            <span class="tag">Sheet Sync</span>
            <span class="tag">Prio 0 Plus</span>
          </div>

          <div class="hero-search">
            <input id="globalSearch" type="text" placeholder="Item oder Spieler suchen ..." autocomplete="off" />
            <div id="searchResults" class="search-results"></div>
          </div>
        </div>
      </div>
    </section>

    <main class="layout">
      <section class="panel slots" id="slotButtons"></section>

      <section class="panel items-panel">
        <div class="items-title-row">
          <h2 class="panel-title" id="itemsTitle">Items</h2>
          <div class="item-count" id="itemCount">0 Items</div>
        </div>
        <div class="items" id="itemButtons"></div>
      </section>

      <section class="panel details">
        <div class="details-header">
          <h2 id="itemTitle">Item auswählen</h2>
          <a id="wowheadLink" class="wowhead-link" href="#" target="_blank" rel="noopener">Wowhead</a>
        </div>
        <div id="itemContent"></div>
      </section>
    </main>

  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1t7P5T6t7OCWRY3kGCWIYHWDNXgXmdvpAM1xIj2U4TRw/export?format=csv&gid=1000361718";
    const CURRENT_RAID = "NAXX";

    const preferredSlotOrder = [
      "Kopf", "Hals", "Schulter", "Rücken", "Brust", "Handgelenke", "Hände",
      "Taille", "Beine", "Füße", "Finger", "Schmuck", "Schmuckstück", "Waffe", "Distanzwaffe"
    ];

    const wowheadLinks = {};
    let rowsFromSheet = [];
    let selectedSlot = "";
    let selectedItem = "";

    function normalizeHeader(text){
      return String(text || "")
        .toLowerCase()
        .replace(/ä/g,"ae")
        .replace(/ö/g,"oe")
        .replace(/ü/g,"ue")
        .replace(/ß/g,"ss")
        .replace(/\s+/g,"")
        .trim();
    }

    function normalizeSearch(text){
      return String(text || "")
        .toLowerCase()
        .replace(/ä/g,"ae")
        .replace(/ö/g,"oe")
        .replace(/ü/g,"ue")
        .replace(/ß/g,"ss")
        .trim();
    }

    function getField(row,names){
      for(const name of names){
        if(row[name] !== undefined) return row[name];
      }
      return "";
    }

    function escapeHTML(value){
      return String(value || "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    async function loadRowsFromSheet(){
      try{
        const response = await fetch(SHEET_CSV_URL + "&cachebust=" + Date.now());
        const csvText = await response.text();
        const table = parseCSV(csvText);

        if(!table.length) return;

        const headers = table.shift().map(header => normalizeHeader(header));

        rowsFromSheet = table.map(row => {
          const obj = {};
          headers.forEach((header,index) => {
            obj[header] = (row[index] || "").trim();
          });
          return obj;
        }).filter(row => {
          const raid = getField(row,["raid"]);
          const item = getField(row,["item"]);
          const slot = getField(row,["slot","platz","ausruestungsslot"]);
          return item && slot && (!raid || raid.toLowerCase() === CURRENT_RAID.toLowerCase());
        });

        const slots = getSlots();
        selectedSlot = slots[0] || "";
        selectedItem = selectedSlot ? getItemsBySlot(selectedSlot)[0] : "";
      }catch(error){
        console.error("Fehler beim Laden der Google-Sheet-Daten:", error);
      }
    }

    function getSlots(){
      const slots = [...new Set(rowsFromSheet.map(row => getField(row,["slot","platz","ausruestungsslot"])))].filter(Boolean);

      return slots.sort((a,b) => {
        const aIndex = preferredSlotOrder.indexOf(a);
        const bIndex = preferredSlotOrder.indexOf(b);
        if(aIndex === -1 && bIndex === -1) return a.localeCompare(b);
        if(aIndex === -1) return 1;
        if(bIndex === -1) return -1;
        return aIndex - bIndex;
      });
    }

    function getItemsBySlot(slot){
      return [...new Set(
        rowsFromSheet
          .filter(row => getField(row,["slot","platz","ausruestungsslot"]) === slot)
          .map(row => getField(row,["item"]))
          .filter(Boolean)
      )];
    }

    function getP0Entries(item){
      return rowsFromSheet
        .filter(row => getField(row,["item"]) === item)
        .map(row => ({
          spieler:getField(row,["spieler","player","name"]),
          anzahl:getField(row,["anzahl","p0","prio","count"]) || "1"
        }))
        .filter(entry => entry.spieler);
    }

    function parseCSV(text){
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let insideQuotes = false;
      const delimiter = detectDelimiter(text);

      for(let i=0;i<text.length;i++){
        const char = text[i];
        const nextChar = text[i+1];

        if(char === '"' && insideQuotes && nextChar === '"'){
          currentValue += '"';
          i++;
        }else if(char === '"'){
          insideQuotes = !insideQuotes;
        }else if(char === delimiter && !insideQuotes){
          currentRow.push(currentValue);
          currentValue = "";
        }else if((char === "\n" || char === "\r") && !insideQuotes){
          if(currentValue || currentRow.length){
            currentRow.push(currentValue);
            rows.push(currentRow);
          }
          currentRow = [];
          currentValue = "";
          if(char === "\r" && nextChar === "\n") i++;
        }else{
          currentValue += char;
        }
      }

      if(currentValue || currentRow.length){
        currentRow.push(currentValue);
        rows.push(currentRow);
      }

      return rows;
    }

    function detectDelimiter(text){
      const firstLine = text.split(/\r?\n/)[0] || "";
      const commas = (firstLine.match(/,/g) || []).length;
      const semicolons = (firstLine.match(/;/g) || []).length;
      return semicolons > commas ? ";" : ",";
    }

    function renderSlots(){
      const wrapper = document.getElementById("slotButtons");
      const slots = getSlots();

      if(!slots.length){
        wrapper.innerHTML = '<div class="panel-head"><h2 class="panel-title">Slot wählen</h2></div><div class="slots"><div class="empty">Keine Naxx-Daten im Sheet gefunden.</div></div>';
        return;
      }

      wrapper.innerHTML = '<div class="panel-head"><h2 class="panel-title">Slot wählen</h2></div><div class="slots">' + slots.map(slot => `
        <button class="slot-btn ${slot === selectedSlot ? "active" : ""}" onclick="selectSlot('${escapeHTML(slot)}')">${escapeHTML(slot)}</button>
      `).join("") + '</div>';
    }

    function renderItems(){
      const items = selectedSlot ? getItemsBySlot(selectedSlot) : [];
      document.getElementById("itemsTitle").textContent = selectedSlot ? selectedSlot + " · Naxx Items" : "Naxx Items";
      document.getElementById("itemCount").textContent = items.length === 1 ? "1 Item" : items.length + " Items";

      const wrapper = document.getElementById("itemButtons");

      if(!items.length){
        wrapper.innerHTML = '<div class="empty">Für diesen Slot gibt es aktuell keine Items im Sheet.</div>';
        return;
      }

      wrapper.innerHTML = items.map(item => `
        <button class="item-card ${item === selectedItem ? "active" : ""}" onclick="selectItemByValue(this.dataset.item)" data-item="${escapeHTML(item)}">
          <span class="item-name">${escapeHTML(item)}</span>
        </button>
      `).join("");
    }

    function renderDetails(){
      const title = document.getElementById("itemTitle");
      const content = document.getElementById("itemContent");
      const link = document.getElementById("wowheadLink");

      if(!selectedItem){
        title.textContent = "Item auswählen";
        content.innerHTML = '<div class="empty">Bitte wähle links einen Slot und anschließend ein Item aus.</div>';
        link.style.display = "none";
        return;
      }

      title.textContent = selectedItem;

      if(wowheadLinks[selectedItem]){
        link.href = wowheadLinks[selectedItem];
        link.style.display = "inline-flex";
      }else{
        link.style.display = "none";
      }

      const entries = getP0Entries(selectedItem);

      if(!entries.length){
        content.innerHTML = '<div class="empty">Für dieses Item ist aktuell noch kein Spieler mit P0 eingetragen.</div>';
        return;
      }

      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Spieler</th>
              <th>P0+</th>
            </tr>
          </thead>
          <tbody>
            ${entries.map(entry => `
              <tr>
                <td>${escapeHTML(entry.spieler)}</td>
                <td><span class="prio-badge">${escapeHTML(entry.anzahl)}x</span></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function selectSlot(slot){
      selectedSlot = slot;
      selectedItem = getItemsBySlot(slot)[0] || "";
      renderAll();
    }

    function selectItem(itemName){
      selectedItem = itemName;
      renderAll();
    }

    function selectItemByValue(itemName){
      selectItem(itemName);
    }

    function findSlotByItem(item){
      const row = rowsFromSheet.find(row => getField(row,["item"]) === item);
      return row ? getField(row,["slot","platz","ausruestungsslot"]) : "";
    }

    function jumpToItem(item){
      const slot = findSlotByItem(item);
      if(!slot) return;

      selectedSlot = slot;
      selectedItem = item;
      renderAll();
      closeSearchResults();

      const details = document.querySelector(".details");
      if(details){
        details.scrollIntoView({ behavior:"smooth", block:"start" });
      }
    }

    function getSearchEntries(){
      const itemEntries = [...new Set(
        rowsFromSheet
          .map(row => getField(row,["item"]))
          .filter(Boolean)
      )].map(item => ({
        label:item,
        item:item,
        meta:"Item auswählen"
      }));

      const playerEntries = rowsFromSheet
        .map(row => ({
          spieler:getField(row,["spieler","player","name"]),
          item:getField(row,["item"]),
          slot:getField(row,["slot","platz","ausruestungsslot"]),
          anzahl:getField(row,["anzahl","p0","prio","count"]) || "1"
        }))
        .filter(entry => entry.spieler && entry.item)
        .map(entry => ({
          label:entry.spieler + " → " + entry.item,
          item:entry.item,
          meta:[entry.slot, "P0+ " + entry.anzahl + "x"].filter(Boolean).join(" · ")
        }));

      return [...itemEntries, ...playerEntries];
    }

    function renderGlobalSearch(){
      const input = document.getElementById("globalSearch");
      const results = document.getElementById("searchResults");
      if(!input || !results) return;

      const query = normalizeSearch(input.value);

      if(!query){
        closeSearchResults();
        return;
      }

      const matches = getSearchEntries()
        .filter(entry => normalizeSearch(entry.label + " " + entry.meta).includes(query))
        .slice(0,18);

      if(!matches.length){
        results.innerHTML = '<div class="empty">Keine Treffer gefunden.</div>';
        results.style.display = "block";
        return;
      }

      results.innerHTML = matches.map((entry,index) => `
        <button class="search-result-btn" type="button">
          ${escapeHTML(entry.label)}
          <span class="search-small">${escapeHTML(entry.meta)}</span>
        </button>
      `).join("");

      results.querySelectorAll(".search-result-btn").forEach((button,index) => {
        button.addEventListener("click", () => {
          jumpToItem(matches[index].item);
        });
      });

      results.style.display = "block";
    }

    function closeSearchResults(){
      const results = document.getElementById("searchResults");
      if(results){
        results.style.display = "none";
        results.innerHTML = "";
      }
    }

    function setupGlobalSearch(){
      const input = document.getElementById("globalSearch");
      if(!input) return;

      input.addEventListener("input", renderGlobalSearch);

      document.addEventListener("click", event => {
        const searchBox = document.querySelector(".hero-search");
        if(searchBox && !searchBox.contains(event.target)){
          closeSearchResults();
        }
      });
    }

    function renderAll(){
      renderSlots();
      renderItems();
      renderDetails();
    }

    loadRowsFromSheet().then(() => {
      renderAll();
      setupGlobalSearch();
    });
  </script>
</body>
</html>
