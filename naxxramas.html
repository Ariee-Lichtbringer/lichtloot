<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lichtbringer – Prio 0 Naxxramas</title>
  <style>
    :root {
      --bg: #08111f;
      --bg2: #111c33;
      --panel: rgba(20, 32, 55, 0.92);
      --panel-light: rgba(35, 53, 86, 0.94);
      --gold: #facc15;
      --gold-soft: rgba(250, 204, 21, 0.18);
      --blue: #60a5fa;
      --blue-soft: rgba(96, 165, 250, 0.18);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(255, 255, 255, 0.13);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(250, 204, 21, 0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.22), transparent 32%),
        linear-gradient(135deg, var(--bg), var(--bg2));
    }

    header {
      position: relative;
      min-height: 110px;
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
      padding: 18px 24px;
      background:
        linear-gradient(90deg, rgba(8, 17, 31, 0.98), rgba(30, 64, 175, 0.88), rgba(8, 17, 31, 0.98));
      border-bottom: 1px solid rgba(250, 204, 21, 0.32);
      box-shadow: var(--shadow);
    }

    .back {
      width: 48px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: var(--gold);
      text-decoration: none;
      font-size: 34px;
      border: 1px solid rgba(250, 204, 21, 0.35);
      background: rgba(255, 255, 255, 0.04);
    }

    .headline { text-align: center; }

    .headline h1 {
      margin: 0;
      font-size: clamp(25px, 4vw, 42px);
      font-weight: 900;
      letter-spacing: 0.3px;
      text-shadow: 0 0 18px rgba(250, 204, 21, 0.25);
    }

    .headline p {
      margin: 8px 0 0;
      color: #dbeafe;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    main {
      width: min(1580px, calc(100% - 32px));
      margin: 28px auto 52px;
      display: grid;
      grid-template-columns: 235px 1fr 1.05fr;
      gap: 24px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .classes {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .panel-title {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .class-btn,
    .item-btn {
      border: 0;
      cursor: pointer;
      font-weight: 800;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .class-btn {
      padding: 13px 14px;
      border-radius: 13px;
      color: #111827;
      font-size: 16px;
      text-align: left;
      box-shadow: 0 8px 18px rgba(0,0,0,.22);
    }

    .class-btn:hover,
    .class-btn.active {
      transform: translateX(5px);
      box-shadow: 0 0 0 3px rgba(250,204,21,.25), 0 10px 22px rgba(0,0,0,.28);
    }

    .warrior { background: #c79c6e; }
    .hunter { background: #abd473; }
    .priest { background: #ffffff; }
    .warlock { background: #9482c9; }
    .paladin { background: #f58cba; }
    .rogue { background: #fff569; }
    .mage { background: #69ccf0; }
    .druid { background: #ff7d0a; }

    .items-panel { padding: 18px; }

    .items {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
    }

    .item-btn {
      min-height: 60px;
      padding: 13px 16px;
      border-radius: 16px;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(37, 56, 91, 0.98), rgba(22, 34, 58, 0.98));
      border: 1px solid rgba(255,255,255,.11);
      border-left: 5px solid var(--gold);
      text-align: left;
      line-height: 1.25;
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }

    .item-btn::before {
      content: "✦";
      color: var(--gold);
      margin-right: 8px;
    }

    .item-btn:hover,
    .item-btn.active {
      background:
        linear-gradient(180deg, rgba(59, 86, 135, 0.98), rgba(30, 47, 79, 0.98));
      box-shadow: 0 0 0 2px rgba(250,204,21,.28), 0 13px 28px rgba(0,0,0,.30);
      transform: translateY(-2px);
    }

    .details {
      padding: 22px;
      min-height: 640px;
      background:
        linear-gradient(180deg, rgba(30,41,59,.96), rgba(15,23,42,.97));
    }

    .details-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(250,204,21,.18);
    }

    .details h2 {
      margin: 0;
      color: var(--gold);
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.15;
    }

    .wowhead-link {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid rgba(250,204,21,.35);
      background: rgba(250,204,21,.08);
      font-size: 14px;
      font-weight: 800;
    }

    .wowhead-link:hover { background: rgba(250,204,21,.16); }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      background: rgba(255,255,255,.035);
    }

    th {
      padding: 12px 11px;
      background: linear-gradient(90deg, rgba(250,204,21,.28), rgba(96,165,250,.18));
      color: var(--text);
      text-align: left;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    td {
      padding: 13px 11px;
      border-bottom: 1px solid rgba(255,255,255,.09);
      color: var(--muted);
      font-weight: 750;
    }

    tr:last-child td { border-bottom: 0; }

    .empty {
      padding: 18px;
      border: 1px dashed rgba(250,204,21,.32);
      border-radius: 16px;
      color: var(--muted);
      background: rgba(250,204,21,.055);
      line-height: 1.5;
      font-weight: 700;
    }

    .hint {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(96,165,250,.08);
      color: #dbeafe;
      font-size: 13px;
      line-height: 1.45;
      border: 1px solid rgba(96,165,250,.18);
    }

    @media (max-width: 1120px) {
      main { grid-template-columns: 1fr; }
      .items { grid-template-columns: 1fr; }
      .details { min-height: auto; }
    }

    @media (max-width: 620px) {
      header {
        grid-template-columns: 52px 1fr 20px;
        padding: 14px;
      }

      .back { width: 42px; height: 42px; }

      main {
        width: min(100% - 20px, 1580px);
        gap: 16px;
      }

      .details-header { display: block; }
      .wowhead-link { margin-top: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="index.html">←</a>
    <div class="headline">
      <h1>✨ Lichtbringer · Prio 0 Naxxramas</h1>
      <p>Lootübersicht der Gilde Lichtbringer</p>
    </div>
    <div></div>
  </header>

  <main>
    <section class="panel classes" id="classButtons" aria-label="Klassen">
      <h2 class="panel-title">Klasse wählen</h2>
    </section>

    <section class="panel items-panel" aria-label="Items">
      <h2 class="panel-title" id="itemsTitle">Items</h2>
      <div class="items" id="itemButtons"></div>
    </section>

    <section class="panel details" aria-label="P0-Liste">
      <div class="details-header">
        <h2 id="itemTitle">Item auswählen</h2>
        <a id="wowheadLink" class="wowhead-link" href="#" target="_blank" rel="noopener">Wowhead</a>
      </div>
      <div id="itemContent"></div>
      <div class="hint">Die Itemlisten sind fest hinterlegt. Die P0-Spieler werden automatisch aus dem Google Sheet geladen. Im Sheet muss bei Raid <strong>NAXX</strong> stehen.</div>
    </section>
  </main>

  <script>
    const classes = [
      { key: "Krieger", css: "warrior" },
      { key: "Jäger", css: "hunter" },
      { key: "Priester", css: "priest" },
      { key: "Hexenmeister", css: "warlock" },
      { key: "Paladin", css: "paladin" },
      { key: "Schurke", css: "rogue" },
      { key: "Magier", css: "mage" },
      { key: "Druide", css: "druid" }
    ];

    const itemsByClass = {
      "Krieger": [
        "Macht des Erlösers",
        "Gressil, Klinge des Verderbens",
        "Might of Menethil",
        "Band des unnatürlichen Kräftens",
        "Kiss of the Spider",
        "Slayer's Crest",
        "The Hungering Cold",
        "Iblis, Klinge der gefallenen Seraphim",
        "Schild des verurteilten Seelenheilers",
        "Wraith Blade"
      ],
      "Jäger": [
        "Nerubian Slavemaker",
        "Kiss of the Spider",
        "Slayer's Crest",
        "Band des unnatürlichen Kräftens",
        "The Eye of Nerub",
        "Gressil, Klinge des Verderbens",
        "Iblis, Klinge der gefallenen Seraphim",
        "Macht des Erlösers"
      ],
      "Priester": [
        "Sapphiron's Right Eye",
        "The Phylactery of Kel'Thuzad",
        "Wraith Blade",
        "Gem of Trapped Innocents",
        "Warmth of Forgiveness",
        "Cloak of the Necropolis",
        "Maexxna's Fang",
        "Leggings of Polarity"
      ],
      "Hexenmeister": [
        "The Phylactery of Kel'Thuzad",
        "Wraith Blade",
        "Gem of Trapped Innocents",
        "Cloak of the Necropolis",
        "Leggings of Polarity",
        "Sapphiron's Left Eye",
        "Soulseeker",
        "Doomfinger"
      ],
      "Paladin": [
        "Sapphiron's Right Eye",
        "Warmth of Forgiveness",
        "Wraith Blade",
        "Gem of Trapped Innocents",
        "Cloak of the Necropolis",
        "Might of Menethil",
        "The Hungering Cold",
        "Schild des verurteilten Seelenheilers"
      ],
      "Schurke": [
        "Gressil, Klinge des Verderbens",
        "The Hungering Cold",
        "Iblis, Klinge der gefallenen Seraphim",
        "Kiss of the Spider",
        "Slayer's Crest",
        "Band des unnatürlichen Kräftens",
        "Macht des Erlösers",
        "Maexxna's Fang"
      ],
      "Magier": [
        "The Phylactery of Kel'Thuzad",
        "Wraith Blade",
        "Gem of Trapped Innocents",
        "Cloak of the Necropolis",
        "Leggings of Polarity",
        "Sapphiron's Left Eye",
        "Soulseeker",
        "Doomfinger"
      ],
      "Druide": [
        "Sapphiron's Right Eye",
        "The Phylactery of Kel'Thuzad",
        "Wraith Blade",
        "Gem of Trapped Innocents",
        "Warmth of Forgiveness",
        "Cloak of the Necropolis",
        "Leggings of Polarity",
        "Maexxna's Fang"
      ]
    };

    const wowheadLinks = {
      "Gressil, Klinge des Verderbens": "https://www.wowhead.com/classic/item=23054/gressil-dawn-of-ruin",
      "Might of Menethil": "https://www.wowhead.com/classic/item=22798/might-of-menethil",
      "Kiss of the Spider": "https://www.wowhead.com/classic/item=22954/kiss-of-the-spider",
      "Slayer's Crest": "https://www.wowhead.com/classic/item=23041/slayers-crest",
      "The Hungering Cold": "https://www.wowhead.com/classic/item=23577/the-hungering-cold",
      "Iblis, Klinge der gefallenen Seraphim": "https://www.wowhead.com/classic/item=23014/iblis-blade-of-the-fallen-seraph",
      "Wraith Blade": "https://www.wowhead.com/classic/item=22807/wraith-blade",
      "Nerubian Slavemaker": "https://www.wowhead.com/classic/item=22812/nerubian-slavemaker",
      "The Eye of Nerub": "https://www.wowhead.com/classic/item=23039/the-eye-of-nerub",
      "The Phylactery of Kel'Thuzad": "https://www.wowhead.com/classic/item=23046/the-restrained-essence-of-sapphiron",
      "Gem of Trapped Innocents": "https://www.wowhead.com/classic/item=23057/gem-of-trapped-innocents",
      "Warmth of Forgiveness": "https://www.wowhead.com/classic/item=23027/warmth-of-forgiveness",
      "Cloak of the Necropolis": "https://www.wowhead.com/classic/item=23050/cloak-of-the-necropolis",
      "Maexxna's Fang": "https://www.wowhead.com/classic/item=22804/maexxnas-fang",
      "Leggings of Polarity": "https://www.wowhead.com/classic/item=23070/leggings-of-polarity",
      "Sapphiron's Left Eye": "https://www.wowhead.com/classic/item=23049/sapphirons-left-eye",
      "Sapphiron's Right Eye": "https://www.wowhead.com/classic/item=23048/sapphirons-right-eye",
      "Soulseeker": "https://www.wowhead.com/classic/item=22799/soulseeker",
      "Doomfinger": "https://www.wowhead.com/classic/item=22821/doomsfinger",
      "Band des unnatürlichen Kräftens": "https://www.wowhead.com/classic/item=23038/band-of-unnatural-forces",
      "Macht des Erlösers": "https://www.wowhead.com/classic/item=23053/stormrage-signet-ring",
      "Schild des verurteilten Seelenheilers": "https://www.wowhead.com/classic/item=23043/the-face-of-death"
    };

    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1t7P5T6t7OCWRY3kGCWIYHWDNXgXmdvpAM1xIj2U4TRw/export?format=csv&gid=0";

    let p0Data = {};

    async function loadP0DataFromSheet() {
      try {
        const response = await fetch(SHEET_CSV_URL);
        const csvText = await response.text();
        const rows = parseCSV(csvText);

        if (!rows.length) return;

        const header = rows.shift().map(h => h.trim().toLowerCase());

        const raidIndex = header.indexOf("raid");
        const klasseIndex = header.indexOf("klasse");
        const itemIndex = header.indexOf("item");
        const spielerIndex = header.indexOf("spieler");
        const anzahlIndex = header.indexOf("anzahl");

        rows.forEach(row => {
          const raid = row[raidIndex]?.trim();
          const klasse = row[klasseIndex]?.trim();
          const item = row[itemIndex]?.trim();
          const spieler = row[spielerIndex]?.trim();
          const anzahl = row[anzahlIndex]?.trim() || "1";

          if (!raid || !klasse || !item || !spieler) return;
          if (raid.toLowerCase() !== "naxx") return;

          if (!p0Data[item]) p0Data[item] = [];
          p0Data[item].push({ spieler, klasse, anzahl });
        });
      } catch (error) {
        console.error("Fehler beim Laden der Google-Sheet-Daten:", error);
      }
    }

    function parseCSV(text) {
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          currentValue += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          currentRow.push(currentValue);
          currentValue = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (currentValue || currentRow.length) {
            currentRow.push(currentValue);
            rows.push(currentRow);
          }

          currentRow = [];
          currentValue = "";

          if (char === "\r" && nextChar === "\n") i++;
        } else {
          currentValue += char;
        }
      }

      if (currentValue || currentRow.length) {
        currentRow.push(currentValue);
        rows.push(currentRow);
      }

      return rows;
    }

    let selectedClass = "Krieger";
    let selectedItem = itemsByClass[selectedClass][0];

    function renderClasses() {
      const wrapper = document.getElementById("classButtons");
      wrapper.innerHTML = '<h2 class="panel-title">Klasse wählen</h2>' + classes.map(cls => `
        <button class="class-btn ${cls.css} ${cls.key === selectedClass ? "active" : ""}" onclick="selectClass('${cls.key}')">
          ${cls.key}
        </button>
      `).join("");
    }

    function renderItems() {
      document.getElementById("itemsTitle").textContent = selectedClass + " · Naxx Items";
      const wrapper = document.getElementById("itemButtons");
      const items = itemsByClass[selectedClass] || [];

      wrapper.innerHTML = items.map(item => `
        <button class="item-btn ${item === selectedItem ? "active" : ""}" onclick="selectItem(\`${item}\`)">
          ${item}
        </button>
      `).join("");
    }

    function renderDetails() {
      document.getElementById("itemTitle").textContent = selectedItem;
      const wowhead = wowheadLinks[selectedItem];
      const link = document.getElementById("wowheadLink");

      if (wowhead) {
        link.href = wowhead;
        link.style.display = "inline-flex";
      } else {
        link.style.display = "none";
      }

      const entries = p0Data[selectedItem] || [];
      const content = document.getElementById("itemContent");

      if (entries.length === 0) {
        content.innerHTML = '<div class="empty">Für dieses Item ist aktuell noch kein Spieler mit P0 eingetragen.</div>';
        return;
      }

      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Spieler</th>
              <th>Klasse</th>
              <th>P0 gesetzt</th>
            </tr>
          </thead>
          <tbody>
            ${entries.map(entry => `
              <tr>
                <td>${entry.spieler}</td>
                <td>${entry.klasse}</td>
                <td>${entry.anzahl}x</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function selectClass(className) {
      selectedClass = className;
      selectedItem = itemsByClass[className][0];
      renderAll();
    }

    function selectItem(itemName) {
      selectedItem = itemName;
      renderAll();
    }

    function renderAll() {
      renderClasses();
      renderItems();
      renderDetails();
    }

    loadP0DataFromSheet().then(() => renderAll());
  </script>
</body>
</html>
