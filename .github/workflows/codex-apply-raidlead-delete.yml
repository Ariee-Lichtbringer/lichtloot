name: Apply raidlead delete patch

on:
  push:
    paths:
      - .github/workflows/codex-apply-raidlead-delete.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch raidlead delete path
        run: |
          set -euo pipefail
          perl -0pi -e 's/"&raidId=" \+ encodeURIComponent\(currentRaidData\.raidId\) \+\n    "&player="/"&raidId=" + encodeURIComponent(currentRaidData.raidId) +\n    "&leadPin=" + encodeURIComponent(currentRaidData.leadPin || "") +\n    "&player="/' raidlead-panel.html
          python3 <<'PY'
          from pathlib import Path
          path = Path('lichtloot-api/src/server.js')
          text = path.read_text()
          old = '''async function deletePrio({ guildId, query: params }) {
            const pin = params.pin || params.playerPin || params.characterPin || params.masterCharacterPin;
            const player = params.player || params.char || params.spieler;
            const character = await findCharacterForPin(guildId, pin, player, params.server);

            if (!character) {
              const error = new Error("Dieser Charakter gehört nicht zu diesem SpielerPin.");
              error.statusCode = 403;
              throw error;
            }

            const values = [character.id];
            let raidClause = "";
            const raidId = clean(params.raidId);
          '''
          old = "\n".join(line[10:] if line.startswith("          ") else line for line in old.splitlines()) + "\n"
          new = '''async function deletePrio({ guildId, query: params }) {
            const pin = params.pin || params.playerPin || params.characterPin || params.masterCharacterPin;
            const player = params.player || params.char || params.spieler;
            const raidId = clean(params.raidId);
            const leadPin = clean(params.leadPin || params.raidleadPin);

            if (leadPin && raidId && player) {
              const raid = await findRaid(guildId, { raidId, leadPin });
              if (!raid) {
                const error = new Error("RaidID oder LeadPIN nicht gefunden.");
                error.statusCode = 403;
                throw error;
              }

              const values = [guildId, raid.id, clean(player)];
              let serverClause = "";
              if (clean(params.server)) {
                values.push(clean(params.server));
                serverClause = `and lower(c.server) = lower($${values.length})`;
              }

              const result = await query(
                `delete from prios pr
                 using characters c
                 where pr.character_id = c.id
                   and pr.raid_id = $2
                   and c.player_id in (select id from players where guild_id = $1)
                   and lower(c.name) = lower($3)
                   ${serverClause}
                 returning pr.id`,
                values
              );

              return { success: true, deleted: result.rowCount };
            }

            const character = await findCharacterForPin(guildId, pin, player, params.server);

            if (!character) {
              const error = new Error("Dieser Charakter gehört nicht zu diesem SpielerPin.");
              error.statusCode = 403;
              throw error;
            }

            const values = [character.id];
            let raidClause = "";
          '''
          new = "\n".join(line[10:] if line.startswith("          ") else line for line in new.splitlines()) + "\n"
          if old not in text:
            raise SystemExit('target block not found')
          path.write_text(text.replace(old, new))
          PY
          rm -f .github/workflows/codex-apply-raidlead-delete.yml
      - name: Commit patch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add raidlead-panel.html lichtloot-api/src/server.js .github/workflows/codex-apply-raidlead-delete.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Allow raidlead prio deletion with lead pin"
          git push
