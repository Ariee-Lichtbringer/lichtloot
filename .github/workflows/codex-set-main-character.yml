async function setSelectedMainCharacter(){
  const pin=syncHiddenPinFromDashboard();
  const status=document.getElementById("dashboardMyStatus") || document.getElementById("myPriosStatus");
  const hiddenStatus=document.getElementById("myPriosStatus");
  const character=getSelectedLichtLootCharacter();

  if(!pin){
    if(status) status.innerHTML='<span class="bad">Bitte zuerst SpielerPin eingeben.</span>';
    return;
  }
  if(!character || !character.name){
    if(status) status.innerHTML='<span class="bad">Bitte zuerst einen Charakter auswählen.</span>';
    return;
  }
  if(character.isMain){
    if(status) status.innerHTML='<span class="ok">'+safeHtml(character.name)+' ist bereits dein Main.</span>';
    return;
  }

  if(status) status.innerHTML='<span class="warn">Main wird gespeichert …</span>';

  try{
    const query=new URLSearchParams({
      action:"setMainCharacter",
      guild:CURRENT_GUILD_SLUG,
      pin,
      char:character.name || "",
      server:character.server || "",
      t:Date.now()
    });
    const response=await fetch(LICHTLOOT_API_URL+"?"+query.toString(),{cache:"no-store"});
    const result=await response.json();
    if(!result.success){
      if(status) status.innerHTML='<span class="bad">'+safeHtml(result.error || "Main konnte nicht gespeichert werden.")+'</span>';
      return;
    }
    if(hiddenStatus) hiddenStatus.innerHTML='<span class="ok">'+safeHtml(character.name)+' ist jetzt dein Main.</span>';
    if(status) status.innerHTML='<span class="ok">'+safeHtml(character.name)+' ist jetzt dein Main.</span>';
    await loadLichtLootCharacters();
    copyHiddenLichtLootToDashboard(true);
  }catch(error){
    console.error(error);
    if(status) status.innerHTML='<span class="bad">Main konnte nicht gespeichert werden.</span>';
  }
}

