name: Apply raid default patch

on:
  push:
    paths:
      - .github/workflows/codex-apply-raid-default.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Apply raid defaults
        run: |
          set -euo pipefail
          perl -0pi -e 's/createdAt:new Date\(\)\.toISOString\(\),\n    status:"geöffnet"/createdAt:new Date().toISOString(),\n    status:"geschlossen",\n    p0PlusFreigabe:"geöffnet"/' start.html
          perl -0pi -e 's/status:"geöffnet",\n    p0PlusFreigabe:"geöffnet",/status:"geschlossen",\n    p0PlusFreigabe:"geöffnet",/' gildenleitung.html
          perl -0pi -e 's/status: "geöffnet",\n      p0PlusFreigabe: "geöffnet"/status: "geschlossen",\n      p0PlusFreigabe: "geöffnet"/' lichtloot-api/src/server.js
          perl -0pi -e 's/const status = normalizeStatus\(params\.status \|\| "geöffnet"\);/const status = normalizeStatus(params.status || "geschlossen");/' lichtloot-api/src/server.js
          perl -0pi -e 's/p0PlusFreigabe: "geschlossen"/p0PlusFreigabe: "geöffnet"/' Code_LichtLoot_neues_Lootschema.gs
          perl -0pi -e 's/const p0PlusFreigabe = data\.p0PlusFreigabe \|\| data\.P0PlusFreigabe \|\| data\.p0PlusOverride \|\| "geschlossen";/const p0PlusFreigabe = data.p0PlusFreigabe || data.P0PlusFreigabe || data.p0PlusOverride || "geöffnet";/' Code_LichtLoot_neues_Lootschema.gs
          rm -f .github/workflows/codex-apply-raid-default.yml
      - name: Commit patch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add start.html gildenleitung.html lichtloot-api/src/server.js Code_LichtLoot_neues_Lootschema.gs .github/workflows/codex-apply-raid-default.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Set new raids to closed prio"
          git push
