name: Apply worldbuff days patch

on:
  push:
    paths:
      - .github/workflows/codex-apply-worldbuff-days.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch start page
        run: node .github/workflows/codex-apply-worldbuff-days.js
      - name: Validate start page
        run: node .github/workflows/codex-validate-start.js
      - name: Commit and push
        run: |
          git config user.name codex-bot
          git config user.email codex-bot@users.noreply.github.com
          git add start.html
          git commit -m "Pass worldbuff date range on start page" || true
          rm .github/workflows/codex-apply-worldbuff-days.yml .github/workflows/codex-apply-worldbuff-days.js .github/workflows/codex-validate-start.js
          git add .github/workflows/codex-apply-worldbuff-days.yml .github/workflows/codex-apply-worldbuff-days.js .github/workflows/codex-validate-start.js
          git commit -m "Remove temporary worldbuff days workflow" || true
          git push
