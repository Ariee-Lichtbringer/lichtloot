<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lichtbringer – Prio 0 Blackwing Lair</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: #f9fafb;
    }

    .page {
      max-width: 1200px;
      margin: auto;
      padding: 30px 18px 60px;
    }

    a.back {
      color: #facc15;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      margin-top: 24px;
      padding: 28px;
      border-radius: 22px;
      background: linear-gradient(135deg, #111827, #1f2937);
      border: 1px solid rgba(250, 204, 21, 0.25);
      box-shadow: 0 18px 45px rgba(0,0,0,0.4);
    }

    .eyebrow {
      color: #facc15;
      font-weight: bold;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: 13px;
    }

    h1 {
      margin: 10px 0;
      font-size: 42px;
      color: #facc15;
    }

    .subtitle {
      color: #9ca3af;
    }

    .search-area {
      margin: 24px 0;
      padding: 16px;
      background: #111827;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
    }

    #bwlSearch {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #374151;
      background: #020617;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }

    #bwlSearch:focus {
      outline: none;
      border-color: #facc15;
      box-shadow: 0 0 0 3px rgba(250,204,21,0.18);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin: 18px 0;
      color: #9ca3af;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .item-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
    }

    .item-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.25);
    }

    .item-name {
      margin: 0;
      color: #c084fc;
      font-size: 18px;
    }

    .boss {
      display: block;
      margin-top: 6px;
      color: #9ca3af;
      font-size: 13px;
    }

    .players {
      list-style: none;
      padding: 14px;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .player {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .player strong {
      display: block;
    }

    .klasse {
      font-size: 12px;
      color: #9ca3af;
    }

    .points {
      color: #facc15;
      font-weight: bold;
      white-space: nowrap;
    }

    .empty {
      display: none;
      margin-top: 20px;
      padding: 28px;
      text-align: center;
      color: #9ca3af;
      border: 1px dashed rgba(255,255,255,0.2);
      border-radius: 18px;
    }
  </style>
</head>

<body>
  <main class="page">
    <a class="back" href="index.html">← Zur Startseite</a>

    <section class="hero">
      <div class="eyebrow">Blackwing Lair · Prio 0 Plus</div>
      <h1>Blackwing Lair</h1>
      <p class="subtitle">BWL Sheet Sync Prio 0 Plus</p>
    </section>

    <section class="search-area">
      <input id="bwlSearch" type="text" placeholder="Item oder Spieler suchen ...">
    </section>

    <div class="info-row">
      <strong>Items</strong>
      <span id="itemCount">Lade Items ...</span>
    </div>

    <section id="itemGrid" class="grid"></section>

    <div id="emptyState" class="empty">
      Keine passenden Items oder Spieler gefunden.
    </div>
  </main>

  <script>
    const BWL_SHEET =
      "https://docs.google.com/spreadsheets/d/1t7P5T6t7OCWRY3kGCWIYHWDNXgXmdvpAM1xIj2U4TRw/gviz/tq?tqx=out:csv&gid=1857830583";

    const PLAYER_SHEET =
      "https://docs.google.com/spreadsheets/d/1t7P5T6t7OCWRY3kGCWIYHWDNXgXmdvpAM1xIj2U4TRw/gviz/tq?tqx=out:csv&gid=504190382";

    const grid = document.getElementById("itemGrid");
    const searchInput = document.getElementById("bwlSearch");
    const itemCount = document.getElementById("itemCount");
    const emptyState = document.getElementById("emptyState");

    let playerClasses = new Map();
    let allCards = [];

    async function loadCSV(url) {
      const response = await fetch(url);
      const text = await response.text();
      return parseCSV(text);
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          row.push(cell.trim());
          cell = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (cell || row.length) {
            row.push(cell.trim());
            rows.push(row);
            row = [];
            cell = "";
          }
        } else {
          cell += char;
        }
      }

      if (cell || row.length) {
        row.push(cell.trim());
        rows.push(row);
      }

      return rows;
    }

    function normalize(value) {
      return String(value || "").toLowerCase().trim();
    }

    function findColumn(headers, possibleNames) {
      return headers.findIndex(header =>
        possibleNames.some(name => normalize(header).includes(normalize(name)))
      );
    }

    async function init() {
      try {
        await loadPlayers();
        const rows = await loadCSV(BWL_SHEET);
        renderItems(rows);
      } catch (error) {
        grid.innerHTML = "<p>Die BWL-Daten konnten nicht geladen werden.</p>";
        itemCount.textContent = "0 Items";
      }
    }

    async function loadPlayers() {
      const rows = await loadCSV(PLAYER_SHEET);
      const headers = rows[0];

      const nameCol = findColumn(headers, ["name", "spieler", "char"]);
      const classCol = findColumn(headers, ["klasse", "class"]);

      rows.slice(1).forEach(row => {
        const name = row[nameCol];
        const klasse = row[classCol];

        if (name && klasse) {
          playerClasses.set(name.trim(), klasse.trim());
        }
      });
    }

    function renderItems(rows) {
      const headers = rows[0];

      const itemCol = findColumn(headers, ["item", "itemname", "gegenstand"]);
      const playerCol = findColumn(headers, ["spieler", "name", "char"]);
      const pointsCol = findColumn(headers, ["p0+", "p0", "punkte", "plus"]);
      const bossCol = findColumn(headers, ["boss", "quelle", "drop"]);

      const grouped = new Map();

      rows.slice(1).forEach(row => {
        const item = row[itemCol];
        const player = row[playerCol];
        const points = pointsCol >= 0 ? row[pointsCol] : "";
        const boss = bossCol >= 0 ? row[bossCol] : "";

        if (!item || !player) return;

        if (!grouped.has(item)) {
          grouped.set(item, {
            item,
            boss,
            players: []
          });
        }

        grouped.get(item).players.push({
          name: player,
          points,
          klasse: playerClasses.get(player) || "Klasse offen"
        });
      });

      grid.innerHTML = "";

      grouped.forEach(data => {
        const card = document.createElement("article");
        card.className = "item-card";

        const searchText = [
          data.item,
          data.boss,
          ...data.players.flatMap(p => [p.name, p.klasse, p.points])
        ].join(" ").toLowerCase();

        card.dataset.search = searchText;

        card.innerHTML = `
          <div class="item-header">
            <h2 class="item-name">${data.item}</h2>
            <span class="boss">${data.boss ? "Boss: " + data.boss : "Boss offen"}</span>
          </div>

          <ul class="players">
            ${data.players.map(player => `
              <li class="player">
                <div>
                  <strong>${player.name}</strong>
                  <span class="klasse">${player.klasse}</span>
                </div>
                <span class="points">${player.points ? "P0+ " + player.points : ""}</span>
              </li>
            `).join("")}
          </ul>
        `;

        grid.appendChild(card);
      });

      allCards = [...document.querySelectorAll(".item-card")];
      itemCount.textContent = `${allCards.length} Items`;
      applySearch();
    }

    function applySearch() {
      const search = searchInput.value.toLowerCase().trim();
      let visible = 0;

      allCards.forEach(card => {
        const match = card.dataset.search.includes(search);

        card.style.display = match ? "" : "none";

        if (match) visible++;
      });

      itemCount.textContent = `${visible} Items`;
      emptyState.style.display = visible === 0 ? "block" : "none";
    }

    searchInput.addEventListener("input", applySearch);

    init();
  </script>
</body>
</html>
