<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LichtLoot - Gilde anmelden</title>
  <style>
    :root{--gold:#facc15;--blue:#60a5fa;--panel:rgba(15,23,42,.86);--line:rgba(250,204,21,.22);--text:#e5edf8;--muted:#aebbd0}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#020617 url("images/bg-paladin.jpg") center/cover fixed;color:var(--text)}
    body:before{content:"";position:fixed;inset:0;background:rgba(2,6,23,.72);backdrop-filter:blur(2px)}
    main{position:relative;z-index:1;width:min(980px,calc(100vw - 32px));margin:0 auto;padding:42px 0}
    .brand{display:flex;align-items:center;gap:16px;margin-bottom:24px}
    .brand img{width:92px;height:auto}
    h1{margin:0;color:var(--gold);font-size:clamp(34px,5vw,58px);line-height:.95}
    p{color:var(--muted);font-weight:800}
    .panel{border:1px solid var(--line);border-radius:10px;background:var(--panel);box-shadow:0 24px 80px rgba(0,0,0,.35);padding:24px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    label{display:grid;gap:7px;color:var(--gold);font-size:13px;font-weight:950;text-transform:uppercase;letter-spacing:.02em}
    input,textarea{width:100%;border:1px solid rgba(148,163,184,.28);border-radius:8px;background:rgba(2,6,23,.78);color:var(--text);padding:14px 15px;font:inherit;font-weight:850;outline:none}
    input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(96,165,250,.18)}
    textarea{min-height:110px;resize:vertical}
    .full{grid-column:1/-1}
    .actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:18px}
    button,.linkbtn{border:1px solid rgba(250,204,21,.32);border-radius:8px;background:linear-gradient(135deg,rgba(250,204,21,.30),rgba(29,78,216,.20));color:#f8fafc;padding:13px 18px;font-weight:950;text-decoration:none;cursor:pointer}
    button:hover,.linkbtn:hover{border-color:rgba(96,165,250,.65)}
    .status{margin-top:16px;border:1px solid rgba(148,163,184,.25);border-radius:8px;padding:13px 14px;font-weight:850;color:var(--muted)}
    .status.good{border-color:rgba(34,197,94,.45);color:#86efac;background:rgba(22,101,52,.16)}
    .status.bad{border-color:rgba(248,113,113,.45);color:#fecaca;background:rgba(127,29,29,.18)}
    @media(max-width:720px){.grid{grid-template-columns:1fr}.brand{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
<main>
  <div class="brand">
    <img src="images/content.png" alt="LichtLoot">
    <div>
      <h1>Gilde anmelden</h1>
      <p>Neue Gilde eintragen. Die Freischaltung passiert danach im Admin-Bereich.</p>
    </div>
  </div>

  <form class="panel" id="guildApplicationForm">
    <div class="grid">
      <label>Gildenname
        <input name="guildName" autocomplete="organization" required placeholder="z.B. Lichtbringer">
      </label>
      <label>Lootsystem-Name
        <input name="lootName" placeholder="z.B. LichtLoot">
      </label>
      <label>Server
        <input name="server" placeholder="z.B. Everlook">
      </label>
      <label>Gewünschter GildenPIN
        <input name="guildPin" maxlength="12" placeholder="z.B. LBR">
      </label>
      <label>Ansprechpartner
        <input name="contactName" autocomplete="name" required placeholder="Name">
      </label>
      <label>Discord-Name
        <input name="contactDiscord" placeholder="name#0000 oder User-ID">
      </label>
      <label>E-Mail
        <input name="contactEmail" type="email" autocomplete="email" placeholder="optional">
      </label>
      <label>Discord-Server-ID
        <input name="discordGuildId" placeholder="optional">
      </label>
      <label class="full">Notiz
        <textarea name="notes" placeholder="Was soll bei der Einrichtung beachtet werden?"></textarea>
      </label>
    </div>
    <div class="actions">
      <button type="submit">Anfrage senden</button>
      <a class="linkbtn" href="start.html?guild=lichtloot">Zurück zu LichtLoot</a>
    </div>
    <div id="status" class="status">Bereit.</div>
  </form>
</main>
<script>
const API_URL = "https://lichtloot-production.up.railway.app/api/apps-script";
const statusBox = document.getElementById("status");
function setStatus(text, type){ statusBox.textContent = text; statusBox.className = "status " + (type || ""); }
const guildApplicationForm = document.getElementById("guildApplicationForm");
guildApplicationForm.addEventListener("submit", async event => {
  event.preventDefault();
  const form = event.currentTarget || guildApplicationForm;
  const payload = Object.fromEntries(new FormData(form).entries());
  setStatus("Anfrage wird gespeichert ...", "");
  try{
    const response = await fetch(API_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ action:"submitGuildApplication", ...payload })
    });
    const result = await response.json();
    if(!result.success) throw new Error(result.error || "Anfrage konnte nicht gespeichert werden.");
    if(form && typeof form.reset === "function") form.reset();
    setStatus("Anfrage ist gespeichert. Du bekommst den Freischaltlink, sobald sie im Admin-Bereich freigegeben wurde.", "good");
  }catch(error){
    setStatus(error.message || "Anfrage konnte nicht gespeichert werden.", "bad");
  }
});
</script>
</body>
</html>
