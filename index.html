<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lichtbringer – Raid Übersicht</title>

<style>
.p0plus-search-box{
  margin-bottom:14px;
  position:relative;
}

.p0plus-search-box input{
  width:100%;
  padding:12px 13px 12px 38px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(2,6,23,.82);
  color:white;
  font-size:14px;
  font-weight:700;
}

.p0plus-search-box input:focus{
  outline:none;
  border-color:rgba(250,204,21,.65);
  box-shadow:0 0 0 2px rgba(250,204,21,.14);
}

.p0plus-search-icon{
  position:absolute;
  left:13px;
  top:50%;
  transform:translateY(-50%);
  color:#facc15;
  z-index:2;
}
.p0plus-open-btn{
  position:absolute;
  top:25px;
  left:25px;
  z-index:1000;
  padding:10px 16px;
  border-radius:12px;
  border:1px solid rgba(250,204,21,.35);
  background:linear-gradient(135deg,rgba(250,204,21,.30),rgba(96,165,250,.20));
  color:white;
  font-weight:900;
  cursor:pointer;
}

.p0plus-overlay{
  position:absolute;
  top:75px;
  left:25px;
  z-index:1200;
  width:min(760px,calc(100vw - 50px));
}

.p0plus-box{
  background:rgba(12,18,32,.96);
  border:1px solid rgba(250,204,21,.35);
  border-radius:18px;
  box-shadow:0 20px 45px rgba(0,0,0,.55);
  padding:18px;
}

.p0plus-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}

.p0plus-head h2{
  color:#facc15;
  margin:0;
}

.p0plus-head button{
  border:1px solid rgba(239,68,68,.55);
  background:rgba(239,68,68,.25);
  color:white;
  border-radius:10px;
  padding:8px 12px;
  font-weight:900;
  cursor:pointer;
}

.p0plus-content{
  max-height:520px;
  overflow:auto;
  font-size:14px;
}

.p0plus-raid{
  margin-top:14px;
  color:#facc15;
  font-size:18px;
  font-weight:900;
}

.p0plus-table{
  width:100%;
  border-collapse:collapse;
  margin-top:8px;
}

.p0plus-table th,
.p0plus-table td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,.12);
  text-align:left;
}

.p0plus-table th{
  color:#facc15;
  font-size:12px;
  text-transform:uppercase;
}
:root{
  --gold:#facc15;
  --panel:rgba(12,18,32,.82);
  --text:#f8fafc;
  --muted:#cbd5e1;
  --line:rgba(255,255,255,.10);
  --shadow:0 20px 45px rgba(0,0,0,.45);
  --danger:#ef4444;
  --green:#22c55e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--text);
  background:linear-gradient(rgba(8,17,31,.78), rgba(8,17,31,.90)),url('./images/back.jpeg');
  background-size:cover;
  background-position:center top;
  background-repeat:no-repeat;
  background-attachment:fixed;
}
.overlay{
  min-height:100vh;
  backdrop-filter:blur(3px);
  padding:24px 24px 40px;
}
.logo-banner{
  display:block;
  margin:0 auto;
  width:min(420px,55vw);
  max-height:120px;
  object-fit:contain;
}
.top-tools{
  position:absolute;
  top:25px;
  right:25px;
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  z-index:1000;
}
.top-tools input,.raid-create-box input,.raid-create-box select{
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(250,204,21,.35);
  background:rgba(2,6,23,.85);
  color:white;
  font-weight:700;
}
.top-tools input{width:180px}
.tool-btn,.copy-btn{
  padding:10px 16px;
  border-radius:12px;
  border:1px solid rgba(250,204,21,.35);
  background:linear-gradient(135deg,rgba(250,204,21,.30),rgba(96,165,250,.20));
  color:white;
  font-weight:800;
  cursor:pointer;
}
.tool-btn:hover,.copy-btn:hover{border-color:rgba(250,204,21,.70)}
.raid-create-box{
  position:absolute;
  top:78px;
  right:25px;
  width:390px;
  padding:18px;
  border-radius:18px;
  background:rgba(12,18,32,.94);
  border:1px solid rgba(250,204,21,.28);
  box-shadow:0 20px 45px rgba(0,0,0,.55);
  z-index:999;
}
.hidden{display:none!important}
.raid-create-box h2{color:var(--gold);font-size:20px;margin-bottom:12px}
.raid-create-box label{
  display:block;
  color:var(--muted);
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin:12px 0 6px;
}
.raid-create-box input,.raid-create-box select{width:100%}
.result-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
  margin-top:10px;
}
.pin-output{
  padding:11px 12px;
  border-radius:12px;
  background:rgba(2,6,23,.72);
  border:1px solid rgba(255,255,255,.12);
  font-weight:900;
  color:#facc15;
  letter-spacing:.12em;
}
.status{
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(2,6,23,.55);
  color:#dbeafe;
  line-height:1.5;
  font-size:13px;
}
.ok{color:var(--green);font-weight:900}
.bad{color:var(--danger);font-weight:900}
.warn{color:var(--gold);font-weight:900}
.header{
  text-align:center;
  margin-bottom:18px;
}
.section-title{
  width:min(1500px,100%);
  margin:0 auto 18px;
  color:#facc15;
  font-size:22px;
  font-weight:900;
  text-align:center;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.raid-grid{
  width:min(1500px,100%);
  margin:auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:34px;
}
.small-raid-grid{
  width:min(1100px,100%);
  margin:0 auto 50px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}
.raid-card{
  position:relative;
  overflow:hidden;
  min-height:460px;
  border-radius:24px;
  border:1px solid var(--line);
  background-size:cover;
  background-position:center top;
  background-repeat:no-repeat;
  box-shadow:var(--shadow);
  transition:transform .22s ease,box-shadow .22s ease,border .22s ease;
}
.raid-card.small{min-height:340px;border-radius:20px}
.raid-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(rgba(8,17,31,.28),rgba(8,17,31,.78));
  z-index:1;
}
.raid-card:hover{
  transform:translateY(-6px);
  border-color:rgba(250,204,21,.45);
  box-shadow:0 0 0 2px rgba(250,204,21,.14),0 20px 45px rgba(0,0,0,.52);
}
.raid-content{
  min-height:460px;
  padding:28px 20px 20px;
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}
.raid-card.small .raid-content{min-height:340px;padding:22px 16px 16px}
.raid-title{
  font-size:24px;
  font-weight:900;
  margin-bottom:22px;
  color:var(--gold);
  text-shadow:0 2px 14px rgba(0,0,0,.95);
  background:rgba(2,6,23,.42);
  padding:7px 10px;
  border-radius:10px;
  display:inline-block;
  width:fit-content;
}
.raid-card.small .raid-title{font-size:20px}
.raid-description{
  color:#e5eefc;
  line-height:1.6;
  font-size:14px;
  margin-bottom:18px;
  text-shadow:0 2px 10px rgba(0,0,0,.95);
  background:rgba(2,6,23,.36);
  padding:9px 10px;
  border-radius:10px;
}
.raid-buttons{display:flex;flex-direction:column;gap:10px}
.raid-btn{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px 16px;
  border-radius:12px;
  background:linear-gradient(135deg,rgba(250,204,21,.30),rgba(96,165,250,.22));
  border:1px solid rgba(250,204,21,.30);
  color:var(--text);
  text-decoration:none;
  font-weight:800;
  font-size:14px;
  cursor:pointer;
  backdrop-filter:blur(5px);
  text-shadow:0 2px 8px rgba(0,0,0,.8);
}
.raid-btn:hover{
  transform:translateY(-2px);
  background:linear-gradient(135deg,rgba(250,204,21,.48),rgba(96,165,250,.32));
  border-color:rgba(250,204,21,.58);
}
.loot-btn{background:linear-gradient(135deg,rgba(96,165,250,.34),rgba(250,204,21,.20))}
.pin-input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(250,204,21,.38);
  background:rgba(2,6,23,.68);
  color:white;
  font-size:14px;
  outline:none;
  backdrop-filter:blur(5px);
}
.pin-input:focus{border-color:rgba(250,204,21,.75);box-shadow:0 0 0 2px rgba(250,204,21,.16)}
.pin-input::placeholder{color:#dbeafe}
.footer{text-align:center;margin-top:60px;color:#cbd5e1;font-size:12px;opacity:.7;letter-spacing:.12em;text-transform:uppercase}
@media(max-width:1200px){
  .raid-grid{grid-template-columns:repeat(2,1fr)}
  .small-raid-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:800px){
  .raid-grid,.small-raid-grid{grid-template-columns:1fr}
  .top-tools,.raid-create-box{position:static;width:100%;margin-bottom:18px}
}
</style>
</head>

<body>

<script>
const RAID_API_URL =
  "https://script.google.com/macros/s/AKfycbzwRZ1908IawmEh3WdROu_TBwfu8Yr1YXJ1VicqEIf15eZ2zzRE3Yw9OaaeJ0ZADbye2g/exec";

const raidleadAccounts = {
  "Lichtbringer-master":"master",
  "LB-S7XK29":"mc-bwl",
  "LB-Q4PM18":"naxx",
  "LB-T9DN52":"zg-aq20",
  "LB-AQ40-Lead":"aq40"
};

const raids = {
  mc:{name:"Molten Core",short:"MC",lootPage:"loot/mc-loot.html"},
  bwl:{name:"Blackwing Lair",short:"BWL",lootPage:"loot/bwl-loot.html"},
  aq40:{name:"Ahn'Qiraj 40",short:"AQ40",lootPage:"loot/aq40-loot.html"},
  naxx:{name:"Naxxramas",short:"NAXX",lootPage:"loot/naxx-loot.html"},
  zg:{name:"ZG 20",short:"ZG",lootPage:"loot/zg-loot.html"},
  aq20:{name:"AQ 20",short:"AQ20",lootPage:"loot/aq20-loot.html"},
  ony:{name:"Onyxia",short:"ONY",lootPage:"loot/ony-loot.html"}
};

function randomCode(length){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let result="";
  for(let i=0;i<length;i++){
    result+=chars.charAt(Math.floor(Math.random()*chars.length));
  }
  return result;
}

function createRaidId(raid){
  const now=new Date();
  const date=
    now.getFullYear()+"-"+
    String(now.getMonth()+1).padStart(2,"0")+"-"+
    String(now.getDate()).padStart(2,"0")+"-"+
    String(now.getHours()).padStart(2,"0")+
    String(now.getMinutes()).padStart(2,"0")+
    String(now.getSeconds()).padStart(2,"0");

  return raids[raid].short+"-"+date;
}

function toggleRaidCreate(){
  document.getElementById("raidCreateBox").classList.toggle("hidden");
}

async function createRaidFromStart(){
  const raid=document.getElementById("createRaidSelect").value;
  const r=raids[raid];

  const raidId=createRaidId(raid);
  const playerPin=randomCode(3);
  const leadPin=randomCode(4);

  const raidData={
    action:"createRaid",
    raidId:raidId,
    raid:raid,
    raidName:r.name,
    playerPin:playerPin,
    leadPin:leadPin,
    playerLink:"",
    createdAt:new Date().toISOString(),
    status:"geschlossen"
  };

  const resultBox=document.getElementById("createRaidResult");
  resultBox.innerHTML=`<span class="warn">Raid wird erstellt …</span>`;

  try{
    await fetch(RAID_API_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(raidData)
    });

    resultBox.innerHTML=`
      <span class="ok">✓ Raid wurde erstellt.</span><br><br>

      <strong>Raid:</strong><br>
      ${r.name}<br><br>

      <strong>SpielerPIN:</strong>
      <div class="result-row">
        <div class="pin-output" id="newPlayerPin">${playerPin}</div>
        <button class="copy-btn" onclick="copyText('newPlayerPin')">Kopieren</button>
      </div>

      <strong style="display:block;margin-top:12px">LeadPIN:</strong>
      <div class="result-row">
        <div class="pin-output" id="newLeadPin">${leadPin}</div>
        <button class="copy-btn" onclick="copyText('newLeadPin')">Kopieren</button>
      </div>

      <br>
      <span class="warn">Mit dem LeadPIN kann sich der Raidlead oben direkt einloggen.</span>
    `;

    document.getElementById("raidleadPin").value=leadPin;

  }catch(error){
    console.error(error);
    resultBox.innerHTML=`<span class="bad">Fehler beim Erstellen des Raids.</span>`;
  }
}

function copyText(id){
  const text=document.getElementById(id).textContent.trim();
  navigator.clipboard.writeText(text);
}

async function raidleadLogin(){
  const pin=document.getElementById("raidleadPin").value.trim();

  if(raidleadAccounts[pin]){
    sessionStorage.setItem("raidlead","true");
    sessionStorage.setItem("raidleadRole",raidleadAccounts[pin]);
    window.location.href="raidlead-panel.html";
    return;
  }

  const url =
    RAID_API_URL +
    "?action=validateLeadPin" +
    "&leadPin=" + encodeURIComponent(pin) +
    "&t=" + Date.now();

  try{
    const response=await fetch(url);
    const result=await response.json();

    if(result.success){
      sessionStorage.setItem("raidlead","true");
      sessionStorage.setItem("raidleadRole","master");
      sessionStorage.setItem("raidleadRaidId",result.raidId);
      window.location.href="raidlead-panel.html";
      return;
    }

    alert("Falsche Raidlead-PIN.");
  }catch(error){
    console.error(error);
    alert("Raidlead-Login konnte nicht geprüft werden.");
  }
}

function raidleadEnter(event){
  if(event.key==="Enter"){
    raidleadLogin();
  }
}

function openLootWithPin(raid){
  const input=document.getElementById("pin-"+raid);
  const pin=input.value.trim();

  if(!pin){
    alert("Bitte Prio PIN eingeben.");
    return;
  }

  window.location.href=raids[raid].lootPage+"?pin="+encodeURIComponent(pin);
}

function handlePinEnter(event,raid){
  if(event.key==="Enter"){
    openLootWithPin(raid);
  }
}
  const P0PLUS_API_URL =
  "https://script.google.com/macros/s/AKfycbwkqlrvXzp8wnh_mhzAW71GDjv2ng3rSavXiuaCp3xunfKHzxVmXjB0I7-QHk6PEulGjQ/exec";

function toggleP0PlusOverview(){
  const overlay = document.getElementById("p0plusOverlay");
  overlay.classList.toggle("hidden");

  if(!overlay.classList.contains("hidden")){
    loadP0PlusOverview();
  }
}

function loadP0PlusOverview(){
  const content = document.getElementById("p0plusContent");
  content.innerHTML = "Lade P0Plus Punkte …";

  const callbackName = "receiveP0PlusOverview_" + Date.now();

  window[callbackName] = function(result){
    if(!result || !result.success){
      content.innerHTML = `<span class="bad">P0Plus Punkte konnten nicht geladen werden.</span>`;
      cleanup();
      return;
    }
window.p0plusEntries = result.entries || [];
renderP0PlusOverview(window.p0plusEntries);
    cleanup();
  };

  const script = document.createElement("script");

  script.src =
    P0PLUS_API_URL +
    "?action=getP0Plus" +
    "&callback=" + callbackName +
    "&t=" + Date.now();

  script.onerror = function(){
    content.innerHTML = `<span class="bad">P0Plus API konnte nicht geladen werden.</span>`;
    cleanup();
  };

  function cleanup(){
    delete window[callbackName];
    if(script && script.parentNode){
      script.parentNode.removeChild(script);
    }
  }

  document.body.appendChild(script);
}

function renderP0PlusOverview(entries){
  const search =
  document.getElementById("p0plusSearch")
    ?.value
    .trim()
    .toLowerCase() || "";

if(search){
  entries = entries.filter(entry =>
    [
      entry.item,
      entry.player,
      entry.raid,
      entry.slot
    ].join(" ").toLowerCase().includes(search)
  );
}
  const content = document.getElementById("p0plusContent");

  if(!entries.length){
    content.innerHTML = "Keine P0Plus Punkte vorhanden.";
    return;
  }

  const grouped = {};

  entries.forEach(entry => {
    const raid = entry.raid || "Unbekannt";

    if(!grouped[raid]){
      grouped[raid] = [];
    }

    grouped[raid].push(entry);
  });

  let html = "";

  Object.keys(grouped).sort().forEach(raid => {
    html += `<div class="p0plus-raid">${raid}</div>`;
    html += `
      <table class="p0plus-table">
        <thead>
          <tr>
            <th>Item</th>
            <th>Slot</th>
            <th>Spieler</th>
            <th>Punkte</th>
          </tr>
        </thead>
        <tbody>
    `;

    grouped[raid]
      .sort((a,b) => String(a.item).localeCompare(String(b.item),"de"))
      .forEach(entry => {
        html += `
          <tr>
            <td>${safeHtml(entry.item)}</td>
            <td>${safeHtml(entry.slot)}</td>
            <td>${safeHtml(entry.player)}</td>
            <td><strong>${safeHtml(entry.count)}</strong></td>
          </tr>
        `;
      });

    html += `</tbody></table>`;
  });

  content.innerHTML = html;
}

function safeHtml(value){
  return String(value || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
