<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lichtbringer – Prio 0 Blackwing Lair</title>
  <style>
    :root {
      --bg: #08111f;
      --bg2: #111c33;
      --panel: rgba(20, 32, 55, 0.92);
      --gold: #facc15;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(255, 255, 255, 0.13);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(250, 204, 21, 0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.22), transparent 32%),
        linear-gradient(135deg, var(--bg), var(--bg2));
    }

    header {
      min-height: 110px;
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
      padding: 18px 24px;
      background: linear-gradient(90deg, rgba(8,17,31,.98), rgba(30,64,175,.88), rgba(8,17,31,.98));
      border-bottom: 1px solid rgba(250,204,21,.32);
      box-shadow: var(--shadow);
    }

    .back {
      width: 48px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: var(--gold);
      text-decoration: none;
      font-size: 34px;
      border: 1px solid rgba(250,204,21,.35);
      background: rgba(255,255,255,.04);
    }

    .headline { text-align: center; }

    .headline h1 {
      margin: 0;
      font-size: clamp(25px, 4vw, 42px);
      font-weight: 900;
      text-shadow: 0 0 18px rgba(250,204,21,.25);
    }

    .headline p {
      margin: 8px 0 0;
      color: #dbeafe;
      font-size: 13px;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    main {
      width: min(1580px, calc(100% - 32px));
      margin: 28px auto 52px;
      display: grid;
      grid-template-columns: 235px 1fr 1.05fr;
      gap: 24px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .slots {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .panel-title {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .slot-btn,
    .item-btn {
      border: 0;
      cursor: pointer;
      font-weight: 800;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .slot-btn {
      padding: 13px 14px;
      border-radius: 13px;
      color: var(--text);
      font-size: 16px;
      text-align: left;
      background: linear-gradient(180deg, rgba(37,56,91,.98), rgba(22,34,58,.98));
      border-left: 5px solid rgba(250,204,21,.7);
      box-shadow: 0 8px 18px rgba(0,0,0,.22);
    }

    .slot-btn:hover,
    .slot-btn.active {
      transform: translateX(5px);
      box-shadow: 0 0 0 3px rgba(250,204,21,.25), 0 10px 22px rgba(0,0,0,.28);
      background: linear-gradient(180deg, rgba(59,86,135,.98), rgba(30,47,79,.98));
    }

    .items-panel { padding: 18px; }

    .items {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
    }

    .item-btn {
      min-height: 60px;
      padding: 13px 16px;
      border-radius: 16px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(37,56,91,.98), rgba(22,34,58,.98));
      border: 1px solid rgba(255,255,255,.11);
      border-left: 5px solid var(--gold);
      text-align: left;
      line-height: 1.25;
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }

    .item-btn::before {
      content: "✦";
      color: var(--gold);
      margin-right: 8px;
    }

    .item-btn:hover,
    .item-btn.active {
      background: linear-gradient(180deg, rgba(59,86,135,.98), rgba(30,47,79,.98));
      box-shadow: 0 0 0 2px rgba(250,204,21,.28), 0 13px 28px rgba(0,0,0,.30);
      transform: translateY(-2px);
    }

    .item-meta {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .details {
      padding: 22px;
      min-height: 640px;
      background: linear-gradient(180deg, rgba(30,41,59,.96), rgba(15,23,42,.97));
    }

    .details-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(250,204,21,.18);
    }

    .details h2 {
      margin: 0;
      color: var(--gold);
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.15;
    }

    .wowhead-link {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid rgba(250,204,21,.35);
      background: rgba(250,204,21,.08);
      font-size: 14px;
      font-weight: 800;
    }

    .eligible {
      margin: -4px 0 16px;
      color: #dbeafe;
      font-size: 14px;
      line-height: 1.45;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      background: rgba(255,255,255,.035);
    }

    th {
      padding: 12px 11px;
      background: linear-gradient(90deg, rgba(250,204,21,.28), rgba(96,165,250,.18));
      color: var(--text);
      text-align: left;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    td {
      padding: 13px 11px;
      border-bottom: 1px solid rgba(255,255,255,.09);
      color: var(--muted);
      font-weight: 750;
    }

    tr:last-child td { border-bottom: 0; }

    .empty {
      padding: 18px;
      border: 1px dashed rgba(250,204,21,.32);
      border-radius: 16px;
      color: var(--muted);
      background: rgba(250,204,21,.055);
      line-height: 1.5;
      font-weight: 700;
    }

    .hint {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(96,165,250,.08);
      color: #dbeafe;
      font-size: 13px;
      line-height: 1.45;
      border: 1px solid rgba(96,165,250,.18);
    }

    @media (max-width: 1120px) {
      main { grid-template-columns: 1fr; }
      .items { grid-template-columns: 1fr; }
      .details { min-height: auto; }
    }
  </style>
</head>

      "Schleier des reinen Gedankens": "https://www.wowhead.com/classic/item=19430/shroud-of-pure-thought",
      "Gehärteter Drachenledergürtel": "https://www.wowhead.com/classic/item=19396/taut-dragonhide-belt",
      "Malfurions gesegnetes Bollwerk": "https://www.wowhead.com/classic/item=19405/malfurions-blessed-bulwark",

      "Stab der Schattenflamme": "https://www.wowhead.com/classic/item=19356/staff-of-the-shadow-flame",
      "Mish'undare, Reif des Gedankenschinders": "https://www.wowhead.com/classic/item=19375/mishundare-circlet-of-the-mind-flayer",
      "Prestors Talisman der Verschwörung": "https://www.wowhead.com/classic/item=19377/prestors-talisman-of-connivery",
      "Umhang des Brutlords": "https://www.wowhead.com/classic/item=19378/cloak-of-the-brood-lord",
      "Stiefel der Schattenflamme": "https://www.wowhead.com/classic/item=19381/boots-of-the-shadow-flame",
      "Band aus reinem Elementium": "https://www.wowhead.com/classic/item=19382/pure-elementium-band"
    };

    let p0Data = {};
    let selectedSlot = "Kopf";
    let selectedItem = "Mish'undare, Reif des Gedankenschinders";

    function normalizeText(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/ä/g, "ae")
        .replace(/ö/g, "oe")
        .replace(/ü/g, "ue")
        .replace(/ß/g, "ss")
        .replace(/[’'`´]/g, "")
        .replace(/[-–—]/g, " ")
        .replace(/[^a-z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function findCanonicalItemName(sheetItemName) {
      const knownItems = [...new Set(itemRows.map(row => row.item))];
      const normalizedSheetName = normalizeText(sheetItemName);
      return knownItems.find(item => normalizeText(item) === normalizedSheetName) || sheetItemName;
    }

    function getItemsBySlot(slot) {
      const items = [];
      itemRows.filter(row => row.slot === slot).forEach(row => {
        if (!items.includes(row.item)) items.push(row.item);
      });
      return items;
    }

    function getEligibleClasses(item) {
      const classes = [];
      itemRows.filter(row => row.item === item).forEach(row => {
        if (!classes.includes(row.klasse)) classes.push(row.klasse);
      });
      return classes;
    }

    async function loadP0DataFromSheet() {
      try {
        const separator = SHEET_CSV_URL.includes("?") ? "&" : "?";
        const response = await fetch(SHEET_CSV_URL + separator + "cachebust=" + Date.now());
        const csvText = await response.text();
        const rows = parseCSV(csvText);
        if (!rows.length) return;

        const header = rows.shift().map(h => h.trim().toLowerCase());
        const raidIndex = header.indexOf("raid");
        const klasseIndex = header.indexOf("klasse");
        const itemIndex = header.indexOf("item");
        const spielerIndex = header.indexOf("spieler");
        const anzahlIndex = header.indexOf("anzahl");

        rows.forEach(row => {
          const raid = raidIndex >= 0 ? row[raidIndex]?.trim() : "BWL";
          const klasse = klasseIndex >= 0 ? row[klasseIndex]?.trim() : "";
          const itemRaw = itemIndex >= 0 ? row[itemIndex]?.trim() : "";
          const spieler = spielerIndex >= 0 ? row[spielerIndex]?.trim() : "";
          const anzahl = anzahlIndex >= 0 ? row[anzahlIndex]?.trim() || "1" : "1";

          if (!itemRaw || !spieler) return;
          if (raid && raid.toLowerCase() !== "bwl") return;

          const item = findCanonicalItemName(itemRaw);
          if (!p0Data[item]) p0Data[item] = [];
          p0Data[item].push({ spieler, klasse, anzahl });
        });
      } catch (error) {
        console.error("Fehler beim Laden der Google-Sheet-Daten:", error);
      }
    }

    function parseCSV(text) {
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let insideQuotes = false;
      const delimiter = detectDelimiter(text);

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          currentValue += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === delimiter && !insideQuotes) {
          currentRow.push(currentValue);
          currentValue = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (currentValue || currentRow.length) {
            currentRow.push(currentValue);
            rows.push(currentRow);
          }
          currentRow = [];
          currentValue = "";
          if (char === "\r" && nextChar === "\n") i++;
        } else {
          currentValue += char;
        }
      }

      if (currentValue || currentRow.length) {
        currentRow.push(currentValue);
        rows.push(currentRow);
      }

      return rows;
    }

    function detectDelimiter(text) {
      const firstLine = text.split(/\r?\n/)[0] || "";
      const commas = (firstLine.match(/,/g) || []).length;
      const semicolons = (firstLine.match(/;/g) || []).length;
      return semicolons > commas ? ";" : ",";
    }

    function renderSlots() {
      const wrapper = document.getElementById("slotButtons");
      wrapper.innerHTML = '<h2 class="panel-title">Slot wählen</h2>' + slotOrder.map(slot => `
        <button class="slot-btn ${slot === selectedSlot ? "active" : ""}" onclick="selectSlot('${slot}')">${slot}</button>
      `).join("");
    }

    function renderItems() {
      document.getElementById("itemsTitle").textContent = selectedSlot + " · BWL Items";
      const wrapper = document.getElementById("itemButtons");
      const items = getItemsBySlot(selectedSlot);
      wrapper.innerHTML = items.map(item => `
        <button class="item-btn ${item === selectedItem ? "active" : ""}" onclick="selectItem(\`${item}\`)">
          ${item}
          <span class="item-meta">${getEligibleClasses(item).join(", ")}</span>
        </button>
      `).join("");
    }

    function renderDetails() {
      document.getElementById("itemTitle").textContent = selectedItem;
      document.getElementById("eligibleClasses").innerHTML = `<strong>Klassen:</strong> ${getEligibleClasses(selectedItem).join(", ")}`;

      const link = document.getElementById("wowheadLink");
      if (wowheadLinks[selectedItem]) {
        link.href = wowheadLinks[selectedItem];
        link.style.display = "inline-flex";
      } else {
        link.style.display = "none";
      }

      const entries = p0Data[selectedItem] || [];
      const content = document.getElementById("itemContent");

      if (!entries.length) {
        content.innerHTML = '<div class="empty">Für dieses Item ist aktuell noch kein Spieler mit P0 eingetragen.</div>';
        return;
      }

      content.innerHTML = `
        <table>
          <thead><tr><th>Spieler</th><th>Klasse</th><th>P0 gesetzt</th></tr></thead>
          <tbody>
            ${entries.map(entry => `<tr><td>${entry.spieler}</td><td>${entry.klasse}</td><td>${entry.anzahl}x</td></tr>`).join("")}
          </tbody>
        </table>
      `;
    }

    function selectSlot(slot) {
      selectedSlot = slot;
      selectedItem = getItemsBySlot(slot)[0] || "";
      renderAll();
    }

    function selectItem(itemName) {
      selectedItem = itemName;
      renderAll();
    }

    function renderAll() {
      renderSlots();
      renderItems();
      renderDetails();
    }

    loadP0DataFromSheet().then(() => renderAll());
  </script>
</body>
</html>
