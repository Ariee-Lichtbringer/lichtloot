<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lichtloot – Raidlead</title>

<style>
:root{
  --gold:#facc15;
  --panel:rgba(12,18,32,.90);
  --text:#f8fafc;
  --muted:#cbd5e1;
  --line:rgba(255,255,255,.12);
  --danger:#ef4444;
  --green:#22c55e;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--text);
  background:
    linear-gradient(rgba(8,17,31,.82),rgba(8,17,31,.94)),
    var(--raid-bg,url('./images/back.jpeg'));
  background-size:cover;
  background-position:center top;
  background-attachment:fixed;
}

.overlay{
  min-height:100vh;
  padding:36px 22px 70px;
  backdrop-filter:blur(3px);
}

.topbar,
.header,
.raid-card{
  width:min(1300px,100%);
  margin:auto;
}

.topbar{
  margin-bottom:28px;
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:center;
  flex-wrap:wrap;
}

.btn-link,
.btn{
  color:var(--text);
  text-decoration:none;
  font-weight:900;
  border:1px solid var(--line);
  padding:12px 16px;
  border-radius:14px;
  background:rgba(12,18,32,.72);
  cursor:pointer;
  display:inline-block;
  text-align:center;
}

.btn:hover,
.btn-link:hover{
  border-color:rgba(250,204,21,.55);
}

.header{
  margin-bottom:22px;
  padding:30px;
  border-radius:24px;
  background:var(--panel);
  border:1px solid rgba(250,204,21,.22);
  box-shadow:0 20px 45px rgba(0,0,0,.45);
}

h1{
  color:var(--gold);
  font-size:clamp(34px,5vw,58px);
  margin-bottom:8px;
}

.subtitle{
  color:#dbeafe;
  line-height:1.7;
  font-size:15px;
}

.raid-card{
  margin-bottom:22px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:22px;
  padding:24px;
  box-shadow:0 18px 40px rgba(0,0,0,.38);
}

h2{
  color:var(--gold);
  margin-bottom:14px;
  font-size:25px;
}

h3{
  color:#dbeafe;
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:.12em;
  margin-top:20px;
  margin-bottom:10px;
}

label{
  display:block;
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  margin:12px 0 7px;
  text-transform:uppercase;
  letter-spacing:.08em;
}

input,
select{
  width:100%;
  padding:12px 13px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(2,6,23,.82);
  color:white;
  font-size:14px;
}

.pin-grid{
  display:grid;
  grid-template-columns:1fr auto;
  gap:14px;
  align-items:end;
}

.status{
  margin:14px 0;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--line);
  background:rgba(2,6,23,.55);
  color:#dbeafe;
  line-height:1.6;
  font-size:14px;
}

.raidlead-prio-form{
  margin:0 0 16px;
  border:1px solid rgba(250,204,21,.22);
  border-radius:16px;
  background:rgba(2,6,23,.42);
  overflow:visible;
}

.raidlead-prio-form summary{
  list-style:none;
  cursor:pointer;
  padding:16px;
  color:#dbeafe;
  font-size:14px;
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:.12em;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.raidlead-prio-form summary::-webkit-details-marker{display:none}

.raidlead-prio-form summary::after{
  content:"Aufklappen";
  color:var(--gold);
  font-size:11px;
  letter-spacing:.08em;
}

.raidlead-prio-form[open] summary{
  border-bottom:1px solid rgba(250,204,21,.16);
}

.raidlead-prio-form[open] summary::after{
  content:"Einklappen";
}

.raidlead-prio-body{
  padding:16px;
}

.raidlead-prio-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px 12px;
}

.raidlead-prio-actions{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  margin-top:12px;
}

.raidlead-prio-actions .status{
  flex:1 1 260px;
  margin:0;
  padding:10px 12px;
}

.raidlead-item-picker{
  position:relative;
}

.raidlead-item-trigger{
  width:100%;
  min-height:44px;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(2,6,23,.82);
  color:#cbd5e1;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  text-align:left;
}

.raidlead-item-trigger .placeholder{
  color:#94a3b8;
  font-weight:800;
}

.raidlead-item-menu{
  position:absolute;
  z-index:1000;
  left:0;
  right:0;
  top:calc(100% + 6px);
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(148,163,184,.35);
  background:rgba(2,6,23,.98);
  box-shadow:0 18px 34px rgba(0,0,0,.55);
}

.raidlead-item-menu input{
  margin-bottom:8px;
  padding:9px 10px;
}

.raidlead-item-list{
  max-height:260px;
  overflow:auto;
  display:grid;
  gap:4px;
}

.raidlead-item-option{
  width:100%;
  padding:7px 8px;
  border:0;
  border-radius:8px;
  background:transparent;
  cursor:pointer;
  text-align:left;
}

.raidlead-item-option:hover{
  background:rgba(250,204,21,.10);
}

.raidlead-item-empty{
  color:#94a3b8;
  font-weight:800;
  padding:8px;
}

.ok{color:var(--green);font-weight:900}
.warn{color:var(--gold);font-weight:900}
.bad{color:var(--danger);font-weight:900}

.button-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.btn.neutral{
  background:linear-gradient(135deg,rgba(96,165,250,.22),rgba(15,23,42,.65));
  border-color:rgba(96,165,250,.25);
}

.btn.success{
  background:linear-gradient(135deg,rgba(34,197,94,.28),rgba(15,23,42,.65));
  border-color:rgba(34,197,94,.35);
}

.btn.warning{
  background:linear-gradient(135deg,rgba(250,204,21,.24),rgba(15,23,42,.65));
  border-color:rgba(250,204,21,.35);
}

.btn.danger{
  background:linear-gradient(135deg,rgba(239,68,68,.35),rgba(15,23,42,.65));
  border-color:rgba(239,68,68,.40);
}

.btn.small-btn{
  padding:5px 8px;
  border-radius:8px;
  font-size:11px;
  min-height:27px;
  line-height:1.1;
  margin-top:0;
  width:auto;
  margin-right:4px;
  margin-bottom:4px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:14px;
  font-size:14px;
}

th,td{
  padding:9px;
  border-bottom:1px solid rgba(255,255,255,.10);
  text-align:left;
  vertical-align:top;
}

th{
  color:var(--gold);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
}

.check{color:var(--green);font-weight:900;font-size:17px}
.cross{color:var(--danger);font-weight:900;font-size:17px}

.hidden{display:none!important}

/* Klassenfarben */
.class-badge{
  display:inline-block;
  font-weight:900;
  padding:3px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  white-space:nowrap;
}

.class-warrior{color:#c79c6e;border-color:rgba(199,156,110,.45);background:rgba(199,156,110,.10)}
.class-paladin{color:#f58cba;border-color:rgba(245,140,186,.45);background:rgba(245,140,186,.10)}
.class-hunter{color:#abd473;border-color:rgba(171,212,115,.45);background:rgba(171,212,115,.10)}
.class-rogue{color:#fff569;border-color:rgba(255,245,105,.45);background:rgba(255,245,105,.10)}
.class-priest{color:#ffffff;border-color:rgba(255,255,255,.45);background:rgba(255,255,255,.10)}
.class-shaman{color:#0070de;border-color:rgba(0,112,222,.55);background:rgba(0,112,222,.14)}
.class-mage{color:#69ccf0;border-color:rgba(105,204,240,.50);background:rgba(105,204,240,.12)}
.class-warlock{color:#9482c9;border-color:rgba(148,130,201,.50);background:rgba(148,130,201,.12)}
.class-druid{color:#ff7d0a;border-color:rgba(255,125,10,.50);background:rgba(255,125,10,.12)}

/* Itemfarben */
.item-link,
.item-name{
  font-weight:800;
  text-decoration:none;
  text-shadow:0 0 10px rgba(0,0,0,.55);
}

.item-link:hover{text-decoration:underline}
.item-poor{color:#9d9d9d}
.item-common{color:#ffffff}
.item-uncommon{color:#1eff00}
.item-rare{color:#0070dd}
.item-epic{color:#a335ee}
.item-legendary{color:#ff8000}
.item-artifact{color:#e6cc80}
.item-heirloom{color:#00ccff}


.search-box{
  margin:14px 0;
  position:relative;
}
.search-box input{
  width:100%;
  padding:12px 13px 12px 38px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(2,6,23,.82);
  color:white;
  font-size:14px;
  font-weight:700;
}
.search-icon{
  position:absolute;
  left:13px;
  top:50%;
  transform:translateY(-50%);
  color:var(--gold);
}
.item-with-icon{
  display:inline-flex;
  align-items:center;
  gap:7px;
  max-width:100%;
}
.item-icon{
  width:22px;
  height:22px;
  border-radius:4px;
  border:1px solid rgba(250,204,21,.35);
  object-fit:cover;
  flex-shrink:0;
}
.tooltip{
  position:absolute;
  z-index:20000;
  width:340px;
  padding:12px;
  border-radius:8px;
  background:linear-gradient(rgba(7,12,31,.97),rgba(2,6,23,.99));
  border:1px solid rgba(148,163,184,.75);
  box-shadow:0 0 28px rgba(0,0,0,.85);
  pointer-events:none;
  font-size:11px;
  line-height:1.35;
}
.tooltip-title{font-size:16px;font-weight:900;margin-bottom:4px}
.tooltip-title.epic{color:#a335ee}.tooltip-title.rare{color:#0070dd}.tooltip-title.uncommon{color:#1eff00}.tooltip-title.legendary{color:#ff8000}
.tooltip-ilvl{color:#ffd100;font-size:12px;font-weight:900;margin-bottom:6px}
.tooltip-row,.tooltip-stat,.tooltip-bind{color:white;font-size:11px;margin-top:3px}
.tooltip-equip{color:#1eff00;font-size:11px;margin-top:6px}
.tooltip-p0{margin-top:9px;padding-top:8px;border-top:1px solid rgba(255,255,255,.18);color:#dbeafe;font-size:13px;line-height:1.45}
.tooltip-p0 strong{color:var(--gold)}
.tooltip-p0 ul{margin:5px 0 0 18px}
.p0plus-points-list{font-size:13px;line-height:1.45;color:#dbeafe;font-weight:700}
.p0plus-points-list strong{display:block;color:var(--gold);margin-bottom:4px}
.p0plus-points-list .empty{color:#94a3b8;font-weight:700}
.p0plus-points-list .player-row{white-space:nowrap}


}



/* === LichtLoot Navigation wie auf den Lootseiten === */
.logo-banner-mini{
  display:block;
  margin:0 auto 12px!important;
  width:min(380px,58vw)!important;
  height:auto!important;
  max-height:96px!important;
  object-fit:contain!important;
}
.main-nav{
  width:min(1050px,calc(100vw - 48px));
  margin:0 auto 26px;
  padding:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  border-radius:22px;
  border:1px solid rgba(250,204,21,.34);
  background:linear-gradient(135deg,rgba(12,18,32,.78),rgba(2,6,23,.56));
  box-shadow:0 18px 38px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
}
.nav-btn{
  min-height:42px;
  padding:10px 16px;
  border-radius:14px;
  border:1px solid rgba(250,204,21,.28);
  background:rgba(2,6,23,.58);
  color:#f8fafc;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
  text-shadow:0 2px 8px rgba(0,0,0,.65);
  transition:transform .18s ease,border .18s ease,background .18s ease,box-shadow .18s ease;
}
.nav-btn:hover{
  transform:translateY(-2px);
  border-color:rgba(250,204,21,.70);
  background:linear-gradient(135deg,rgba(250,204,21,.34),rgba(96,165,250,.20));
  box-shadow:0 0 0 2px rgba(250,204,21,.12);
}
.nav-primary{
  background:linear-gradient(135deg,rgba(250,204,21,.42),rgba(96,165,250,.22));
  border-color:rgba(250,204,21,.62);
}
.nav-login{display:flex;align-items:center;gap:8px}
.nav-login input{
  width:170px;
  min-height:42px;
  padding:10px 12px;
  border-radius:14px;
  border:1px solid rgba(250,204,21,.35);
  background:rgba(2,6,23,.78);
  color:white;
  font-weight:800;
  outline:none;
}

.raid-status-grid{
  max-width:760px;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:16px;
  align-items:center;
}

.raid-info-transfer{
  align-self:center;
}

.raid-actions{
  display:grid;
  grid-template-columns:repeat(3,minmax(180px,260px));
  gap:12px;
  align-items:start;
}

.action-stack{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.btn.action-open{
  background:rgba(22,101,52,.24);
  border-color:rgba(74,222,128,.34);
  color:#bbf7d0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 8px 20px rgba(0,0,0,.18);
  text-shadow:0 2px 8px rgba(0,0,0,.70);
}
.btn.action-close{
  background:rgba(127,29,29,.22);
  border-color:rgba(248,113,113,.34);
  color:#fecaca;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 8px 20px rgba(0,0,0,.18);
  text-shadow:0 2px 8px rgba(0,0,0,.72);
}
.btn.action-p0open{
  background:rgba(30,64,175,.22);
  border-color:rgba(96,165,250,.36);
  color:#bfdbfe;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 8px 20px rgba(0,0,0,.18);
  text-shadow:0 2px 8px rgba(0,0,0,.72);
}
.btn.action-soft{
  background:rgba(15,23,42,.68);
  border-color:rgba(148,163,184,.28);
  color:#cbd5e1;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 8px 18px rgba(0,0,0,.16);
  text-shadow:0 2px 8px rgba(0,0,0,.70);
}
.btn.action-transfer{
  background:linear-gradient(135deg,rgba(250,204,21,.78),rgba(180,83,9,.68));
  border-color:rgba(253,230,138,.72);
  color:#111827;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 8px 18px rgba(0,0,0,.22);
  text-shadow:0 2px 8px rgba(0,0,0,.72);
}
.btn.action-open,.btn.action-close,.btn.action-p0open,.btn.action-soft,.btn.action-transfer{
  font-size:14px;
  letter-spacing:0;
}

.btn.action-transfer .star{
  margin-right:6px;
  font-size:16px;
  line-height:0;
}

.entry-status-line{
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:space-between;
  max-width:760px;
}

.entry-status-line .btn{
  flex:0 0 auto;
  padding:9px 12px;
}

.entry-status-content{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.entry-metrics{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.entry-metric{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.24);
  background:rgba(15,23,42,.66);
  color:#cbd5e1;
  font-size:12px;
  font-weight:900;
}

.entry-metric strong{
  color:#f8fafc;
  font-size:14px;
}

.entry-metric strong.ok{color:var(--green)}
.entry-metric strong.warn{color:var(--gold)}

.bench-row{
  background:rgba(148,163,184,.10);
  box-shadow:inset 3px 0 0 rgba(148,163,184,.55);
  color:#94a3b8;
}

.bench-row .item-with-icon,
.bench-row .item-name,
.bench-row .class-badge{
  opacity:.62;
}

.bench-label{
  display:inline-flex;
  margin-top:4px;
  padding:2px 7px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.38);
  color:#cbd5e1;
  font-size:10px;
  font-weight:900;
  text-transform:uppercase;
}

.missing-prio-panel{
  margin-top:14px;
  padding:14px;
  border-radius:16px;
  border:1px solid rgba(250,204,21,.22);
  background:rgba(2,6,23,.46);
}
.missing-prio-head{
  color:var(--gold);
  font-size:13px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.10em;
  margin-bottom:10px;
}
.missing-prio-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.missing-player-chip{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:7px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(15,23,42,.72);
  font-weight:900;
  font-size:13px;
}
.missing-player-chip .class-badge{
  padding:2px 7px;
  font-size:11px;
}
.missing-player-chip.unknown{color:#cbd5e1}
@media(max-width:1000px){.raid-actions,.raid-status-grid{grid-template-columns:1fr}.entry-status-line{align-items:stretch;flex-direction:column}.main-nav{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}.nav-btn{white-space:nowrap}.logo-banner-mini{max-height:110px}}


@media(max-width:1000px){
  .pin-grid{grid-template-columns:1fr}
  .button-grid{grid-template-columns:1fr}
  .raidlead-prio-grid{grid-template-columns:1fr}
}

/* Dashboard-Anpassung im Stil der Gildenleitung */
.overlay{
  padding:22px 22px 56px;
}

.logo-banner-mini{
  margin:0!important;
  width:190px!important;
  max-height:72px!important;
}

.main-nav{
  width:min(1460px,calc(100vw - 32px));
  justify-content:space-between;
  border-radius:10px;
  margin:0 auto 28px;
}

.nav-left,
.nav-right{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}

.header{
  width:min(1460px,100%);
  background:linear-gradient(135deg,rgba(12,18,32,.82),rgba(2,6,23,.48));
  border-radius:10px;
  padding:22px;
}

.header h1{
  font-size:34px;
  color:#fbbf24;
}

.raid-card{
  width:min(1460px,100%);
  border-radius:10px;
  background:linear-gradient(135deg,rgba(12,18,32,.82),rgba(2,6,23,.54));
  border-color:rgba(250,204,21,.18);
}

.raid-hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  margin-bottom:14px;
}

.raid-hero h2{
  font-size:28px;
  line-height:1.05;
  margin:0 0 5px;
  color:#fbbf24;
  letter-spacing:0;
}

.raid-chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.raid-chip{
  display:inline-flex;
  align-items:center;
  gap:7px;
  min-height:28px;
  padding:5px 9px;
  border-radius:8px;
  border:1px solid rgba(148,163,184,.22);
  background:rgba(2,6,23,.50);
  color:#dbeafe;
  font-weight:800;
  font-size:12px;
}

.raid-chip.ok{border-color:rgba(34,197,94,.32)}
.raid-chip.warn{border-color:rgba(250,204,21,.32)}

.raid-stat-grid{
  display:grid;
  grid-template-columns:repeat(5,minmax(140px,1fr));
  gap:10px;
  margin:14px 0;
}

.raid-stat-card{
  min-height:96px;
  border:1px solid rgba(250,204,21,.18);
  border-radius:10px;
  background:linear-gradient(135deg,rgba(12,18,32,.88),rgba(2,6,23,.55));
  padding:12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.raid-stat-card span{
  color:#dbeafe;
  font-size:13px;

<script>
const RAID_API_URL =
  "https://lichtloot-production.up.railway.app/api/apps-script";

function currentGuildSlug(){ return new URLSearchParams(window.location.search).get("guild") || "lichtloot"; }
function currentGuildName(){ return currentGuildSlug() === "panemloot" ? "PanemLoot" : "LichtLoot"; }
function currentGuildQueryPart(){ return "&guild=" + encodeURIComponent(currentGuildSlug()); }
function guildUrl(path){
  const slug=currentGuildSlug();
  if(slug === "lichtloot") return path;
  const hashIndex=path.indexOf("#");
  const hash=hashIndex >= 0 ? path.slice(hashIndex) : "";
  const base=hashIndex >= 0 ? path.slice(0,hashIndex) : path;
  return base + (base.includes("?") ? "&" : "?") + "guild=" + encodeURIComponent(slug) + hash;
}
function applyGuildBranding(){
  if(currentGuildSlug() !== "panemloot") return;
  document.title = document.title.replace(/Lichtloot|LichtLoot/g,"PanemLoot");
  const walker=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT);
  const nodes=[];
  while(walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(node => {
    node.nodeValue = node.nodeValue
      .replace(/Mein LichtLoot/g,"Mein PanemLoot")
      .replace(/LichtLoot/g,"PanemLoot")
      .replace(/Lichtloot/g,"PanemLoot")
      .replace(/Lichtbringer/g,"Panem");
  });
}
if(document.readyState === "loading"){ document.addEventListener("DOMContentLoaded", applyGuildBranding); } else { applyGuildBranding(); }

const MASTER_CODE = "Lichtbringer-Master";

const raids = {
  mc:{name:"Molten Core",short:"MC",role:"mc-bwl",lootPage:"loot/mc-loot.html",overviewPage:"molten-core.html"},
  bwl:{name:"Blackwing Lair",short:"BWL",role:"mc-bwl",lootPage:"loot/bwl-loot.html",overviewPage:"bwl.html"},
  aq40:{name:"Ahn'Qiraj 40",short:"AQ40",role:"aq40",lootPage:"loot/aq40-loot.html",overviewPage:"aq.html"},
  naxx:{name:"Naxxramas",short:"NAXX",role:"naxx",lootPage:"loot/naxx-loot.html",overviewPage:"naxxramas.html"},
  zg:{name:"ZG 20",short:"ZG",role:"zg-aq20",lootPage:"loot/zg-loot.html",overviewPage:"zg.html"},
  aq20:{name:"AQ 20",short:"AQ20",role:"zg-aq20",lootPage:"loot/aq20-loot.html",overviewPage:"aq20.html"},
  ony:{name:"Onyxia",short:"ONY",role:"ony",lootPage:"loot/ony-loot.html",overviewPage:"ony.html"}
};

const RAID_BACKGROUNDS = {
  mc:"./images/mc.jpg",
  bwl:"./images/bwl.jpg",
  aq40:"./images/aq40.jpg",
  naxx:"./images/naxx.jpg",
  zg:"./images/zg.jpg",
  aq20:"./images/aq20.jpg",
  ony:"./images/ony.jpg"
};

const LOOT_JSON_URLS = {
  mc:"data/mc.json",
  bwl:"data/bwl.json",
  aq40:"data/aq40.json",
  naxx:"data/naxx.json",
  zg:"data/zg.json",
  aq20:"data/aq20.json",
  ony:"data/ony.json"
};

let currentRaidKey = null;
let currentRaidData = null;
let currentPrios = [];
let currentReleased = false;
let itemIdMap = {};
let itemVisualMap = {};
let raidleadItemOptions = [];
let raidleadItemOptionsRaidKey = "";
let currentP0PlusEntries = [];
let currentPrioCheck = null;
let prioCheckTimer = null;

const classOrder = ["Krieger","Paladin","Jäger","Schurke","Priester","Schamane","Magier","Hexenmeister","Druide"];

function raidKeyFromRaidId(raidId){
  const id = String(raidId || "").toUpperCase();

  if(id.startsWith("ZG-")) return "zg";
  if(id.startsWith("AQ20-")) return "aq20";
  if(id.startsWith("AQ40-")) return "aq40";
  if(id.startsWith("BWL-")) return "bwl";
  if(id.startsWith("MC-")) return "mc";
  if(id.startsWith("NAXX-")) return "naxx";
  if(id.startsWith("ONY-")) return "ony";

  return null;
}

function updateRaidBackground(){
  const image = RAID_BACKGROUNDS[currentRaidKey] || "./images/back.jpeg";
  document.body.style.setProperty("--raid-bg", `url('${image}')`);
}

function raidPinEnter(event){
  if(event.key === "Enter"){
    loadRaidByPin();
  }
}

function checkLogin(){
  const params = new URLSearchParams(window.location.search);
  const urlLeadPin = (params.get("leadPin") || params.get("raidleadPin") || "").trim();
  if(urlLeadPin){
    document.body.classList.add("random-raidlead");
    sessionStorage.setItem("raidlead","true");
    sessionStorage.setItem("raidleadRole","master");
    sessionStorage.setItem("raidleadPrioPin",urlLeadPin);
  }

  const isLoggedIn = sessionStorage.getItem("raidlead");
  const role = sessionStorage.getItem("raidleadRole");

  if(isLoggedIn !== "true" || !role){
    alert("Bitte zuerst über die Startseite einloggen.");
    window.location.href = guildUrl("index.html");
    return;
  }

  document.getElementById("roleInfo").innerHTML =
    `Rolle: <strong>${role}</strong>`;

  const savedPin =
    sessionStorage.getItem("raidleadPrioPin") ||
    sessionStorage.getItem("raidleadPlayerPin") ||
    "";

  if(savedPin){
    document.getElementById("raidPinInput").value = savedPin;
    const navPinInput = document.getElementById("navRaidPinInput");
    if(navPinInput) navPinInput.value = savedPin;
    loadRaidByPin();
  }
}

function canAccessRaid(role, raid){
  return role === "master" || raids[raid].role === role;
}

function navRaidPinEnter(event){
  if(event.key === "Enter"){
    loadRaidFromNav();
  }
}

function loadRaidFromNav(){
  const navPinInput = document.getElementById("navRaidPinInput");
  const pinInput = document.getElementById("raidPinInput");

  if(navPinInput && pinInput){
    pinInput.value = navPinInput.value.trim();
  }

  loadRaidByPin();
}

function clearLeadPin(){
  const pinInput = document.getElementById("raidPinInput");
  const navPinInput = document.getElementById("navRaidPinInput");
  if(pinInput) pinInput.value = "";
  if(navPinInput) navPinInput.value = "";
  sessionStorage.removeItem("raidleadPrioPin");
  sessionStorage.removeItem("raidleadPlayerPin");
  document.getElementById("raidView")?.classList.add("hidden");
  document.getElementById("controlStatus").innerHTML = "Bitte LeadPIN eingeben.";
}

function isAllowedP0Raid(){
  return ["mc","bwl","aq40","naxx"].includes(currentRaidKey);
}

function isPlainP0Raid(){
  return ["zg","aq20"].includes(currentRaidKey);
}

function isP1OnlyRaid(){
  return currentRaidKey === "ony";
}

function hasP0Control(){
  return isAllowedP0Raid() || isPlainP0Raid();
}

function p0Label(){
  return isAllowedP0Raid() ? "P0+" : "P0";
}

function prioLabelText(){
  if(isP1OnlyRaid()) return "P1";
  if(isPlainP0Raid()) return "P1/P2/P3/P0";
  return "P1/P2/P3/P0+";
}

function isActiveFlag(value){
  const normalized = String(value || "").trim().toLowerCase();
  return value === true ||
    normalized === "true" ||
    normalized === "ja" ||
    normalized === "j" ||
    normalized === "1" ||
    normalized === "aktiv" ||
    normalized === "offen" ||
    normalized === "geöffnet" ||
    normalized === "freigeschaltet";
}

async function loadRaidByPin(){
  const pinInput = document.getElementById("raidPinInput");
  const navPinInput = document.getElementById("navRaidPinInput");
  const pin = (pinInput?.value || navPinInput?.value || "").trim();

  if(!pin){
    document.getElementById("controlStatus").innerHTML =
      `<span class="bad">Bitte Raidlead PIN eingeben.</span>`;
    return;
  }

  if(pinInput) pinInput.value = pin;
  if(navPinInput) navPinInput.value = pin;

  document.getElementById("controlStatus").innerHTML =
    `<span class="warn">Raid wird geladen …</span>`;

  const role = sessionStorage.getItem("raidleadRole") || "master";
  const possibleRaids = Object.keys(raids).filter(key => canAccessRaid(role,key));

  currentRaidKey = null;
  currentRaidData = null;
  currentPrios = [];
  currentReleased = false;
  currentPrioCheck = null;
  itemVisualMap = {};
  updateRaidBackground();

  for(const raidKey of possibleRaids){
    const found = await tryLoadRaidByPin(pin, raidKey);

    if(found){
      sessionStorage.setItem("raidleadPrioPin", pin);

      await loadItemVisualData();
      await loadP0PlusPoints();
      await loadRaidPrioCheck();

      document.getElementById("controlStatus").innerHTML =
        `<span class="ok">Raid geladen.</span>`;

      updateRaidBackground();
      renderRaidView();
      return;
    }
  }

  document.getElementById("raidView").classList.add("hidden");
  document.getElementById("controlStatus").innerHTML =
    `<span class="bad">Kein Raid zu dieser Raidlead PIN gefunden.</span>`;
}

async function tryLoadRaidByPin(pin, raidKey){
  currentRaidKey = raidKey;

  currentRaidData = {
    raid: raidKey,
    raidName: raids[raidKey].name,
    raidId: "",
    playerPin: "",
    leadPin: pin,
    playerLink: "",
    createdAt: "",
    status: ""
  };

  await loadPriosFromSheet(pin);

  const realRaidKey = raidKeyFromRaidId(currentRaidData.raidId);

  if(realRaidKey && realRaidKey !== raidKey){
    currentRaidKey = realRaidKey;
    currentRaidData.raid = realRaidKey;
    currentRaidData.raidName = raids[realRaidKey].name;
  }

  if(currentRaidData.raidId || currentPrios.length > 0){
    return true;
  }

  return false;
}

async function loadPriosFromSheet(leadPin){
  const url =
    RAID_API_URL +
    "?guild=" + encodeURIComponent(currentGuildSlug()) + "&action=getPublishedPrios" +
    "&raid=" + encodeURIComponent(raids[currentRaidKey].short) +
    "&leadPin=" + encodeURIComponent(leadPin) +
    "&t=" + Date.now();

  try{
    const response = await fetch(url);
    const result = await response.json();

    if(result.error){
      currentPrios = [];
      currentReleased = false;
      return;
    }

    currentRaidData.raidId = result.raidId || currentRaidData.raidId;

    currentRaidData.playerPin =
      result.playerPin ||
      result.prioPin ||
      result.PrioPIN ||
      result.PlayerPIN ||
      currentRaidData.playerPin;

    currentRaidData.playerLink =
      result.playerLink ||
      result.prioLink ||
      result.link ||
      result.Link ||
      currentRaidData.playerLink;

    currentRaidData.leadPin =
      result.leadPin ||
      result.LeadPIN ||
      result.raidleadPin ||
      result.RaidleadPIN ||
      currentRaidData.leadPin;

    currentRaidData.date =
      result.date ||
      result.Datum ||
      result.datum ||
      result.raidDate ||
      result.RaidDatum ||
      currentRaidData.date ||
      "";

    currentRaidData.time =
      result.time ||
      result.Uhrzeit ||
      result.uhrzeit ||
      result.raidTime ||
      result.RaidUhrzeit ||
      currentRaidData.time ||
      "";

    const publishedValue = result.published ?? result.status ?? result.Status ?? result.open ?? result.Offen ?? false;
    const apiReleased = isActiveFlag(publishedValue) || String(publishedValue || "").toLowerCase() === "published";

    const stickyKey = "raidOpen_" + (currentRaidData.raidId || result.raidId || "");
    const stickyOpen =
      sessionStorage.getItem(stickyKey) === "true" ||
      localStorage.getItem(stickyKey) === "true";
    currentReleased = apiReleased || stickyOpen;


    currentPrios = (result.prios || []).map(p => ({
      rowNumber: Number(p.rowNumber || p.RowNumber || p.zeile || p.Zeile || 0),
      player: p.Spieler || "",
      server: p.Server || "",
      class: p.Klasse || "",
      p1: p.P1 || "",
      p2: p.P2 || "",
      p3: p.P3 || "",
      p0Plus: p.P0Plus || "",
      bench: p.Bench || p.bench || p.Gebencht || ""
    }));

  }catch(error){
    console.error(error);
    currentPrios = [];
    currentReleased = false;
    currentPrioCheck = null;
  }
}

function normalizeDcPlayerName(value){
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/ä/g,"ae")
    .replace(/ö/g,"oe")
    .replace(/ü/g,"ue")
    .replace(/ß/g,"ss")
    .replace(/[^a-z0-9]/g,"");
}

function localPrioPlayerCount(){
  const players = new Set(
    (currentPrios || [])
      .map(entry => normalizeDcPlayerName(entry.player))
      .filter(Boolean)
  );
  return players.size || currentPrios.length;
}

async function loadRaidPrioCheck(){
  if(!currentRaidData || !currentRaidData.raidId){
    currentPrioCheck = null;
    return null;
  }

  const url =
    RAID_API_URL +
    "?guild=" + encodeURIComponent(currentGuildSlug()) + "&action=getPrioCheck" +
    "&raidId=" + encodeURIComponent(currentRaidData.raidId) +
    "&raid=" + encodeURIComponent(raids[currentRaidKey]?.short || "") +
    "&t=" + Date.now();

  try{
    const response = await fetch(url,{cache:"no-store"});
    const result = await response.json();

    currentPrioCheck =
      result && result.success
        ? (result.check || null)
        : null;
  }catch(error){
    console.warn("DC Abgleich konnte nicht geladen werden:", error);
    currentPrioCheck = null;
  }

  return currentPrioCheck;
}

function getDcMissingPrioCount(){
  const check = currentPrioCheck || {};
  const counts = check.counts || {};
  const signups = Number(counts.signups || counts.signup || counts.angemeldet || 0);
  const localPrios = localPrioPlayerCount();

  if(signups > 0){
    return Math.max(0, signups - localPrios);
  }

  if(Array.isArray(check.missingPrio)){
    return check.missingPrio.length;
  }

  return null;
}

function renderEntryMetrics(){
  const missing = getDcMissingPrioCount();
  const missingText = missing === null ? "-" : String(missing);
  const missingClass = missing === null ? "" : (missing > 0 ? "warn" : "ok");

  return `
    <div class="entry-metrics">
      <span class="entry-metric">Prios <strong>${currentPrios.length}</strong></span>
      <span class="entry-metric">DC fehlen <strong class="${missingClass}">${missingText}</strong></span>
    </div>
  `;
}

function getDcSignupCount(){
  const check = currentPrioCheck || {};
  const counts = check.counts || {};
  const signups = Number(counts.signups || counts.signup || counts.angemeldet || counts.registered || 0);

  if(signups > 0) return signups;

  if(Array.isArray(check.signups)) return check.signups.length;
  if(Array.isArray(check.players)) return check.players.length;
  if(Array.isArray(check.anmeldungen)) return check.anmeldungen.length;

  return null;
}

async function loadRaidleadItemOptions(){
  const url = LOOT_JSON_URLS[currentRaidKey];
  if(!url) return;

  if(raidleadItemOptionsRaidKey === currentRaidKey && raidleadItemOptions.length){
    refreshRaidleadItemPickerLists();
    return;
  }

  try{
    const visualNames = Object.values(itemVisualMap || {}).map(info => info.name).filter(Boolean);
    if(visualNames.length){
      raidleadItemOptions = [...new Set(visualNames)].sort((a,b) => a.localeCompare(b,"de"));
    }else{
      const response = await fetch(url + "?t=" + Date.now(), {cache:"no-store"});
      const rows = await response.json();
      raidleadItemOptions = [...new Set((Array.isArray(rows) ? rows : [])
        .map(obj => normalizeJsonLootItem(obj).name)
        .filter(Boolean))]
        .sort((a,b) => a.localeCompare(b,"de"));
    }
    raidleadItemOptionsRaidKey = currentRaidKey;
    refreshRaidleadItemPickerLists();
  }catch(error){
    console.warn("Loot-Vorschläge konnten nicht geladen werden:", error);
  }
}

function toggleRaidleadItemPicker(slot){

  document.querySelectorAll(".raidlead-item-menu").forEach(el => {
    if(el !== menu) el.classList.add("hidden");

  menu.classList.toggle("hidden");
  if(!menu.classList.contains("hidden")){
    filterRaidleadItemPicker(slot);
    setTimeout(() => search?.focus(), 0);

  const search = document.getElementById("raidleadPrio" + slot + "Search");

function normalizeClassName(className){
  return String(className || "")
    .toLowerCase()
    .trim()
    .replace("ä","ae")
    .replace("ö","oe")
    .replace("ü","ue");
}

function getClassOrderValue(className){
  const normalized = normalizeClassName(className);
  const index = classOrder.findIndex(c => normalizeClassName(c) === normalized);
  return index === -1 ? 999 : index;
}

function getFilteredAndSortedPrios(){
  const search = document.getElementById("prioSearch")
    ? document.getElementById("prioSearch").value.trim().toLowerCase()
    : "";

  let data = [...currentPrios];

  if(search){
    data = data.filter(entry => {
      return [
        entry.player,
        entry.class,
        entry.p1,
        entry.p2,
        entry.p3,
        String(entry.p0Plus).toLowerCase() === "ja" ? entry.p1 : "",
        renderP0PlusPointsText(entry.p1)
      ].join(" ").toLowerCase().includes(search);
    });
  }

  data.sort((a,b) => {
    const classA = getClassOrderValue(a.class);
    const classB = getClassOrderValue(b.class);

    if(classA !== classB) return classA - classB;
    return String(a.player || "").localeCompare(String(b.player || ""),"de");
  });

  return data;
}

function isBenchPrio(entry){
  const value = String(entry && (entry.bench || entry.Bench || entry.status) || "").trim().toLowerCase();
  return value === "ja" || value === "true" || value === "1" || value === "bench" || value === "gebencht" || value === "benched";
}

function renderBenchName(entry){
  return `${safe(entry.player || "-")}${isBenchPrio(entry) ? '<span class="bench-label">Bench</span>' : ""}`;
}

function renderBenchButton(entry){

  const active = isBenchPrio(entry);
  const rowNumber = Number(entry.rowNumber || 0);
  return `
    <button class="btn ${active ? "neutral" : "warning"} small-btn"
      onclick="setPrioBench(${rowNumber},${active ? "false" : "true"},'${escapeQuotes(entry.player)}','${escapeQuotes(entry.server)}')">
      ${active ? "Mitnehmen" : "Bench"}
    </button>
  `;
}


function normalizeP0Text(value){
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/[’'`´]/g,"")
    .replace(/ä/g,"ae")
    .replace(/ö/g,"oe")
    .replace(/ü/g,"ue")
    .replace(/ß/g,"ss")
    .replace(/[-–—]/g," ")
    .replace(/\s+/g," ");
}

function getP0Field(entry,names){
  for(const name of names){
    const value = entry && entry[name];
    if(value !== undefined && value !== null && String(value).trim() !== ""){
      return String(value).trim();
    }
  }
  return "";
}

function normalizeP0Entry(entry){
  const item = getP0Field(entry,["item","Item","itemName","ItemName","Itemname","Itemname_DE","name","Name"]);
  const player = getP0Field(entry,["player","Player","spieler","Spieler","char","Char","character","Character"]);
  const points = getP0Field(entry,["points","Points","punkte","Punkte","count","Count","anzahl","Anzahl"]);
  const raid = getP0Field(entry,["raid","Raid","RAID"]);

  if(!item || !player) return null;

  return {
    raid: raid,
    item: item,
    player: player,

async function loadP0PlusPoints(){
  if(!isAllowedP0Raid()){
    currentP0PlusEntries = [];
    return [];
  }

  const url = RAID_API_URL +
    "?guild=" + encodeURIComponent(currentGuildSlug()) + "&action=getP0Plus" +
    "&all=1" +
    "&nocache=1" +
    "&refresh=1" +
    "&t=" + Date.now() + "_" + Math.random().toString(36).slice(2);

  try{
    const response = await fetch(url,{cache:"no-store"});
    const result = await response.json();
    const raw = Array.isArray(result.entries) ? result.entries : [];
    currentP0PlusEntries = raw.map(normalizeP0Entry).filter(Boolean);
    return currentP0PlusEntries;
  }catch(error){
    console.warn("P0+ Punkte konnten nicht geladen werden:", error);
    currentP0PlusEntries = [];
    return [];
  }
}

function getP0PlusEntriesForItem(itemName){
  const wanted = normalizeP0Text(itemName);
  if(!wanted) return [];

  const currentRaidShort = String(raids[currentRaidKey]?.short || currentRaidKey || "").toUpperCase();
  const currentRaidName = String(raids[currentRaidKey]?.name || currentRaidKey || "").toUpperCase();

  const entries = currentP0PlusEntries.filter(entry => {
    if(normalizeP0Text(entry.item) !== wanted) return false;

    const entryRaid = String(entry.raid || "").toUpperCase();
    if(!entryRaid) return true;

    return entryRaid === currentRaidShort || entryRaid === currentRaidName || entryRaid === String(currentRaidKey || "").toUpperCase();
  });

  const grouped = new Map();
  entries.forEach(entry => {
    const player = String(entry.player || "").trim();
    const points = Number(String(entry.points || "0").replace(",",".")) || 0;
    if(!player) return;
    grouped.set(player, Math.max(grouped.get(player) || 0, points));
  });

  return Array.from(grouped.entries())
    .map(([player,points]) => ({player,points}))
    .sort((a,b) => b.points - a.points || a.player.localeCompare(b.player,"de"));
}

function renderP0PlusPointsText(itemName){
  return getP0PlusEntriesForItem(itemName)
    .map(entry => entry.player + " " + entry.points)
    .join(" ");
}

async function sendRaidStatus(status){
  const raidId = currentRaidData?.raidId || "";
  const leadPin = currentRaidData?.leadPin || document.getElementById("raidPinInput")?.value.trim() || "";

  if(!raidId && !leadPin){
    alert("RaidID oder Raidlead PIN fehlt.");
    return false;
  }

  const url =
    RAID_API_URL +
    "?guild=" + encodeURIComponent(currentGuildSlug()) + "&action=setRaidStatus" +
    "&raidId=" + encodeURIComponent(raidId) +
    "&leadPin=" + encodeURIComponent(leadPin) +
    "&status=" + encodeURIComponent(status) +
    "&t=" + Date.now();

  try{
    let result = null;
    try{
      const response = await fetch(url, {method:"GET",cache:"no-store"});
      result = await response.json();
    }catch(error){
      result = await new Promise((resolve,reject)=>{
        const callbackName = "raidStatusCb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
        const script = document.createElement("script");
        window[callbackName] = function(data){
          delete window[callbackName];
          if(script.parentNode) script.parentNode.removeChild(script);
          resolve(data || {});
        };
        script.onerror = function(){
          delete window[callbackName];
          if(script.parentNode) script.parentNode.removeChild(script);
          reject(error);
        };
        script.src = url + "&callback=" + encodeURIComponent(callbackName);
        document.body.appendChild(script);
      });
    }

    if(!result || result.success === false || result.error){
      alert((result && result.error) || "Priolisten-Status konnte nicht gespeichert werden.");
      return false;
    }

    if(status === "geöffnet"){
      sessionStorage.setItem("raidOpen_" + raidId, "true");
      localStorage.setItem("raidOpen_" + raidId, "true");
    }else{
      sessionStorage.removeItem("raidOpen_" + raidId);
      localStorage.removeItem("raidOpen_" + raidId);
    }

    return true;
  }catch(error){
    console.error(error);
    alert("Priolisten-Status konnte nicht gesendet werden.");
    return false;
  }
}

function parseCSV(text){
  const rows=[];
  let row=[];
  let value="";
  let insideQuotes=false;

  for(let i=0;i<text.length;i++){
    const char=text[i];
    const next=text[i+1];

    if(char === '"' && insideQuotes && next === '"'){
      value+='"';
      i++;
    }else if(char === '"'){
      insideQuotes=!insideQuotes;
    }else if(char === "," && !insideQuotes){
      row.push(value);
      value="";
    }else if((char === "\n" || char === "\r") && !insideQuotes){
      if(value || row.length){
        row.push(value);
        rows.push(row);
        row=[];
        value="";
      }
      if(char === "\r" && next === "\n") i++;
    }else{
      value+=char;
    }
  }

  if(value || row.length){
    row.push(value);
    rows.push(row);
  }

  return rows;
}

function normalizeQuality(value){
  const q = String(value || "").toLowerCase().trim();

  if(q.includes("legendary") || q.includes("legendär") || q.includes("orange")) return "legendary";
  if(q.includes("epic") || q.includes("episch") || q.includes("lila")) return "epic";
  if(q.includes("rare") || q.includes("selten") || q.includes("blau")) return "rare";
  if(q.includes("uncommon") || q.includes("ungewöhnlich") || q.includes("grün") || q.includes("gruen")) return "uncommon";
  if(q.includes("common") || q.includes("gewöhnlich") || q.includes("weiß") || q.includes("weiss")) return "common";
  if(q.includes("poor") || q.includes("schlecht") || q.includes("grau")) return "poor";
  if(q.includes("artifact") || q.includes("artefakt")) return "artifact";
  if(q.includes("heirloom")) return "heirloom";

  return "";
}


function normalizeJsonLootItem(obj){
  const item = obj.name || obj.Itemname_DE || obj.Itemname || obj.Item || obj.item || obj.Name || obj.name || "";
  const itemId = obj.itemId || obj.ItemID || obj.ID || obj.id || "";
  const iconName = obj.iconName || obj.IconName || obj.WowheadIcon || obj.Iconname || obj.icon || obj.Icon || "";
  const stats = Array.isArray(obj.stats)
    ? obj.stats
    : String(obj.statsText || obj.Stats_DE || obj.Stats || obj.Werte || obj.tooltip || obj.Tooltip_DE || "")
        .split("|")
        .map(v => v.trim())
        .filter(Boolean);

  return {
    name:String(item || "").trim(),
    itemId:String(itemId || "").trim(),
    quality:normalizeQuality(obj.quality || obj.Qualität || obj.Quality || obj.Seltenheit || obj.Rarity || "") || "epic",
    iconName:String(iconName || "").trim(),
    boss:obj.boss || obj.Boss || "",
    slot:obj.slot || obj.Slot_DE || obj.Slot || "",
    type:obj.type || obj.Typ_DE || obj.Typ || obj.Type || "",
    dropchance:obj.dropChance || obj.Dropchance || obj.dropchance || "",
    tooltipText:obj.tooltip || obj.Tooltip_DE || obj.Tooltip || "",
    stats:stats
  };
}
async function loadItemVisualData(){
  itemVisualMap = {};
  itemIdMap = {};

  const url = LOOT_JSON_URLS[currentRaidKey];

  if(!url){
    return;
  }

  try{
    const response = await fetch(url + "?t=" + Date.now(), {cache:"no-store"});
    const rows = await response.json();

    (Array.isArray(rows) ? rows : []).forEach(obj => {
      const info = normalizeJsonLootItem(obj);
      if(!info.name) return;

      const key = itemKey(info.name);
      itemVisualMap[key] = info;

      if(info.itemId){
        itemIdMap[key] = info.itemId;
      }
    });

  }catch(error){
    console.error("GitHub-Itemdaten konnten nicht geladen werden:", currentRaidKey, error);
  }
}

function getClassColorClass(className){
  const c = String(className || "").toLowerCase();

  if(c.includes("krieger") || c.includes("warrior")) return "class-warrior";
  if(c.includes("paladin")) return "class-paladin";
  if(c.includes("jäger") || c.includes("jaeger") || c.includes("hunter")) return "class-hunter";
  if(c.includes("schurke") || c.includes("rogue")) return "class-rogue";
  if(c.includes("priester") || c.includes("priest")) return "class-priest";
  if(c.includes("schamane") || c.includes("shaman")) return "class-shaman";
  if(c.includes("magier") || c.includes("mage")) return "class-mage";
  if(c.includes("hexenmeister") || c.includes("warlock")) return "class-warlock";
  if(c.includes("druide") || c.includes("druid")) return "class-druid";

  return "";
}

function renderClass(className){
  const name = String(className || "").trim();

  if(!name){
    return "-";
  }

  return `
    <span class="class-badge ${getClassColorClass(name)}">
      ${safe(name)}
    </span>
  `;
}

function getIconUrl(iconName){
  const raw = String(iconName || "").trim();
  if(!raw) return "https://wow.zamimg.com/images/wow/icons/large/inv_misc_questionmark.jpg";
  if(/^https?:\/\//i.test(raw)) return raw;
  if(/^\d+$/.test(raw)) return "https://wow.zamimg.com/images/wow/icons/large/inv_misc_questionmark.jpg";
  const clean = raw.toLowerCase().replace(/\.jpg$|\.png$/g,"");
  return "https://wow.zamimg.com/images/wow/icons/large/" + clean + ".jpg";
}

function iconFallback(img){
  img.src = "https://wow.zamimg.com/images/wow/icons/large/inv_misc_questionmark.jpg";
}

function findItemInfo(itemName){
  return itemVisualMap[itemKey(itemName)] || null;
}

function renderTooltipLines(text){
  return String(text || "")
    .split("|")
    .map(s => s.trim())
    .filter(Boolean)
    .map(line => {
      const cls =
        line.startsWith("+") ||
        line.startsWith("Anlegen:") ||
        line.startsWith("Benutzen:") ||
        line.startsWith("Trefferchance:") ||
        line.startsWith("Chance bei Treffer:")
          ? "tooltip-equip"
          : "tooltip-row";
      return `<div class="${cls}">${safe(line)}</div>`;
    }).join("");
}

function showTooltip(event,itemName){
  const tooltip = document.getElementById("tooltip");
  const item = findItemInfo(itemName);
  if(!tooltip || !item) return;

  const stats = (item.stats || [])
    .map(stat => `<div class="tooltip-stat">${safe(stat)}</div>`)
    .join("");

  tooltip.innerHTML = `
    <div class="tooltip-title ${safe(item.quality || "epic")}">${safe(item.name || itemName)}</div>
    <div class="tooltip-ilvl">${item.itemId ? "ItemID: " + safe(item.itemId) : safe(raids[currentRaidKey]?.name || "")}</div>
    ${item.slot || item.type ? `<div class="tooltip-row">${safe(item.slot || "")} ${safe(item.type || "")}</div>` : ""}
    ${item.boss ? `<div class="tooltip-row"><strong>Boss:</strong> ${safe(item.boss)}</div>` : ""}
    ${item.dropchance ? `<div class="tooltip-row"><strong>Dropchance:</strong> ${safe(item.dropchance)}</div>` : ""}
    ${stats}
    ${renderTooltipLines(item.tooltipText)}
    ${renderTooltipP0Plus(item.name || itemName)}
  `;

  tooltip.classList.remove("hidden");
  moveTooltip(event);
}

function moveTooltip(event){
  const tooltip = document.getElementById("tooltip");
  if(!tooltip || tooltip.classList.contains("hidden")) return;
  tooltip.style.left = (window.scrollX + event.clientX + 12) + "px";
  tooltip.style.top = (window.scrollY + event.clientY - 10) + "px";
}

function hideTooltip(){
  const tooltip = document.getElementById("tooltip");
  if(tooltip) tooltip.classList.add("hidden");
}

function renderItem(itemName){
  const name = String(itemName || "").trim();

  if(!name){
    return "-";
  }

  const info = itemVisualMap[itemKey(name)] || {};
  const quality = info.quality || "epic";
  const itemId = info.itemId || "";
  const iconName = info.iconName || "";
  const className = "item-" + quality;
  const icon = `
    <img
      class="item-icon"
      src="${getIconUrl(iconName)}"
      alt=""
      loading="lazy"
      onerror="iconFallback(this)"
    >
  `;

  const tooltipAttrs = `
    onmouseenter="showTooltip(event,'${escapeQuotes(name)}')"
    onmousemove="moveTooltip(event)"
    onmouseleave="hideTooltip()"
  `;

  if(itemId){
    return `
      <a class="item-link ${className} item-with-icon"
         href="https://www.wowhead.com/classic/item=${safe(itemId)}"
         target="_blank"
         rel="noopener noreferrer"
         ${tooltipAttrs}>
        ${icon}
        <span>${safe(name)}</span>
      </a>
    `;
  }

  return `
    <span class="item-name ${className} item-with-icon" ${tooltipAttrs}>
      ${icon}
      <span>${safe(name)}</span>
    </span>
  `;
}

async function loadItemIdsForExport(){
  itemIdMap = {};

  const url = LOOT_JSON_URLS[currentRaidKey];

  if(!url){
    return;
  }

  try{
    const response = await fetch(url + "?t=" + Date.now(), {cache:"no-store"});
    const rows = await response.json();

    (Array.isArray(rows) ? rows : []).forEach(obj => {
      const info = normalizeJsonLootItem(obj);
      if(!info.name || !info.itemId) return;
      itemIdMap[itemKey(info.name)] = info.itemId;
    });
  }catch(error){
    console.error("ItemIDs für Export konnten nicht geladen werden:", currentRaidKey, error);
  }
}

function formatItemForPrio3(itemName){
  const name = String(itemName || "").trim();

  if(!name || name === "-"){
    return "-0";
  }

  if(/\-\d+$/.test(name)){
    return name;
  }

  const id = itemIdMap[itemKey(name)];

  if(!id){
    return name;
  }

  return name + "-" + id;
}

async function downloadPrio3ReforgedExport(){
  if(!currentRaidData){
    alert("Kein Raid geladen.");
    return;
  }

  if(!currentPrios || currentPrios.length === 0){
    alert("Keine Prios vorhanden.");
    return;
  }

  await loadItemIdsForExport();

  let content = "";

  currentPrios
    .filter(entry => !isBenchPrio(entry))
    .forEach(entry => {
    const player = entry.player || "";
    const playerClass = entry.class || "";

    const p1 = formatItemForPrio3(entry.p1);
    const p2 = formatItemForPrio3(entry.p2);
    const p3 = formatItemForPrio3(entry.p3);

    content +=
      player + "\t\t" +
      playerClass + "\t" +
      p1 + "\t" +
      p2 + "\t" +
      p3 + "\n";
  });

  const filename =
    (currentRaidData.raidId || currentRaidKey || "raid") +
    "-prio3-reforged.txt";

  const blob = new Blob([content], {
    type:"text/plain;charset=utf-8"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = filename;
  a.click();

  URL.revokeObjectURL(url);
}

let addonItemInfoMap = {};

async function loadLootDataForAddonExport(){
  addonItemInfoMap = {};

  const url = LOOT_JSON_URLS[currentRaidKey];
  if(!url) return;

  try{
    const response = await fetch(url + "?t=" + Date.now(), {cache:"no-store"});
    const rows = await response.json();

    (Array.isArray(rows) ? rows : []).forEach(obj => {
      const info = normalizeJsonLootItem(obj);
      if(!info.name) return;

      addonItemInfoMap[itemKey(info.name)] = {
        boss: info.boss || "",
        slot: info.slot || "",
        typ: info.type || "",
        icon: info.iconName || obj.iconName || obj.IconName || "",
        itemId: info.itemId || ""
      };
    });

  }catch(error){
    console.error(error);
    alert("Iteminfos konnten nicht vollständig geladen werden.");
  }
}

async function downloadAddonExport(){

  if(!currentPrios || currentPrios.length === 0){
    alert("Keine Priodaten vorhanden.");
    return;
  }

  await loadLootDataForAddonExport();

  let exportText =
  "Raid;Boss;Slot;Typ;Item;Icon;Spieler;Punkte";

  currentPrios.forEach(entry => {

    const player = entry.player || "";

    if(
      String(entry.p0Plus || "").toLowerCase() === "ja"
      && entry.p1
    ){
      const info = addonItemInfoMap[itemKey(entry.p1)] || {};

      if(exportText){
        exportText += "||";
      }

      exportText +=
        raids[currentRaidKey].name + ";" +
        (info.boss || "") + ";" +
        (info.slot || "") + ";" +
        (info.typ || "") + ";" +
        entry.p1 + ";" +
        (info.icon || "") + ";" +
        player + ";" +
        "1";
    }

  });

  navigator.clipboard.writeText(exportText);

  alert(
    "Addon Export wurde in die Zwischenablage kopiert.\n\n" +
    exportText
  );
}
  
function backToRaidPrio(){
  if(!currentRaidKey || !currentRaidData){
    alert("Kein Raid geladen.");
    return;
  }

  window.location.href =
    guildUrl(raids[currentRaidKey].lootPage +
    "?pin=" +
    encodeURIComponent(currentRaidData.playerPin || ""));

function logout(){
  if(prioCheckTimer) clearInterval(prioCheckTimer);
  sessionStorage.removeItem("raidlead");
  sessionStorage.removeItem("raidleadRole");
  sessionStorage.removeItem("raidleadRaidId");
  sessionStorage.removeItem("raidleadPrioPin");
  sessionStorage.removeItem("raidleadPlayerPin");
  window.location.href = guildUrl("index.html");
}

function safe(value){
  return String(value || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function escapeQuotes(value){
  return String(value || "")
    .replace(/\\/g,"\\\\")
    .replace(/'/g,"\\'");
}
