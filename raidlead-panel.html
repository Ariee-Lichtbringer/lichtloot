<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lichtbringer – Raidlead Panel</title>

<style>
:root{
  --gold:#facc15;
  --panel:rgba(12,18,32,.90);
  --text:#f8fafc;
  --muted:#cbd5e1;
  --line:rgba(255,255,255,.12);
  --danger:#ef4444;
  --green:#22c55e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--text);
  background:
    linear-gradient(rgba(8,17,31,.82),rgba(8,17,31,.94)),
    url('./images/back.jpeg');
  background-size:cover;
  background-position:center top;
  background-attachment:fixed;
}
.overlay{
  min-height:100vh;
  padding:36px 22px 70px;
  backdrop-filter:blur(3px);
}
.topbar,.header,.raid-card{
  width:min(1300px,100%);
  margin:auto;
}
.topbar{
  margin-bottom:28px;
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:center;
  flex-wrap:wrap;
}
.btn-link,.btn{
  color:var(--text);
  text-decoration:none;
  font-weight:900;
  border:1px solid var(--line);
  padding:12px 16px;
  border-radius:14px;
  background:rgba(12,18,32,.72);
  cursor:pointer;
  display:inline-block;
  text-align:center;
}
.btn:hover,.btn-link:hover{
  border-color:rgba(250,204,21,.55);
}
.header{
  margin-bottom:22px;
  padding:30px;
  border-radius:24px;
  background:var(--panel);
  border:1px solid rgba(250,204,21,.22);
  box-shadow:0 20px 45px rgba(0,0,0,.45);
}
h1{
  color:var(--gold);
  font-size:clamp(34px,5vw,58px);
  margin-bottom:8px;
}
.subtitle{
  color:#dbeafe;
  line-height:1.7;
  font-size:15px;
}
.raid-card{
  margin-bottom:22px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:22px;
  padding:24px;
  box-shadow:0 18px 40px rgba(0,0,0,.38);
}
h2{
  color:var(--gold);
  margin-bottom:14px;
  font-size:25px;
}
h3{
  color:#dbeafe;
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:.12em;
  margin-top:20px;
  margin-bottom:10px;
}
label{
  display:block;
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  margin:12px 0 7px;
  text-transform:uppercase;
  letter-spacing:.08em;
}
input{
  width:100%;
  padding:12px 13px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(2,6,23,.82);
  color:white;
  font-size:14px;
}
.pin-grid{
  display:grid;
  grid-template-columns:1fr auto;
  gap:14px;
  align-items:end;
}
.status{
  margin:14px 0;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--line);
  background:rgba(2,6,23,.55);
  color:#dbeafe;
  line-height:1.6;
  font-size:14px;
}
.ok{color:var(--green);font-weight:900}
.warn{color:var(--gold);font-weight:900}
.bad{color:var(--danger);font-weight:900}
.button-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}
.btn.neutral{
  background:linear-gradient(135deg,rgba(96,165,250,.22),rgba(15,23,42,.65));
  border-color:rgba(96,165,250,.25);
}
.btn.success{
  background:linear-gradient(135deg,rgba(34,197,94,.28),rgba(15,23,42,.65));
  border-color:rgba(34,197,94,.35);
}
.btn.warning{
  background:linear-gradient(135deg,rgba(250,204,21,.24),rgba(15,23,42,.65));
  border-color:rgba(250,204,21,.35);
}
.btn.danger{
  background:linear-gradient(135deg,rgba(239,68,68,.35),rgba(15,23,42,.65));
  border-color:rgba(239,68,68,.40);
}
.btn.small-btn{
  padding:8px 10px;
  border-radius:10px;
  font-size:12px;
  margin-top:0;
  width:auto;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:14px;
  font-size:14px;
}
th,td{
  padding:9px;
  border-bottom:1px solid rgba(255,255,255,.10);
  text-align:left;
  vertical-align:top;
}
th{
  color:var(--gold);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
}
.check{color:var(--green);font-weight:900;font-size:17px}
.cross{color:var(--danger);font-weight:900;font-size:17px}
.hidden{display:none!important}
@media(max-width:1000px){
  .pin-grid{grid-template-columns:1fr}
  .button-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="overlay">

<div class="topbar">
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <a class="btn-link" href="index.html">← Zurück zur Startseite</a>
    <button class="btn-link" onclick="backToRaidPrio()">← Zurück zur Prio-Auswahl</button>
  </div>

  <button class="btn danger" onclick="logout()">Logout</button>
</div>

<div class="header">
  <h1>Raidlead Panel</h1>
  <div class="subtitle">
    Lade den Raid über die PrioPIN und verwalte die aktuelle Prioliste.
  </div>

  <div id="roleInfo" class="status"></div>

  <div class="status">
    <label>Raidlead PIN</label>
    <div class="pin-grid">
      <input id="raidPinInput" type="text" placeholder="Raidlead Pin eingeben">
      <button class="btn neutral" onclick="loadRaidByPin()">PrioPIN laden</button>
    </div>

    <div id="controlStatus" style="margin-top:10px">
      Bitte PrioPIN eingeben.
    </div>
  </div>
</div>

<div id="raidView" class="raid-card hidden"></div>

<script>
const RAID_API_URL =
  "https://script.google.com/macros/s/AKfycbzwRZ1908IawmEh3WdROu_TBwfu8Yr1YXJ1VicqEIf15eZ2zzRE3Yw9OaaeJ0ZADbye2g/exec";

const raids = {
  mc:{name:"Molten Core",short:"MC",role:"mc-bwl",lootPage:"loot/mc-loot.html",overviewPage:"molten-core.html"},
  bwl:{name:"Blackwing Lair",short:"BWL",role:"mc-bwl",lootPage:"loot/bwl-loot.html",overviewPage:"bwl.html"},
  aq40:{name:"Ahn'Qiraj 40",short:"AQ40",role:"aq40",lootPage:"loot/aq40-loot.html",overviewPage:"aq.html"},
  naxx:{name:"Naxxramas",short:"NAXX",role:"naxx",lootPage:"loot/naxx-loot.html",overviewPage:"naxxramas.html"},
  zg:{name:"ZG 20",short:"ZG",role:"zg-aq20",lootPage:"loot/zg-loot.html",overviewPage:"zg.html"},
  aq20:{name:"AQ 20",short:"AQ20",role:"zg-aq20",lootPage:"loot/aq20-loot.html",overviewPage:"aq20.html"},
  ony:{name:"Onyxia",short:"ONY",role:"ony",lootPage:"loot/ony-loot.html",overviewPage:"ony.html"}
};

const LOOT_CSV_URLS = {
  mc:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_MC",
  bwl:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_BWL",
  aq40:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_AQ40",
  naxx:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_NAXX",
  zg:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_ZG",
  aq20:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_AQ20",
  ony:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_ONY"
};

let currentRaidKey = null;
let currentRaidData = null;
let currentPrios = [];
let currentReleased = false;
let itemIdMap = {};
function raidKeyFromRaidId(raidId){
  const id = String(raidId || "").toUpperCase();

  if(id.startsWith("ZG-")) return "zg";
  if(id.startsWith("AQ20-")) return "aq20";
  if(id.startsWith("AQ40-")) return "aq40";
  if(id.startsWith("BWL-")) return "bwl";
  if(id.startsWith("MC-")) return "mc";
  if(id.startsWith("NAXX-")) return "naxx";
  if(id.startsWith("ONY-")) return "ony";

  return null;
}
function checkLogin(){
  const isLoggedIn = sessionStorage.getItem("raidlead");
  const role = sessionStorage.getItem("raidleadRole");

  if(isLoggedIn !== "true" || !role){
    alert("Bitte zuerst über die Startseite einloggen.");
    window.location.href = "index.html";
    return;
  }

  document.getElementById("roleInfo").innerHTML =
    `<span class="ok">Login aktiv.</span> Rolle: <strong>${role}</strong>`;

  const savedPin =
    sessionStorage.getItem("raidleadPrioPin") ||
    sessionStorage.getItem("raidleadPlayerPin") ||
    "";

  if(savedPin){
    document.getElementById("raidPinInput").value = savedPin;
    loadRaidByPin();
  }
}

function canAccessRaid(role, raid){
  return role === "master" || raids[raid].role === role;
}

async function loadRaidByPin(){
  const pin = document.getElementById("raidPinInput").value.trim();

  if(!pin){
    document.getElementById("controlStatus").innerHTML =
      `<span class="bad">Bitte PrioPIN eingeben.</span>`;
    return;
  }

  document.getElementById("controlStatus").innerHTML =
    `<span class="warn">Raid wird geladen …</span>`;

  const role = sessionStorage.getItem("raidleadRole") || "master";
  const possibleRaids = Object.keys(raids).filter(key => canAccessRaid(role,key));

  currentRaidKey = null;
  currentRaidData = null;
  currentPrios = [];
  currentReleased = false;

  for(const raidKey of possibleRaids){
    const found = await tryLoadRaidByPin(pin, raidKey);

    if(found){
      sessionStorage.setItem("raidleadPrioPin", pin);

      document.getElementById("controlStatus").innerHTML =
        `<span class="ok">Raid geladen.</span> ${raids[raidKey].name} · PrioPIN: <strong>${pin}</strong>`;

      renderRaidView();
      return;
    }
  }

  document.getElementById("raidView").classList.add("hidden");
  document.getElementById("controlStatus").innerHTML =
    `<span class="bad">Kein Raid zu dieser PrioPIN gefunden.</span>`;
}

async function tryLoadRaidByPin(pin, raidKey){
  currentRaidKey = raidKey;

  currentRaidData = {
    raid: raidKey,
    raidName: raids[raidKey].name,
    raidId: "",
    playerPin: pin,
    leadPin: "",
    playerLink: "",
    createdAt: "",
    status: ""
  };

  await loadPriosFromSheet(pin);

const realRaidKey =
  raidKeyFromRaidId(currentRaidData.raidId);

if(realRaidKey && realRaidKey !== raidKey){
  currentRaidKey = realRaidKey;
  currentRaidData.raid = realRaidKey;
  currentRaidData.raidName = raids[realRaidKey].name;
}

if(currentRaidData.raidId || currentPrios.length > 0){
  return true;
}

  return false;
}

async function loadPriosFromSheet(playerPin){
  const url =
    RAID_API_URL +
    "?action=getPublishedPrios" +
    "&raid=" + encodeURIComponent(raids[currentRaidKey].short) +
    "&playerPin=" + encodeURIComponent(playerPin) +
    "&t=" + Date.now();

  try{
    const response = await fetch(url);
    const result = await response.json();

    if(result.error){
      currentPrios = [];
      currentReleased = false;
      return;
    }

    currentRaidData.raidId = result.raidId || currentRaidData.raidId;
    currentReleased = Boolean(result.published);

    currentPrios = (result.prios || []).map(p => ({
      player: p.Spieler || "",
      server: p.Server || "",
      class: p.Klasse || "",
      p1: p.P1 || "",
      p2: p.P2 || "",
      p3: p.P3 || "",
      p0Plus: p.P0Plus || ""
    }));

  }catch(error){
    console.error(error);
    currentPrios = [];
    currentReleased = false;
  }
}

function renderRaidView(){
  const view = document.getElementById("raidView");

  if(!currentRaidKey || !currentRaidData){
    view.classList.add("hidden");
    return;
  }

  const r = raids[currentRaidKey];
  view.classList.remove("hidden");

  view.innerHTML = `
    <h2>${r.name}</h2>

    <div class="status">
      Aktiver Raid: <strong>${currentRaidData.raidId || "über PrioPIN geladen"}</strong><br>
      PrioPIN für Spieler: <strong>${currentRaidData.playerPin || "-"}</strong><br>
      Raidlead PIN: <strong>${currentRaidData.leadPin || "-"}</strong><br>
      Eingetragene Spieler: <strong>${currentPrios.length}</strong><br>
      Prioliste: ${
        currentReleased
          ? '<span class="ok">geöffnet / Items sichtbar</span>'
          : '<span class="warn">geschlossen / nur Haken sichtbar</span>'
      }
    </div>

    <h3>Raidverwaltung</h3>
    <div class="button-grid">
      <button class="btn neutral" onclick="openPrio()">Prioseite öffnen</button>
      <button class="btn neutral" onclick="openOverview()">P0+ Übersicht öffnen</button>
      <button class="btn neutral" onclick="reloadCurrentRaid()">Aktualisieren</button>
    </div>

    <h3>Prioliste</h3>
    <div class="button-grid">
      <button class="btn success" onclick="releaseList()">Prioliste öffnen</button>
      <button class="btn warning" onclick="closeList()">Prioliste schließen</button>
      <button class="btn neutral" onclick="downloadPrio3ReforgedExport()">Prio3 Reforged Export</button>
    </div>

    <h3>Aktuelle Einträge</h3>
    <div class="status">
      ${
        currentReleased
          ? "Die Prioliste ist geöffnet. Die Itemnamen sind sichtbar."
          : "Die Prioliste ist geschlossen. Es wird nur angezeigt, ob P1/P2/P3/P0 gesetzt wurden."
      }
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Spieler</th>
          <th>Server</th>
          <th>Klasse</th>
          <th>P1</th>
          <th>P2</th>
          <th>P3</th>
          <th>P0</th>
          <th>Aktion</th>
        </tr>
      </thead>
      <tbody>
        ${renderRows()}
      </tbody>
    </table>
  `;
}

function renderRows(){
  if(currentPrios.length === 0){
    return `<tr><td colspan="9">Noch keine Einträge vorhanden.</td></tr>`;
  }

  return currentPrios.map((entry,index)=>{
    const isP0Plus =
      entry.p1 &&
      entry.p1 === entry.p2 &&
      entry.p2 === entry.p3;

    if(!currentReleased){
      return `
        <tr>
          <td>${index + 1}</td>
          <td>${safe(entry.player || "-")}</td>
          <td>${safe(entry.server || "-")}</td>
          <td>${safe(entry.class || "-")}</td>
          <td>${entry.p1 ? '<span class="check">✓</span>' : '<span class="cross">✗</span>'}</td>
          <td>${entry.p2 ? '<span class="check">✓</span>' : '<span class="cross">✗</span>'}</td>
          <td>${entry.p3 ? '<span class="check">✓</span>' : '<span class="cross">✗</span>'}</td>
          <td>${isP0Plus ? '<span class="check">✓</span>' : '<span class="cross">✗</span>'}</td>
          <td><button class="btn danger small-btn" onclick="deleteSinglePrio('${escapeQuotes(entry.player)}','${escapeQuotes(entry.server)}')">Löschen</button></td>
        </tr>
      `;
    }

    return `
      <tr>
        <td>${index + 1}</td>
        <td>${safe(entry.player || "-")}</td>
        <td>${safe(entry.server || "-")}</td>
        <td>${safe(entry.class || "-")}</td>
        <td>${safe(entry.p1 || "-")}</td>
        <td>${safe(entry.p2 || "-")}</td>
        <td>${safe(entry.p3 || "-")}</td>
        <td>${isP0Plus ? '<span class="warn">ja</span>' : 'nein'}</td>
        <td><button class="btn danger small-btn" onclick="deleteSinglePrio('${escapeQuotes(entry.player)}','${escapeQuotes(entry.server)}')">Löschen</button></td>
      </tr>
    `;
  }).join("");
}
async function reloadCurrentRaid(){
  if(!currentRaidData || !currentRaidData.playerPin){
    alert("Kein Raid geladen.");
    return;
  }

  await loadPriosFromSheet(currentRaidData.playerPin);
  renderRaidView();
}

function openPrio(){
  if(!currentRaidKey || !currentRaidData){
    alert("Kein Raid geladen.");
    return;
  }

  window.location.href =
    raids[currentRaidKey].lootPage +
    "?pin=" +
    encodeURIComponent(currentRaidData.playerPin);
}

function openOverview(){
  if(!currentRaidKey){
    alert("Kein Raid geladen.");
    return;
  }

  window.location.href = raids[currentRaidKey].overviewPage;
}

async function releaseList(){
  if(!currentRaidData || !currentRaidData.raidId){
    alert("Bitte zuerst einen gültigen Raid laden.");
    return;
  }

  const url =
    RAID_API_URL +
    "?action=setRaidStatus" +
    "&raidId=" + encodeURIComponent(currentRaidData.raidId) +
    "&status=" + encodeURIComponent("geöffnet") +
    "&t=" + Date.now();

  const response = await fetch(url);
  const result = await response.json();

  if(result.error){
    alert(result.error);
    return;
  }

  currentReleased = true;
  await reloadCurrentRaid();
}

async function closeList(){
  if(!currentRaidData || !currentRaidData.raidId){
    alert("Bitte zuerst einen gültigen Raid laden.");
    return;
  }

  const url =
    RAID_API_URL +
    "?action=setRaidStatus" +
    "&raidId=" + encodeURIComponent(currentRaidData.raidId) +
    "&status=" + encodeURIComponent("geschlossen") +
    "&t=" + Date.now();

  const response = await fetch(url);
  const result = await response.json();

  if(result.error){
    alert(result.error);
    return;
  }

  currentReleased = false;
  await reloadCurrentRaid();
}

async function deleteSinglePrio(player,server){
  if(!currentRaidData || !currentRaidData.raidId){
    alert("Kein aktiver Raid gefunden.");
    return;
  }

  if(!confirm("Prio von " + player + " wirklich löschen?")){
    return;
  }

  const url =
    RAID_API_URL +
    "?action=deletePrio" +
    "&raidId=" + encodeURIComponent(currentRaidData.raidId) +
    "&player=" + encodeURIComponent(player) +
    "&server=" + encodeURIComponent(server || "") +
    "&t=" + Date.now();

  const response = await fetch(url);
  const result = await response.json();

  if(result.error){
    alert(result.error);
    return;
  }

  await reloadCurrentRaid();
}

function parseCSV(text){
  const rows=[];
  let row=[];
  let value="";
  let insideQuotes=false;

  for(let i=0;i<text.length;i++){
    const char=text[i];
    const next=text[i+1];

    if(char === '"' && insideQuotes && next === '"'){
      value+='"';
      i++;
    }else if(char === '"'){
      insideQuotes=!insideQuotes;
    }else if(char === "," && !insideQuotes){
      row.push(value);
      value="";
    }else if((char === "\n" || char === "\r") && !insideQuotes){
      if(value || row.length){
        row.push(value);
        rows.push(row);
        row=[];
        value="";
      }
      if(char === "\r" && next === "\n") i++;
    }else{
      value+=char;
    }
  }

  if(value || row.length){
    row.push(value);
    rows.push(row);
  }

  return rows;
}

function itemKey(value){
  return String(value || "")
    .toLowerCase()
    .trim()
    .replace(/['’`´]/g,"")
    .replace(/[-–—]/g," ")
    .replace(/\s+/g," ");
}

async function loadItemIdsForExport(){
  itemIdMap = {};

  const url = LOOT_CSV_URLS[currentRaidKey];

  if(!url){
    return;
  }

  const response = await fetch(url + "&t=" + Date.now());
  const csvText = await response.text();
  const rows = parseCSV(csvText);

  if(!rows.length){
    return;
  }

  const headers = rows.shift().map(h => String(h || "").trim());

  rows.forEach(row => {
    const obj = {};

    headers.forEach((header,index) => {
      obj[header] = row[index] || "";
    });

    const item = String(obj.Item || "").trim();
    const itemId = String(obj.ItemID || "").trim();

    if(!item || !itemId) return;

    itemIdMap[itemKey(item)] = itemId;
  });
}

function formatItemForPrio3(itemName){
  const name = String(itemName || "").trim();

  if(!name || name === "-"){
    return "";
  }

  if(/\-\d+$/.test(name)){
    return name;
  }

  const id = itemIdMap[itemKey(name)];

  if(!id){
    return name;
  }

  return name + "-" + id;
}

async function downloadPrio3ReforgedExport(){
  if(!currentRaidData){
    alert("Kein Raid geladen.");
    return;
  }

  if(!currentPrios || currentPrios.length === 0){
    alert("Keine Prios vorhanden.");
    return;
  }

  await loadItemIdsForExport();

  let content = "";

  currentPrios.forEach(entry => {
    const player = entry.player || "";
    const playerClass = entry.class || "";

    const p1 = formatItemForPrio3(entry.p1);
    const p2 = formatItemForPrio3(entry.p2);
    const p3 = formatItemForPrio3(entry.p3);

    content +=
      player + "\t\t" +
      playerClass + "\t\t" +
      p1 + "\t" +
      p2 + "\t" +
      p3 + "\n";
  });

  const filename =
    (currentRaidData.raidId || currentRaidKey || "raid") +
    "-prio3-reforged.txt";

  const blob = new Blob([content], {
    type:"text/plain;charset=utf-8"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = filename;
  a.click();

  URL.revokeObjectURL(url);
}

function backToRaidPrio(){
  if(!currentRaidKey || !currentRaidData){
    alert("Kein Raid geladen.");
    return;
  }

  window.location.href =
    raids[currentRaidKey].lootPage +
    "?pin=" +
    encodeURIComponent(currentRaidData.playerPin || "");
}

function logout(){
  sessionStorage.removeItem("raidlead");
  sessionStorage.removeItem("raidleadRole");
  sessionStorage.removeItem("raidleadRaidId");
  sessionStorage.removeItem("raidleadPrioPin");
  sessionStorage.removeItem("raidleadPlayerPin");
  window.location.href = "index.html";
}

function safe(value){
  return String(value || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function escapeQuotes(value){
  return String(value || "")
    .replace(/\\/g,"\\\\")
    .replace(/'/g,"\\'");
}

checkLogin();
