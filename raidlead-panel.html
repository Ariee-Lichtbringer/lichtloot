<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lichtbringer – Raidlead Panel</title>

  <style>
    :root{
      --gold:#facc15;
      --blue:#60a5fa;
      --panel:rgba(12,18,32,.90);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --line:rgba(255,255,255,.12);
      --danger:#ef4444;
      --green:#22c55e;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(8,17,31,.82), rgba(8,17,31,.94)),
        url('./images/back.jpeg');
      background-size:cover;
      background-position:center top;
      background-attachment:fixed;
    }

    .overlay{
      min-height:100vh;
      padding:36px 22px 70px;
      backdrop-filter:blur(3px);
    }

    .topbar{
      width:min(1300px,100%);
      margin:0 auto 28px;
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn-link,
    .btn{
      color:var(--text);
      text-decoration:none;
      font-weight:900;
      border:1px solid var(--line);
      padding:12px 16px;
      border-radius:14px;
      background:rgba(12,18,32,.72);
      cursor:pointer;
      display:inline-block;
      text-align:center;
      transition:.18s;
    }

    .btn-link:hover,
    .btn:hover{
      border-color:rgba(250,204,21,.55);
      transform:translateY(-1px);
    }

    .header{
      width:min(1300px,100%);
      margin:0 auto 28px;
      padding:30px;
      border-radius:24px;
      background:var(--panel);
      border:1px solid rgba(250,204,21,.22);
      box-shadow:0 20px 45px rgba(0,0,0,.45);
    }

    h1{
      color:var(--gold);
      font-size:clamp(34px,5vw,58px);
      margin-bottom:8px;
    }

    .subtitle{
      color:#dbeafe;
      line-height:1.7;
      font-size:15px;
    }

    .grid{
      width:min(1300px,100%);
      margin:auto;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:22px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      padding:24px;
      box-shadow:0 18px 40px rgba(0,0,0,.38);
    }

    h2{
      color:var(--gold);
      margin-bottom:10px;
      font-size:25px;
    }

    h3{
      color:#dbeafe;
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:.12em;
      margin-top:20px;
      margin-bottom:10px;
    }

    .status,
    .new-raid-box{
      margin:14px 0;
      padding:14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(2,6,23,.55);
      color:#dbeafe;
      line-height:1.6;
      font-size:14px;
    }

    .new-raid-box{
      border-color:rgba(250,204,21,.32);
      box-shadow:0 0 0 1px rgba(250,204,21,.08);
    }

    .new-raid-box strong{color:var(--gold)}

    .new-raid-box a{
      color:#93c5fd;
      font-weight:900;
      word-break:break-all;
    }

    .ok{color:var(--green);font-weight:900}
    .warn{color:var(--gold);font-weight:900}
    .bad{color:var(--danger);font-weight:900}

    .button-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:10px;
    }

    .btn.primary{
      background:linear-gradient(135deg,rgba(250,204,21,.32),rgba(96,165,250,.18));
      border-color:rgba(250,204,21,.35);
    }

    .btn.neutral{
      background:linear-gradient(135deg,rgba(96,165,250,.22),rgba(15,23,42,.65));
      border-color:rgba(96,165,250,.25);
    }

    .btn.success{
      background:linear-gradient(135deg,rgba(34,197,94,.28),rgba(15,23,42,.65));
      border-color:rgba(34,197,94,.35);
    }

    .btn.warning{
      background:linear-gradient(135deg,rgba(250,204,21,.24),rgba(15,23,42,.65));
      border-color:rgba(250,204,21,.35);
    }

    .btn.danger{
      background:linear-gradient(135deg,rgba(239,68,68,.35),rgba(15,23,42,.65));
      border-color:rgba(239,68,68,.40);
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:14px;
      font-size:14px;
    }

    th,td{
      padding:9px;
      border-bottom:1px solid rgba(255,255,255,.10);
      text-align:left;
      vertical-align:top;
    }

    th{
      color:var(--gold);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .check{
      color:var(--green);
      font-weight:900;
      font-size:17px;
    }

    .cross{
      color:var(--danger);
      font-weight:900;
      font-size:17px;
    }

    @media(max-width:900px){
      .grid{grid-template-columns:1fr}
      .button-grid{grid-template-columns:1fr}
    }
  </style>
</head>

<body>

<div class="overlay">

  <div class="topbar">
    <a class="btn-link" href="index.html">← Zurück zur Startseite</a>
    <button class="btn danger" onclick="logout()">Logout</button>
  </div>

  <div class="header">
    <h1>Raidlead Panel</h1>
    <div class="subtitle">
      Zentrale Verwaltung der Priolisten. Bei geschlossener Liste sieht der Raidlead nur, ob P1/P2/P3 gesetzt wurden. Erst nach Öffnung werden die Items sichtbar.
    </div>
    <div id="roleInfo" class="status"></div>
  </div>

  <div id="raidGrid" class="grid"></div>

</div>
  <script>
const RAID_API_URL =
  "https://script.google.com/macros/s/AKfycbzwRZ1908IawmEh3WdROu_TBwfu8Yr1YXJ1VicqEIf15eZ2zzRE3Yw9OaaeJ0ZADbye2g/exec";

const raids = {
  mc:{
    name:"Molten Core",
    short:"MC",
    role:"mc-bwl",
    dataKey:"mc_prios",
    releaseKey:"mc_released",
    historyKey:"mc_raid_history",
    activeKey:"mc_active_raid",
    lootPage:"loot/mc-loot.html",
    overviewPage:"molten-core.html"
  },
  bwl:{
    name:"Blackwing Lair",
    short:"BWL",
    role:"mc-bwl",
    dataKey:"bwl_prios",
    releaseKey:"bwl_released",
    historyKey:"bwl_raid_history",
    activeKey:"bwl_active_raid",
    lootPage:"loot/bwl-loot.html",
    overviewPage:"bwl.html"
  },
  aq40:{
    name:"Ahn'Qiraj 40",
    short:"AQ40",
    role:"aq40",
    dataKey:"aq40_prios",
    releaseKey:"aq40_released",
    historyKey:"aq40_raid_history",
    activeKey:"aq40_active_raid",
    lootPage:"loot/aq40-loot.html",
    overviewPage:"aq.html"
  },
  naxx:{
    name:"Naxxramas",
    short:"NAXX",
    role:"naxx",
    dataKey:"naxx_prios",
    releaseKey:"naxx_released",
    historyKey:"naxx_raid_history",
    activeKey:"naxx_active_raid",
    lootPage:"loot/naxx-loot.html",
    overviewPage:"naxxramas.html"
  },
  zg:{
    name:"ZG 20",
    short:"ZG",
    role:"zg-aq20",
    dataKey:"zg_prios",
    releaseKey:"zg_released",
    historyKey:"zg_raid_history",
    activeKey:"zg_active_raid",
    lootPage:"loot/zg-loot.html",
    overviewPage:"zg.html"
  },
  aq20:{
    name:"AQ 20",
    short:"AQ20",
    role:"zg-aq20",
    dataKey:"aq20_prios",
    releaseKey:"aq20_released",
    historyKey:"aq20_raid_history",
    activeKey:"aq20_active_raid",
    lootPage:"loot/aq20-loot.html",
    overviewPage:"aq20.html"
  },
  ony:{
    name:"Onyxia",
    short:"ONY",
    role:"ony",
    dataKey:"ony_prios",
    releaseKey:"ony_released",
    historyKey:"ony_raid_history",
    activeKey:"ony_active_raid",
    lootPage:"loot/ony-loot.html",
    overviewPage:"ony.html"
  }
};

function checkLogin(){
  const isLoggedIn = sessionStorage.getItem("raidlead");
  const role = sessionStorage.getItem("raidleadRole");

  if(isLoggedIn !== "true" || !role){
    alert("Bitte zuerst über die Startseite einloggen.");
    window.location.href = "index.html";
    return;
  }

  document.getElementById("roleInfo").innerHTML =
    `<span class="ok">Login aktiv.</span> Rolle: <strong>${role}</strong>`;

  renderRaids(role);
}

function canAccessRaid(role, raid){
  return role === "master" || raids[raid].role === role;
}

function getData(raid){
  return JSON.parse(localStorage.getItem(raids[raid].dataKey) || "[]");
}

function getHistory(raid){
  return JSON.parse(localStorage.getItem(raids[raid].historyKey) || "[]");
}

function getActiveRaid(raid){
  return JSON.parse(localStorage.getItem(raids[raid].activeKey) || "null");
}

function isReleased(raid){
  return localStorage.getItem(raids[raid].releaseKey) === "true";
}

function randomCode(length){
  return Math.random().toString(36).substring(2, 2 + length);
}

function createRaidId(raid){
  const now = new Date();

  const date =
    now.getFullYear() + "-" +
    String(now.getMonth() + 1).padStart(2,"0") + "-" +
    String(now.getDate()).padStart(2,"0") + "-" +
    String(now.getHours()).padStart(2,"0") +
    String(now.getMinutes()).padStart(2,"0") +
    String(now.getSeconds()).padStart(2,"0");

  return raids[raid].short + "-" + date;
}

function getBaseUrl(){
  return window.location.origin +
    window.location.pathname.replace("raidlead-panel.html", "");
}

function renderRaids(role){
  const grid = document.getElementById("raidGrid");
  grid.innerHTML = "";

  Object.keys(raids).forEach(raid => {
    if(!canAccessRaid(role, raid)) return;

    const r = raids[raid];
    const data = getData(raid);
    const history = getHistory(raid);
    const activeRaid = getActiveRaid(raid);
    const released = isReleased(raid);

    grid.innerHTML += `
      <div class="card">
        <h2>${r.name}</h2>

        <div class="status">
          Aktiver Raid: <strong>${activeRaid ? activeRaid.raidId : "Noch kein aktiver Raid"}</strong><br>
          Eingetragene Spieler: <strong>${data.length}</strong><br>
          Erstellte Raids: <strong>${history.length}</strong><br>
          Prioliste: ${
            released
            ? '<span class="ok">geöffnet / Items sichtbar</span>'
            : '<span class="warn">geschlossen / nur Haken sichtbar</span>'
          }
        </div>

        <h3>Raidverwaltung</h3>
        <div class="button-grid">
          <button class="btn primary" onclick="createNewRaid('${raid}')">Neuen Raid erstellen</button>
          <button class="btn neutral" onclick="openPrio('${raid}')">Prioseite öffnen</button>
        </div>

        <div id="newRaidBox-${raid}">
          ${activeRaid ? renderNewRaidBox(activeRaid) : ""}
        </div>

        <h3>Übersicht</h3>
        <div class="button-grid">
          <button class="btn neutral" onclick="openOverview('${raid}')">P0+ Übersicht öffnen</button>
        </div>

        <h3>Prioliste</h3>
        <div class="button-grid">
          <button class="btn success" onclick="releaseList('${raid}')">Prioliste öffnen</button>
          <button class="btn warning" onclick="closeList('${raid}')">Prioliste schließen</button>
        </div>

        <h3>Export</h3>
        <div class="button-grid">
          <button class="btn neutral" onclick="downloadExport('${raid}','csv')">CSV Export</button>
          <button class="btn neutral" onclick="downloadExport('${raid}','txt')">TXT Export</button>
          <button class="btn neutral" onclick="downloadExport('${raid}','lua')">LUA Export</button>
        </div>

        <h3>Gefahrenzone</h3>
        <div class="button-grid">
          <button class="btn danger" onclick="resetCurrentEntries('${raid}')">Aktuelle Einträge löschen</button>
        </div>

        <h3>Aktuelle Einträge</h3>
        <div class="status">
          ${
            released
            ? "Die Prioliste ist geöffnet. Die Itemnamen sind sichtbar."
            : "Die Prioliste ist geschlossen. Es wird nur angezeigt, ob P1/P2/P3 gesetzt wurden."
          }
        </div>

        <table>
          <thead>
            <tr>
              <th>Spieler</th>
              <th>Klasse</th>
              <th>P1</th>
              <th>P2</th>
              <th>P3</th>
            </tr>
          </thead>
          <tbody>
            ${renderRows(raid, released)}
          </tbody>
        </table>
      </div>
    `;
  });
}

function renderNewRaidBox(data){
  return `
    <div class="new-raid-box">
      <h3>Aktiver Raid</h3>

      <p><strong>Raid:</strong><br>${data.raidName}</p>
      <p><strong>RaidID:</strong><br>${data.raidId}</p>
      <p><strong>SpielerPIN:</strong><br>${data.playerPin}</p>
      <p><strong>LeadPIN:</strong><br>${data.leadPin}</p>

      <p><strong>Direkter Spielerlink:</strong><br>
      <a href="${data.playerLink}" target="_blank">${data.playerLink}</a></p>
    </div>
  `;
}

function renderRows(raid, released){
  const data = getData(raid);

  if(data.length === 0){
    return `
      <tr>
        <td colspan="5">Noch keine Einträge vorhanden.</td>
      </tr>
    `;
  }

  return data.map(entry => {
    if(!released){
      return `
        <tr>
          <td>${entry.player || "-"}</td>
          <td>${entry.class || "-"}</td>
          <td>${entry.p1 ? '<span class="check">✓</span>' : '<span class="cross">✗</span>'}</td>
          <td>${entry.p2 ? '<span class="check">✓</span>' : '<span class="cross">✗</span>'}</td>
          <td>${entry.p3 ? '<span class="check">✓</span>' : '<span class="cross">✗</span>'}</td>
        </tr>
      `;
    }

    return `
      <tr>
        <td>${entry.player || "-"}</td>
        <td>${entry.class || "-"}</td>
        <td>${entry.p1 || "-"}</td>
        <td>${entry.p2 || "-"}</td>
        <td>${entry.p3 || "-"}</td>
      </tr>
    `;
  }).join("");
}
    async function saveRaidToSheet(raidData){
  try{
    await fetch(RAID_API_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify(raidData)
    });

    return true;

  }catch(error){
    console.error("Fehler beim Speichern im Sheet:", error);
    return false;
  }
}

async function createNewRaid(raid){
  const r = raids[raid];

  const raidId = createRaidId(raid);
  const playerPin = raid + "-" + randomCode(5);
  const leadPin = "lead-" + randomCode(5);

  const playerLink =
    getBaseUrl() +
    r.lootPage +
    "?pin=" +
    encodeURIComponent(playerPin);

  const raidData = {
    raid:raid,
    raidName:r.name,
    raidId:raidId,
    playerPin:playerPin,
    leadPin:leadPin,
    playerLink:playerLink,
    createdAt:new Date().toISOString(),
    status:"geschlossen"
  };

  const history = getHistory(raid);
  history.push(raidData);

  localStorage.setItem(r.historyKey, JSON.stringify(history));
  localStorage.setItem(r.activeKey, JSON.stringify(raidData));
  localStorage.setItem(r.releaseKey, "false");

  await saveRaidToSheet({
    action:"createRaid",
    raidId:raidData.raidId,
    raid:raidData.raid,
    raidName:raidData.raidName,
    playerPin:raidData.playerPin,
    leadPin:raidData.leadPin,
    playerLink:raidData.playerLink,
    createdAt:raidData.createdAt,
    status:"geschlossen"
  });

  renderRaids(sessionStorage.getItem("raidleadRole"));
}

function openPrio(raid){
  window.location.href = raids[raid].lootPage;
}

function openOverview(raid){
  window.location.href = raids[raid].overviewPage;
}

async function releaseList(raid){
  const activeRaid = getActiveRaid(raid);

  if(!activeRaid){
    alert("Es gibt keinen aktiven Raid.");
    return;
  }

  localStorage.setItem(raids[raid].releaseKey, "true");

  const url =
    RAID_API_URL +
    "?action=setRaidStatus" +
    "&raidId=" + encodeURIComponent(activeRaid.raidId) +
    "&status=" + encodeURIComponent("geöffnet") +
    "&t=" + Date.now();

  await fetch(url);

  alert("Prioliste wurde geöffnet.");

  renderRaids(sessionStorage.getItem("raidleadRole"));
}

async function closeList(raid){
  const activeRaid = getActiveRaid(raid);

  if(!activeRaid){
    alert("Es gibt keinen aktiven Raid.");
    return;
  }

  localStorage.setItem(raids[raid].releaseKey, "false");

  const url =
    RAID_API_URL +
    "?action=setRaidStatus" +
    "&raidId=" + encodeURIComponent(activeRaid.raidId) +
    "&status=" + encodeURIComponent("geschlossen") +
    "&t=" + Date.now();

  await fetch(url);

  alert("Prioliste wurde geschlossen.");

  renderRaids(sessionStorage.getItem("raidleadRole"));
}

function resetCurrentEntries(raid){
  if(confirm("Nur die aktuellen Einträge für " + raids[raid].name + " löschen? Die Raid-Historie bleibt erhalten.")){
    localStorage.removeItem(raids[raid].dataKey);
    localStorage.setItem(raids[raid].releaseKey, "false");
    renderRaids(sessionStorage.getItem("raidleadRole"));
  }
}

function downloadExport(raid,type){
  const data = getData(raid);
  const activeRaid = getActiveRaid(raid);
  let content = "";
  let filename = raid + "-prios";
  let mime = "text/plain";

  if(activeRaid){
    filename = activeRaid.raidId + "-prios";
  }

  if(type === "csv"){
    filename += ".csv";
    mime = "text/csv";
    content = "RaidID,Player,Class,P1,P2,P3\n";
    data.forEach(e => {
      content += `"${activeRaid ? activeRaid.raidId : ""}","${e.player}","${e.class}","${e.p1}","${e.p2}","${e.p3}"\n`;
    });
  }

  if(type === "txt"){
    filename += ".txt";
    if(activeRaid){
      content += `RaidID: ${activeRaid.raidId}\n`;
      content += `Raid: ${activeRaid.raidName}\n\n`;
    }

    data.forEach(e => {
      content += `${e.player} (${e.class})\nP1: ${e.p1}\nP2: ${e.p2}\nP3: ${e.p3}\n\n`;
    });
  }

  if(type === "lua"){
    filename += ".lua";
    content = "Lichtbringer_" + raid.toUpperCase() + " = {\n";
    if(activeRaid){
      content += `  raidId = "${activeRaid.raidId}",\n`;
    }
    data.forEach(e => {
      content += `  ["${e.player}"] = { class = "${e.class}", p1 = "${e.p1}", p2 = "${e.p2}", p3 = "${e.p3}" },\n`;
    });
    content += "}\n";
  }

  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();

  URL.revokeObjectURL(url);
}

function logout(){
  sessionStorage.removeItem("raidlead");
  sessionStorage.removeItem("raidleadRole");
  sessionStorage.removeItem("raidleadRaidId");
  window.location.href = "index.html";
}

checkLogin();
</script>

</body>
</html>
