<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lichtloot – Raidlead</title>

<style>
:root{
  --gold:#facc15;
  --panel:rgba(12,18,32,.90);
  --text:#f8fafc;
  --muted:#cbd5e1;
  --line:rgba(255,255,255,.12);
  --danger:#ef4444;
  --green:#22c55e;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--text);
  background:
    linear-gradient(rgba(8,17,31,.82),rgba(8,17,31,.94)),
    url('./images/back.jpeg');
  background-size:cover;
  background-position:center top;
  background-attachment:fixed;
}

.overlay{
  min-height:100vh;
  padding:36px 22px 70px;
  backdrop-filter:blur(3px);
}

.topbar,
.header,
.raid-card{
  width:min(1300px,100%);
  margin:auto;
}

.topbar{
  margin-bottom:28px;
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:center;
  flex-wrap:wrap;
}

.btn-link,
.btn{
  color:var(--text);
  text-decoration:none;
  font-weight:900;
  border:1px solid var(--line);
  padding:12px 16px;
  border-radius:14px;
  background:rgba(12,18,32,.72);
  cursor:pointer;
  display:inline-block;
  text-align:center;
}

.btn:hover,
.btn-link:hover{
  border-color:rgba(250,204,21,.55);
}

.header{
  margin-bottom:22px;
  padding:30px;
  border-radius:24px;
  background:var(--panel);
  border:1px solid rgba(250,204,21,.22);
  box-shadow:0 20px 45px rgba(0,0,0,.45);
}

h1{
  color:var(--gold);
  font-size:clamp(34px,5vw,58px);
  margin-bottom:8px;
}

.subtitle{
  color:#dbeafe;
  line-height:1.7;
  font-size:15px;
}

.raid-card{
  margin-bottom:22px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:22px;
  padding:24px;
  box-shadow:0 18px 40px rgba(0,0,0,.38);
}

h2{
  color:var(--gold);
  margin-bottom:14px;
  font-size:25px;
}

h3{
  color:#dbeafe;
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:.12em;
  margin-top:20px;
  margin-bottom:10px;
}

label{
  display:block;
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  margin:12px 0 7px;
  text-transform:uppercase;
  letter-spacing:.08em;
}

input{
  width:100%;
  padding:12px 13px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(2,6,23,.82);
  color:white;
  font-size:14px;
}

.pin-grid{
  display:grid;
  grid-template-columns:1fr auto;
  gap:14px;
  align-items:end;
}

.status{
  margin:14px 0;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--line);
  background:rgba(2,6,23,.55);
  color:#dbeafe;
  line-height:1.6;
  font-size:14px;
}

.ok{color:var(--green);font-weight:900}
.warn{color:var(--gold);font-weight:900}
.bad{color:var(--danger);font-weight:900}

.button-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.btn.neutral{
  background:linear-gradient(135deg,rgba(96,165,250,.22),rgba(15,23,42,.65));
  border-color:rgba(96,165,250,.25);
}

.btn.success{
  background:linear-gradient(135deg,rgba(34,197,94,.28),rgba(15,23,42,.65));
  border-color:rgba(34,197,94,.35);
}

.btn.warning{
  background:linear-gradient(135deg,rgba(250,204,21,.24),rgba(15,23,42,.65));
  border-color:rgba(250,204,21,.35);
}

.btn.danger{
  background:linear-gradient(135deg,rgba(239,68,68,.35),rgba(15,23,42,.65));
  border-color:rgba(239,68,68,.40);
}

.btn.small-btn{
  padding:8px 10px;
  border-radius:10px;
  font-size:12px;
  margin-top:0;
  width:auto;
  margin-right:6px;
  margin-bottom:6px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:14px;
  font-size:14px;
}

th,td{
  padding:9px;
  border-bottom:1px solid rgba(255,255,255,.10);
  text-align:left;
  vertical-align:top;
}

th{
  color:var(--gold);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
}

.check{color:var(--green);font-weight:900;font-size:17px}
.cross{color:var(--danger);font-weight:900;font-size:17px}

.hidden{display:none!important}

/* Klassenfarben */
.class-badge{
  display:inline-block;
  font-weight:900;
  padding:3px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  white-space:nowrap;
}

.class-warrior{color:#c79c6e;border-color:rgba(199,156,110,.45);background:rgba(199,156,110,.10)}
.class-paladin{color:#f58cba;border-color:rgba(245,140,186,.45);background:rgba(245,140,186,.10)}
.class-hunter{color:#abd473;border-color:rgba(171,212,115,.45);background:rgba(171,212,115,.10)}
.class-rogue{color:#fff569;border-color:rgba(255,245,105,.45);background:rgba(255,245,105,.10)}
.class-priest{color:#ffffff;border-color:rgba(255,255,255,.45);background:rgba(255,255,255,.10)}
.class-shaman{color:#0070de;border-color:rgba(0,112,222,.55);background:rgba(0,112,222,.14)}
.class-mage{color:#69ccf0;border-color:rgba(105,204,240,.50);background:rgba(105,204,240,.12)}
.class-warlock{color:#9482c9;border-color:rgba(148,130,201,.50);background:rgba(148,130,201,.12)}
.class-druid{color:#ff7d0a;border-color:rgba(255,125,10,.50);background:rgba(255,125,10,.12)}

/* Itemfarben */
.item-link,
.item-name{
  font-weight:800;
  text-decoration:none;
  text-shadow:0 0 10px rgba(0,0,0,.55);
}

.item-link:hover{text-decoration:underline}
.item-poor{color:#9d9d9d}
.item-common{color:#ffffff}
.item-uncommon{color:#1eff00}
.item-rare{color:#0070dd}
.item-epic{color:#a335ee}
.item-legendary{color:#ff8000}
.item-artifact{color:#e6cc80}
.item-heirloom{color:#00ccff}


.search-box{
  margin:14px 0;
  position:relative;
}
.search-box input{
  width:100%;
  padding:12px 13px 12px 38px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(2,6,23,.82);
  color:white;
  font-size:14px;
  font-weight:700;
}
.search-icon{
  position:absolute;
  left:13px;
  top:50%;
  transform:translateY(-50%);
  color:var(--gold);
}
.item-with-icon{
  display:inline-flex;
  align-items:center;
  gap:7px;
  max-width:100%;
}
.item-icon{
  width:22px;
  height:22px;
  border-radius:4px;
  border:1px solid rgba(250,204,21,.35);
  object-fit:cover;
  flex-shrink:0;
}
.tooltip{
  position:absolute;
  z-index:20000;
  width:340px;
  padding:12px;
  border-radius:8px;
  background:linear-gradient(rgba(7,12,31,.97),rgba(2,6,23,.99));
  border:1px solid rgba(148,163,184,.75);
  box-shadow:0 0 28px rgba(0,0,0,.85);
  pointer-events:none;
  font-size:11px;
  line-height:1.35;
}
.tooltip-title{font-size:16px;font-weight:900;margin-bottom:4px}
.tooltip-title.epic{color:#a335ee}.tooltip-title.rare{color:#0070dd}.tooltip-title.uncommon{color:#1eff00}.tooltip-title.legendary{color:#ff8000}
.tooltip-ilvl{color:#ffd100;font-size:12px;font-weight:900;margin-bottom:6px}
.tooltip-row,.tooltip-stat,.tooltip-bind{color:white;font-size:11px;margin-top:3px}
.tooltip-equip{color:#1eff00;font-size:11px;margin-top:6px}
.tooltip-p0{margin-top:9px;padding-top:8px;border-top:1px solid rgba(255,255,255,.18);color:#dbeafe;font-size:13px;line-height:1.45}
.tooltip-p0 strong{color:var(--gold)}
.tooltip-p0 ul{margin:5px 0 0 18px}
.p0plus-points-list{font-size:13px;line-height:1.45;color:#dbeafe;font-weight:700}
.p0plus-points-list strong{display:block;color:var(--gold);margin-bottom:4px}
.p0plus-points-list .empty{color:#94a3b8;font-weight:700}
.p0plus-points-list .player-row{white-space:nowrap}


}



/* === LichtLoot Navigation wie auf den Lootseiten === */
.logo-banner-mini{
  display:block;
  margin:0 auto 14px;
  width:min(620px,76vw);
  height:auto;
  max-height:170px;
  object-fit:contain;
}
.main-nav{
  width:min(1050px,calc(100vw - 48px));
  margin:0 auto 26px;
  padding:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  border-radius:22px;
  border:1px solid rgba(250,204,21,.34);
  background:linear-gradient(135deg,rgba(12,18,32,.78),rgba(2,6,23,.56));
  box-shadow:0 18px 38px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
}
.nav-btn{
  min-height:42px;
  padding:10px 16px;
  border-radius:14px;
  border:1px solid rgba(250,204,21,.28);
  background:rgba(2,6,23,.58);
  color:#f8fafc;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
  text-shadow:0 2px 8px rgba(0,0,0,.65);
  transition:transform .18s ease,border .18s ease,background .18s ease,box-shadow .18s ease;
}
.nav-btn:hover{
  transform:translateY(-2px);
  border-color:rgba(250,204,21,.70);
  background:linear-gradient(135deg,rgba(250,204,21,.34),rgba(96,165,250,.20));
  box-shadow:0 0 0 2px rgba(250,204,21,.12);
}
.nav-primary{
  background:linear-gradient(135deg,rgba(250,204,21,.42),rgba(96,165,250,.22));
  border-color:rgba(250,204,21,.62);
}
.nav-login{display:flex;align-items:center;gap:8px}
.nav-login input{
  width:170px;
  min-height:42px;
  padding:10px 12px;
  border-radius:14px;
  border:1px solid rgba(250,204,21,.35);
  background:rgba(2,6,23,.78);
  color:white;
  font-weight:800;
  outline:none;
}

/* === weichere Aktionsbuttons im Raidleadpanel === */
.button-grid.raid-actions{
  grid-template-columns:repeat(4,minmax(0,1fr));
}
.btn.action-open{
  background:linear-gradient(180deg,#0d4d3a,#083227);
  border-color:rgba(74,222,128,.42);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.10),0 10px 24px rgba(0,0,0,.22);
  text-shadow:0 2px 8px rgba(0,0,0,.70);
}
.btn.action-close{
  background:linear-gradient(180deg,#4a1420,#2d0c14);
  border-color:rgba(190,24,93,.42);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.10),0 10px 24px rgba(0,0,0,.22);
  text-shadow:0 2px 8px rgba(0,0,0,.72);
}
.btn.action-p0open{
  background:linear-gradient(180deg,#2d1b5e,#1a1138);
  border-color:rgba(192,132,252,.42);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.10),0 10px 24px rgba(0,0,0,.22);
  text-shadow:0 2px 8px rgba(0,0,0,.72);
}
.btn.action-soft{
  background:linear-gradient(180deg,#15345e,#0c1f38);
  border-color:rgba(148,163,184,.32);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 10px 22px rgba(0,0,0,.20);
  text-shadow:0 2px 8px rgba(0,0,0,.70);
}
.btn.action-transfer{
  background:linear-gradient(180deg,#5a4210,#352706);
  border-color:rgba(250,204,21,.42);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.10),0 10px 22px rgba(0,0,0,.20);
  text-shadow:0 2px 8px rgba(0,0,0,.72);
}
.btn.action-open,.btn.action-close,.btn.action-p0open,.btn.action-soft,.btn.action-transfer{
  font-size:15px;
  letter-spacing:.02em;
}

.missing-prio-panel{
  margin-top:14px;
  padding:14px;
  border-radius:16px;
  border:1px solid rgba(250,204,21,.22);
  background:rgba(2,6,23,.46);
}
.missing-prio-head{
  color:var(--gold);
  font-size:13px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.10em;
  margin-bottom:10px;
}
.missing-prio-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.missing-player-chip{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:7px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(15,23,42,.72);
  font-weight:900;
  font-size:13px;
}
.missing-player-chip .class-badge{
  padding:2px 7px;
  font-size:11px;
}
.missing-player-chip.unknown{color:#cbd5e1}
@media(max-width:1000px){.button-grid.raid-actions{grid-template-columns:1fr}.main-nav{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}.nav-btn{white-space:nowrap}.logo-banner-mini{max-height:110px}}


@media(max-width:1000px){
  .pin-grid{grid-template-columns:1fr}
  .button-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="overlay">

<img src="images/content.png" alt="Lichtbringer Lootsystem" class="logo-banner-mini">

<nav class="main-nav" aria-label="LichtLoot Navigation">
  <a class="nav-btn" href="start.html">Startseite</a>
  <a class="nav-btn" href="start.html#mein-lichtloot">Mein LichtLoot</a>
  <a class="nav-btn" href="start.html#p0plus">P0+ Übersicht</a>
  <a class="nav-btn" href="start.html#raid-erstellen">Raid erstellen</a>
  <div class="nav-login">
    <input id="navRaidPinInput" type="text" placeholder="Raidlead PIN" onkeydown="navRaidPinEnter(event)">
    <button class="nav-btn nav-primary" onclick="loadRaidFromNav()">Raidlead</button>
  </div>
  <button class="nav-btn" onclick="logout()">Logout</button>
</nav>

<div class="header">
  <h1>Raidlead Panel</h1>
  <div class="subtitle">
    Lade den Raid über die Raidlead PIN und verwalte die aktuelle Prioliste.
  </div>

  <div id="roleInfo" class="status"></div>

  <div class="status">
    <label>Raidlead PIN</label>
    <div class="pin-grid">
      <input id="raidPinInput" type="text" placeholder="Raidlead PIN eingeben">
      <button class="btn neutral" onclick="loadRaidByPin()">Raid laden</button>
    </div>

    <div id="controlStatus" style="margin-top:10px">
      Bitte Raidlead PIN eingeben.
    </div>
  </div>
</div>

<div id="raidView" class="raid-card hidden"></div>
<div id="tooltip" class="tooltip hidden"></div>

<script>
const RAID_API_URL =
  "https://script.google.com/macros/s/AKfycbzwRZ1908IawmEh3WdROu_TBwfu8Yr1YXJ1VicqEIf15eZ2zzRE3Yw9OaaeJ0ZADbye2g/exec";

const MASTER_CODE = "Lichtbringer-Master";

const raids = {
  mc:{name:"Molten Core",short:"MC",role:"mc-bwl",lootPage:"loot/mc-loot.html",overviewPage:"molten-core.html"},
  bwl:{name:"Blackwing Lair",short:"BWL",role:"mc-bwl",lootPage:"loot/bwl-loot.html",overviewPage:"bwl.html"},
  aq40:{name:"Ahn'Qiraj 40",short:"AQ40",role:"aq40",lootPage:"loot/aq40-loot.html",overviewPage:"aq.html"},
  naxx:{name:"Naxxramas",short:"NAXX",role:"naxx",lootPage:"loot/naxx-loot.html",overviewPage:"naxxramas.html"},
  zg:{name:"ZG 20",short:"ZG",role:"zg-aq20",lootPage:"loot/zg-loot.html",overviewPage:"zg.html"},
  aq20:{name:"AQ 20",short:"AQ20",role:"zg-aq20",lootPage:"loot/aq20-loot.html",overviewPage:"aq20.html"},
  ony:{name:"Onyxia",short:"ONY",role:"ony",lootPage:"loot/ony-loot.html",overviewPage:"ony.html"}
};

const LOOT_JSON_URLS = {
  mc:"data/mc.json",
  bwl:"data/bwl.json",
  aq40:"data/aq40.json",
  naxx:"data/naxx.json",
  zg:"data/zg.json",
  aq20:"data/aq20.json",
  ony:"data/ony.json"
};

let currentRaidKey = null;
let currentRaidData = null;
let currentPrios = [];
let currentReleased = false;
let itemIdMap = {};
let itemVisualMap = {};
let currentP0PlusEntries = [];
let currentPrioCheck = null;
let prioCheckTimer = null;

const classOrder = ["Krieger","Paladin","Jäger","Schurke","Priester","Schamane","Magier","Hexenmeister","Druide"];

function raidKeyFromRaidId(raidId){
  const id = String(raidId || "").toUpperCase();

  if(id.startsWith("ZG-")) return "zg";
  if(id.startsWith("AQ20-")) return "aq20";
  if(id.startsWith("AQ40-")) return "aq40";
  if(id.startsWith("BWL-")) return "bwl";
  if(id.startsWith("MC-")) return "mc";
  if(id.startsWith("NAXX-")) return "naxx";
  if(id.startsWith("ONY-")) return "ony";

  return null;
}
function checkLogin(){
  const isLoggedIn = sessionStorage.getItem("raidlead");
  const role = sessionStorage.getItem("raidleadRole");

  if(isLoggedIn !== "true" || !role){
    alert("Bitte zuerst über die Startseite einloggen.");
    window.location.href = "index.html";
    return;
  }

  document.getElementById("roleInfo").innerHTML =
    `<span class="ok">Login aktiv.</span> Rolle: <strong>${role}</strong>`;

  const savedPin =
    sessionStorage.getItem("raidleadPrioPin") ||
    sessionStorage.getItem("raidleadPlayerPin") ||
    "";

  if(savedPin){
    document.getElementById("raidPinInput").value = savedPin;
    const navPinInput = document.getElementById("navRaidPinInput");
    if(navPinInput) navPinInput.value = savedPin;
    loadRaidByPin();
  }
}

function canAccessRaid(role, raid){
  return role === "master" || raids[raid].role === role;
}

function navRaidPinEnter(event){
  if(event.key === "Enter"){
    loadRaidFromNav();
  }
}

function loadRaidFromNav(){
  const navPinInput = document.getElementById("navRaidPinInput");
  const pinInput = document.getElementById("raidPinInput");

  if(navPinInput && pinInput){
    pinInput.value = navPinInput.value.trim();
  }

  loadRaidByPin();
}

function isAllowedP0Raid(){
  return ["mc","bwl","aq40","naxx"].includes(currentRaidKey);
}

async function loadRaidByPin(){
  const pinInput = document.getElementById("raidPinInput");
  const navPinInput = document.getElementById("navRaidPinInput");
  const pin = (pinInput?.value || navPinInput?.value || "").trim();

  if(!pin){
    document.getElementById("controlStatus").innerHTML =
      `<span class="bad">Bitte Raidlead PIN eingeben.</span>`;
    return;
  }

  if(pinInput) pinInput.value = pin;
  if(navPinInput) navPinInput.value = pin;

  document.getElementById("controlStatus").innerHTML =
    `<span class="warn">Raid wird geladen …</span>`;

  const role = sessionStorage.getItem("raidleadRole") || "master";
  const possibleRaids = Object.keys(raids).filter(key => canAccessRaid(role,key));

  currentRaidKey = null;
  currentRaidData = null;
  currentPrios = [];
  currentReleased = false;
  itemVisualMap = {};

  for(const raidKey of possibleRaids){
    const found = await tryLoadRaidByPin(pin, raidKey);

    if(found){
      sessionStorage.setItem("raidleadPrioPin", pin);

      await loadItemVisualData();
      await loadP0PlusPoints();
      

      

      document.getElementById("controlStatus").innerHTML =
        `<span class="ok">Raid geladen.</span>`;

      renderRaidView();
      return;
    }
  }

  document.getElementById("raidView").classList.add("hidden");
  document.getElementById("controlStatus").innerHTML =
    `<span class="bad">Kein Raid zu dieser Raidlead PIN gefunden.</span>`;
}

async function tryLoadRaidByPin(pin, raidKey){
  currentRaidKey = raidKey;

  currentRaidData = {
    raid: raidKey,
    raidName: raids[raidKey].name,
    raidId: "",
    playerPin: "",
    leadPin: pin,
    playerLink: "",
    createdAt: "",
    status: ""
  };

  await loadPriosFromSheet(pin);

  const realRaidKey = raidKeyFromRaidId(currentRaidData.raidId);

  if(realRaidKey && realRaidKey !== raidKey){
    currentRaidKey = realRaidKey;
    currentRaidData.raid = realRaidKey;
    currentRaidData.raidName = raids[realRaidKey].name;
  }

  if(currentRaidData.raidId || currentPrios.length > 0){
    return true;
  }

  return false;
}

async function loadPriosFromSheet(playerPin){
  const url =
    RAID_API_URL +
    "?action=getPublishedPrios" +
    "&raid=" + encodeURIComponent(raids[currentRaidKey].short) +
    "&playerPin=" + encodeURIComponent(playerPin) +
    "&t=" + Date.now();

  try{
    const response = await fetch(url);
    const result = await response.json();

    if(result.error){
      currentPrios = [];
      currentReleased = false;
      return;
    }

    currentRaidData.raidId = result.raidId || currentRaidData.raidId;

    currentRaidData.playerPin =
      result.playerPin ||
      result.prioPin ||
      result.PrioPIN ||
      result.PlayerPIN ||
      currentRaidData.playerPin;

    currentRaidData.leadPin =
      result.leadPin ||
      result.LeadPIN ||
      result.raidleadPin ||
      result.RaidleadPIN ||

      String(publishedValue || "").toLowerCase() === "geöffnet" ||
      String(publishedValue || "").toLowerCase() === "offen" ||
      String(publishedValue || "").toLowerCase() === "published";

    const stickyKey = "raidOpen_" + (currentRaidData.raidId || result.raidId || "");
    const stickyOpen =
      sessionStorage.getItem(stickyKey) === "true" ||
      localStorage.getItem(stickyKey) === "true";
    currentReleased = apiReleased || stickyOpen;

    currentPrios = (result.prios || []).map(p => ({

      p1: p.P1 || "",

      p0Plus: p.P0Plus || ""
    }));

    currentReleased = false;
  }
}

function normalizeClassName(className){
  return String(className || "")
    .toLowerCase()
    .trim()
    .replace("ä","ae")
    .replace("ö","oe")
    .replace("ü","ue");
}

function getClassOrderValue(className){
  const normalized = normalizeClassName(className);
  const index = classOrder.findIndex(c => normalizeClassName(c) === normalized);
  return index === -1 ? 999 : index;
}

function getFilteredAndSortedPrios(){
  const search = document.getElementById("prioSearch")
    ? document.getElementById("prioSearch").value.trim().toLowerCase()
    : "";

  let data = [...currentPrios];

  if(search){
    data = data.filter(entry => {
      return [
        entry.player,
        entry.class,
        entry.p1,
        entry.p2,
        entry.p3,
        String(entry.p0Plus).toLowerCase() === "ja" ? entry.p1 : "",
        renderP0PlusPointsText(entry.p1)
      ].join(" ").toLowerCase().includes(search);
    });
  }

  data.sort((a,b) => {
    const classA = getClassOrderValue(a.class);
    const classB = getClassOrderValue(b.class);

    if(classA !== classB) return classA - classB;
    return String(a.player || "").localeCompare(String(b.player || ""),"de");
  });

  return data;
}


function normalizeP0Text(value){
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/[’'`´]/g,"")
    .replace(/ä/g,"ae")
    .replace(/ö/g,"oe")
    .replace(/ü/g,"ue")
    .replace(/ß/g,"ss")
    .replace(/[-–—]/g," ")
    .replace(/\s+/g," ");
}

function getP0Field(entry,names){
  for(const name of names){
    const value = entry && entry[name];
    if(value !== undefined && value !== null && String(value).trim() !== ""){
      return String(value).trim();
    }
  }
  return "";
}

function normalizeP0Entry(entry){
  const item = getP0Field(entry,["item","Item","itemName","ItemName","Itemname","Itemname_DE","name","Name"]);
  const player = getP0Field(entry,["player","Player","spieler","Spieler","char","Char","character","Character"]);
  const points = getP0Field(entry,["points","Points","punkte","Punkte","count","Count","anzahl","Anzahl"]);
  const raid = getP0Field(entry,["raid","Raid","RAID"]);

  if(!item || !player) return null;

  return {
    raid: raid,
    item: item,
    player: player,
    points: points || "0"
  };
}

async function loadP0PlusPoints(){
  if(!isAllowedP0Raid()){
    currentP0PlusEntries = [];
    return [];
  }

  const url = RAID_API_URL +
    "?action=getP0Plus" +
    "&all=1" +
    "&nocache=1" +
    "&refresh=1" +
    "&t=" + Date.now() + "_" + Math.random().toString(36).slice(2);

  try{
    const response = await fetch(url,{cache:"no-store"});
    const result = await response.json();
    const raw = Array.isArray(result.entries) ? result.entries : [];
    currentP0PlusEntries = raw.map(normalizeP0Entry).filter(Boolean);
    return currentP0PlusEntries;
  }catch(error){
    console.warn("P0+ Punkte konnten nicht geladen werden:", error);
    currentP0PlusEntries = [];
    return [];
  }
}

function getP0PlusEntriesForItem(itemName){
  const wanted = normalizeP0Text(itemName);
  if(!wanted) return [];

  const currentRaidShort = String(raids[currentRaidKey]?.short || currentRaidKey || "").toUpperCase();
  const currentRaidName = String(raids[currentRaidKey]?.name || currentRaidKey || "").toUpperCase();

  const entries = currentP0PlusEntries.filter(entry => {
    if(normalizeP0Text(entry.item) !== wanted) return false;

    const entryRaid = String(entry.raid || "").toUpperCase();
    if(!entryRaid) return true;

    return entryRaid === currentRaidShort || entryRaid === currentRaidName || entryRaid === String(currentRaidKey || "").toUpperCase();
  });

  const grouped = new Map();
  entries.forEach(entry => {
    const player = String(entry.player || "").trim();
    const points = Number(String(entry.points || "0").replace(",",".")) || 0;
    if(!player) return;
    grouped.set(player, Math.max(grouped.get(player) || 0, points));
  });

  return Array.from(grouped.entries())
    .map(([player,points]) => ({player,points}))
    .sort((a,b) => b.points - a.points || a.player.localeCompare(b.player,"de"));
}

function renderP0PlusPointsText(itemName){
  return getP0PlusEntriesForItem(itemName)
    .map(entry => entry.player + " " + entry.points)
    .join(" ");
}

async function sendRaidStatus(status){
  const raidId = currentRaidData?.raidId || "";
  const leadPin = currentRaidData?.leadPin || document.getElementById("raidPinInput")?.value.trim() || "";

  if(!raidId && !leadPin){
    alert("RaidID oder Raidlead PIN fehlt.");
    return false;
  }

  const url =
    RAID_API_URL +
    "?action=setRaidStatus" +
    "&raidId=" + encodeURIComponent(raidId) +
    "&leadPin=" + encodeURIComponent(leadPin) +
    "&status=" + encodeURIComponent(status) +
    "&t=" + Date.now();

  try{
    /*
      Wichtig: Apps Script liefert bei setRaidStatus JSON, aber ohne CORS-Header.
      Deshalb lesen wir die Antwort hier nicht aus. Der GET-Aufruf wird trotzdem ausgeführt
      und schreibt den Status in den Raids-Tab. So vermeiden wir den Browserfehler
      „Origin is not allowed by Access-Control-Allow-Origin“.
    */
    await fetch(url, {
      method:"GET",
      mode:"no-cors",
      cache:"no-store"
    });

    if(status === "geöffnet"){
      sessionStorage.setItem("raidOpen_" + raidId, "true");
      localStorage.setItem("raidOpen_" + raidId, "true");
    }else{
      sessionStorage.removeItem("raidOpen_" + raidId);
      localStorage.removeItem("raidOpen_" + raidId);
    }

    return true;
  }catch(error){
    console.error(error);
    alert("Priolisten-Status konnte nicht gesendet werden.");
    return false;
  }
}

function parseCSV(text){
  const rows=[];
  let row=[];
  let value="";
  let insideQuotes=false;

  for(let i=0;i<text.length;i++){
    const char=text[i];
    const next=text[i+1];

    if(char === '"' && insideQuotes && next === '"'){
      value+='"';
      i++;
    }else if(char === '"'){
      insideQuotes=!insideQuotes;
    }else if(char === "," && !insideQuotes){
      row.push(value);
      value="";
    }else if((char === "\n" || char === "\r") && !insideQuotes){
      if(value || row.length){
        row.push(value);
        rows.push(row);
        row=[];
        value="";
      }
      if(char === "\r" && next === "\n") i++;
    }else{
      value+=char;
    }
  }

  if(value || row.length){
    row.push(value);
    rows.push(row);
  }

  return rows;
}

}

function normalizeQuality(value){
  const q = String(value || "").toLowerCase().trim();

  if(q.includes("legendary") || q.includes("legendär") || q.includes("orange")) return "legendary";
  if(q.includes("epic") || q.includes("episch") || q.includes("lila")) return "epic";
  if(q.includes("rare") || q.includes("selten") || q.includes("blau")) return "rare";
  if(q.includes("uncommon") || q.includes("ungewöhnlich") || q.includes("grün") || q.includes("gruen")) return "uncommon";
  if(q.includes("common") || q.includes("gewöhnlich") || q.includes("weiß") || q.includes("weiss")) return "common";
  if(q.includes("poor") || q.includes("schlecht") || q.includes("grau")) return "poor";
  if(q.includes("artifact") || q.includes("artefakt")) return "artifact";
  if(q.includes("heirloom")) return "heirloom";

  return "";
}


function normalizeJsonLootItem(obj){
  const item = obj.name || obj.Itemname_DE || obj.Itemname || obj.Item || obj.item || obj.Name || obj.name || "";
  const itemId = obj.itemId || obj.ItemID || obj.ID || obj.id || "";
  const iconName = obj.iconName || obj.IconName || obj.WowheadIcon || obj.Iconname || obj.icon || obj.Icon || "";
  const stats = Array.isArray(obj.stats)
    ? obj.stats
    : String(obj.statsText || obj.Stats_DE || obj.Stats || obj.Werte || obj.tooltip || obj.Tooltip_DE || "")
        .split("|")
        .map(v => v.trim())
        .filter(Boolean);

  return {

    itemId:String(itemId || "").trim(),
    quality:normalizeQuality(obj.quality || obj.Qualität || obj.Quality || obj.Seltenheit || obj.Rarity || "") || "epic",
    iconName:String(iconName || "").trim(),
    boss:obj.boss || obj.Boss || "",
    slot:obj.slot || obj.Slot_DE || obj.Slot || "",
    type:obj.type || obj.Typ_DE || obj.Typ || obj.Type || "",
    dropchance:obj.dropChance || obj.Dropchance || obj.dropchance || "",
    tooltipText:obj.tooltip || obj.Tooltip_DE || obj.Tooltip || "",
    stats:stats
  };
}
async function loadItemVisualData(){
  itemVisualMap = {};
  itemIdMap = {};

  const url = LOOT_JSON_URLS[currentRaidKey];

  if(!url){
    return;
  }

  try{
    const response = await fetch(url + "?t=" + Date.now(), {cache:"no-store"});
    const rows = await response.json();

    (Array.isArray(rows) ? rows : []).forEach(obj => {
      const info = normalizeJsonLootItem(obj);
      if(!info.name) return;

      const key = itemKey(info.name);
      itemVisualMap[key] = info;

      if(info.itemId){
        itemIdMap[key] = info.itemId;
      }
    });

  }catch(error){
    console.error("GitHub-Itemdaten konnten nicht geladen werden:", currentRaidKey, error);
  }
}

function getClassColorClass(className){
  const c = String(className || "").toLowerCase();

  if(c.includes("krieger") || c.includes("warrior")) return "class-warrior";
  if(c.includes("paladin")) return "class-paladin";
  if(c.includes("jäger") || c.includes("jaeger") || c.includes("hunter")) return "class-hunter";
  if(c.includes("schurke") || c.includes("rogue")) return "class-rogue";
  if(c.includes("priester") || c.includes("priest")) return "class-priest";
  if(c.includes("schamane") || c.includes("shaman")) return "class-shaman";
  if(c.includes("magier") || c.includes("mage")) return "class-mage";
  if(c.includes("hexenmeister") || c.includes("warlock")) return "class-warlock";
  if(c.includes("druide") || c.includes("druid")) return "class-druid";

  return "";
}

function renderClass(className){
  const name = String(className || "").trim();

  if(!name){
    return "-";
  }

  return `
    <span class="class-badge ${getClassColorClass(name)}">
      ${safe(name)}
    </span>
  `;
}

function getIconUrl(iconName){
  const raw = String(iconName || "").trim();
  if(!raw) return "https://wow.zamimg.com/images/wow/icons/large/inv_misc_questionmark.jpg";
  if(/^https?:\/\//i.test(raw)) return raw;
  if(/^\d+$/.test(raw)) return "https://wow.zamimg.com/images/wow/icons/large/inv_misc_questionmark.jpg";
  const clean = raw.toLowerCase().replace(/\.jpg$|\.png$/g,"");
  return "https://wow.zamimg.com/images/wow/icons/large/" + clean + ".jpg";
}

function iconFallback(img){
  img.src = "https://wow.zamimg.com/images/wow/icons/large/inv_misc_questionmark.jpg";
}

function findItemInfo(itemName){
  return itemVisualMap[itemKey(itemName)] || null;
}

function renderTooltipLines(text){
  return String(text || "")
    .split("|")
    .map(s => s.trim())
    .filter(Boolean)
    .map(line => {
      const cls =
        line.startsWith("+") ||
        line.startsWith("Anlegen:") ||
        line.startsWith("Benutzen:") ||
        line.startsWith("Trefferchance:") ||
        line.startsWith("Chance bei Treffer:")
          ? "tooltip-equip"
          : "tooltip-row";
      return `<div class="${cls}">${safe(line)}</div>`;
    }).join("");
}

function showTooltip(event,itemName){
  const tooltip = document.getElementById("tooltip");
  const item = findItemInfo(itemName);
  if(!tooltip || !item) return;

  const stats = (item.stats || [])
    .map(stat => `<div class="tooltip-stat">${safe(stat)}</div>`)
    .join("");

  tooltip.innerHTML = `
    <div class="tooltip-title ${safe(item.quality || "epic")}">${safe(item.name || itemName)}</div>
    <div class="tooltip-ilvl">${item.itemId ? "ItemID: " + safe(item.itemId) : safe(raids[currentRaidKey]?.name || "")}</div>
    ${item.slot || item.type ? `<div class="tooltip-row">${safe(item.slot || "")} ${safe(item.type || "")}</div>` : ""}
    ${item.boss ? `<div class="tooltip-row"><strong>Boss:</strong> ${safe(item.boss)}</div>` : ""}
    ${item.dropchance ? `<div class="tooltip-row"><strong>Dropchance:</strong> ${safe(item.dropchance)}</div>` : ""}
    ${stats}
    ${renderTooltipLines(item.tooltipText)}
    ${renderTooltipP0Plus(item.name || itemName)}
  `;

  tooltip.classList.remove("hidden");
  moveTooltip(event);
}

function moveTooltip(event){
  const tooltip = document.getElementById("tooltip");
  if(!tooltip || tooltip.classList.contains("hidden")) return;
  tooltip.style.left = (window.scrollX + event.clientX + 12) + "px";
  tooltip.style.top = (window.scrollY + event.clientY - 10) + "px";
}

function hideTooltip(){
  const tooltip = document.getElementById("tooltip");
  if(tooltip) tooltip.classList.add("hidden");
}

function renderItem(itemName){
  const name = String(itemName || "").trim();

  if(!name){
    return "-";
  }

  const info = itemVisualMap[itemKey(name)] || {};
  const quality = info.quality || "epic";
  const itemId = info.itemId || "";
  const iconName = info.iconName || "";
  const className = "item-" + quality;
  const icon = `
    <img
      class="item-icon"
      src="${getIconUrl(iconName)}"
      alt=""
      loading="lazy"
      onerror="iconFallback(this)"
    >
  `;

  const tooltipAttrs = `
    onmouseenter="showTooltip(event,'${escapeQuotes(name)}')"
    onmousemove="moveTooltip(event)"
    onmouseleave="hideTooltip()"
  `;

  if(itemId){
    return `
      <a class="item-link ${className} item-with-icon"
         href="https://www.wowhead.com/classic/item=${safe(itemId)}"
         target="_blank"
         rel="noopener noreferrer"
         ${tooltipAttrs}>
        ${icon}
        <span>${safe(name)}</span>
      </a>
    `;
  }

  return `
    <span class="item-name ${className} item-with-icon" ${tooltipAttrs}>
      ${icon}
      <span>${safe(name)}</span>
    </span>
  `;
}

async function loadItemIdsForExport(){
  itemIdMap = {};

  const url = LOOT_JSON_URLS[currentRaidKey];

  if(!url){
    return;
  }

  try{
    const response = await fetch(url + "?t=" + Date.now(), {cache:"no-store"});
    const rows = await response.json();

    (Array.isArray(rows) ? rows : []).forEach(obj => {
      const info = normalizeJsonLootItem(obj);
      if(!info.name || !info.itemId) return;
      itemIdMap[itemKey(info.name)] = info.itemId;
    });
  }catch(error){
    console.error("ItemIDs für Export konnten nicht geladen werden:", currentRaidKey, error);
  }
}

function formatItemForPrio3(itemName){
  const name = String(itemName || "").trim();

  if(!name || name === "-"){
    return "";
  }

  if(/\-\d+$/.test(name)){
    return name;
  }

  const id = itemIdMap[itemKey(name)];

  if(!id){
    return name;
  }

  return name + "-" + id;
}

async function downloadPrio3ReforgedExport(){
  if(!currentRaidData){
    alert("Kein Raid geladen.");
    return;
  }

  if(!currentPrios || currentPrios.length === 0){
    alert("Keine Prios vorhanden.");
    return;
  }

  await loadItemIdsForExport();

  let content = "";

  currentPrios.forEach(entry => {
    const player = entry.player || "";
    const playerClass = entry.class || "";

    const p1 = formatItemForPrio3(entry.p1);
    const p2 = formatItemForPrio3(entry.p2);
    const p3 = formatItemForPrio3(entry.p3);

    content +=
      player + "\t\t" +
      playerClass + "\t\t" +
      p1 + "\t" +
      p2 + "\t" +
      p3 + "\n";
  });

  const filename =
    (currentRaidData.raidId || currentRaidKey || "raid") +
    "-prio3-reforged.txt";

  const blob = new Blob([content], {
    type:"text/plain;charset=utf-8"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = filename;
  a.click();

  URL.revokeObjectURL(url);
}

let addonItemInfoMap = {};

async function loadLootDataForAddonExport(){
  addonItemInfoMap = {};

  const url = LOOT_JSON_URLS[currentRaidKey];
  if(!url) return;

  try{
    const response = await fetch(url + "?t=" + Date.now(), {cache:"no-store"});
    const rows = await response.json();

    (Array.isArray(rows) ? rows : []).forEach(obj => {
      const info = normalizeJsonLootItem(obj);
      if(!info.name) return;

      addonItemInfoMap[itemKey(info.name)] = {
        boss: info.boss || "",
        slot: info.slot || "",
        typ: info.type || "",
        icon: info.iconName || obj.iconName || obj.IconName || "",
        itemId: info.itemId || ""
      };
    });

  }catch(error){
    console.error(error);
    alert("Iteminfos konnten nicht vollständig geladen werden.");
  }
}

async function downloadAddonExport(){

  if(!currentPrios || currentPrios.length === 0){
    alert("Keine Priodaten vorhanden.");
    return;
  }

  await loadLootDataForAddonExport();

  let exportText =
  "Raid;Boss;Slot;Typ;Item;Icon;Spieler;Punkte";

  currentPrios.forEach(entry => {

    const player = entry.player || "";

    if(
      String(entry.p0Plus || "").toLowerCase() === "ja"
      && entry.p1
    ){
      const info = addonItemInfoMap[itemKey(entry.p1)] || {};

      if(exportText){
        exportText += "||";
      }

      exportText +=
        raids[currentRaidKey].name + ";" +
        (info.boss || "") + ";" +
        (info.slot || "") + ";" +
        (info.typ || "") + ";" +
        entry.p1 + ";" +
        (info.icon || "") + ";" +
        player + ";" +
        "1";
    }

  });

  navigator.clipboard.writeText(exportText);

  alert(
    "Addon Export wurde in die Zwischenablage kopiert.\n\n" +
    exportText
  );
}
  
function backToRaidPrio(){
  if(!currentRaidKey || !currentRaidData){
    alert("Kein Raid geladen.");
    return;
  }

  window.location.href =
    raids[currentRaidKey].lootPage +
    "?pin=" +
    encodeURIComponent(currentRaidData.playerPin || "");
}

function logout(){
  if(prioCheckTimer) clearInterval(prioCheckTimer);
  sessionStorage.removeItem("raidlead");
  sessionStorage.removeItem("raidleadRole");
  sessionStorage.removeItem("raidleadRaidId");
  sessionStorage.removeItem("raidleadPrioPin");
  sessionStorage.removeItem("raidleadPlayerPin");
  window.location.href = "index.html";
}

function safe(value){
  return String(value || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function escapeQuotes(value){
  return String(value || "")
    .replace(/\\/g,"\\\\")
    .replace(/'/g,"\\'");
}
