<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lichtloot – Raidlead</title>

<style>
:root{
  --gold:#facc15;
  --panel:rgba(12,18,32,.90);
  --text:#f8fafc;
  --muted:#cbd5e1;
  --line:rgba(255,255,255,.12);
  --danger:#ef4444;
  --green:#22c55e;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--text);
  background:
    linear-gradient(rgba(8,17,31,.82),rgba(8,17,31,.94)),
    url('./images/back.jpeg');
  background-size:cover;
  background-position:center top;
  background-attachment:fixed;
}

.overlay{
  min-height:100vh;
  padding:36px 22px 70px;
  backdrop-filter:blur(3px);
}

.topbar,
.header,
.raid-card{
  width:min(1300px,100%);
  margin:auto;
}

.topbar{
  margin-bottom:28px;
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:center;
  flex-wrap:wrap;
}

.btn-link,
.btn{
  color:var(--text);
  text-decoration:none;
  font-weight:900;
  border:1px solid var(--line);
  padding:12px 16px;
  border-radius:14px;
  background:rgba(12,18,32,.72);
  cursor:pointer;
  display:inline-block;
  text-align:center;
}

.btn:hover,
.btn-link:hover{
  border-color:rgba(250,204,21,.55);
}

.header{
  margin-bottom:22px;
  padding:30px;
  border-radius:24px;
  background:var(--panel);
  border:1px solid rgba(250,204,21,.22);
  box-shadow:0 20px 45px rgba(0,0,0,.45);
}

h1{
  color:var(--gold);
  font-size:clamp(34px,5vw,58px);
  margin-bottom:8px;
}

.subtitle{
  color:#dbeafe;
  line-height:1.7;
  font-size:15px;
}

.raid-card{
  margin-bottom:22px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:22px;
  padding:24px;
  box-shadow:0 18px 40px rgba(0,0,0,.38);
}

h2{
  color:var(--gold);
  margin-bottom:14px;
  font-size:25px;
}

h3{
  color:#dbeafe;
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:.12em;
  margin-top:20px;
  margin-bottom:10px;
}

label{
  display:block;
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  margin:12px 0 7px;
  text-transform:uppercase;
  letter-spacing:.08em;
}

input{
  width:100%;
  padding:12px 13px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(2,6,23,.82);
  color:white;
  font-size:14px;
}

.pin-grid{
  display:grid;
  grid-template-columns:1fr auto;
  gap:14px;
  align-items:end;
}

.status{
  margin:14px 0;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--line);
  background:rgba(2,6,23,.55);
  color:#dbeafe;
  line-height:1.6;
  font-size:14px;
}

.ok{color:var(--green);font-weight:900}
.warn{color:var(--gold);font-weight:900}
.bad{color:var(--danger);font-weight:900}

.button-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.btn.neutral{
  background:linear-gradient(135deg,rgba(96,165,250,.22),rgba(15,23,42,.65));
  border-color:rgba(96,165,250,.25);
}

.btn.success{
  background:linear-gradient(135deg,rgba(34,197,94,.28),rgba(15,23,42,.65));
  border-color:rgba(34,197,94,.35);
}

.btn.warning{
  background:linear-gradient(135deg,rgba(250,204,21,.24),rgba(15,23,42,.65));
  border-color:rgba(250,204,21,.35);
}

.btn.danger{
  background:linear-gradient(135deg,rgba(239,68,68,.35),rgba(15,23,42,.65));
  border-color:rgba(239,68,68,.40);
}

.btn.small-btn{
  padding:8px 10px;
  border-radius:10px;
  font-size:12px;
  margin-top:0;
  width:auto;
  margin-right:6px;
  margin-bottom:6px;
}


.search-box{
  margin:14px 0;
  position:relative;
}

.search-box input{
  width:100%;
  padding:12px 13px 12px 38px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(2,6,23,.82);
  color:white;
  font-size:14px;
  font-weight:700;
}

.search-box input:focus{
  outline:none;
  border-color:rgba(250,204,21,.65);
  box-shadow:0 0 0 2px rgba(250,204,21,.14);
}

.search-icon{
  position:absolute;
  left:13px;
  top:50%;
  transform:translateY(-50%);
  color:var(--gold);
  z-index:2;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:14px;
  font-size:14px;
}

th,td{
  padding:9px;
  border-bottom:1px solid rgba(255,255,255,.10);
  text-align:left;
  vertical-align:top;
}

th{
  color:var(--gold);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
}

.check{color:var(--green);font-weight:900;font-size:17px}
.cross{color:var(--danger);font-weight:900;font-size:17px}

.hidden{display:none!important}

/* Klassenfarben */
.class-badge{
  display:inline-block;
  font-weight:900;
  padding:3px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  white-space:nowrap;
}

.class-warrior{color:#c79c6e;border-color:rgba(199,156,110,.45);background:rgba(199,156,110,.10)}
.class-paladin{color:#f58cba;border-color:rgba(245,140,186,.45);background:rgba(245,140,186,.10)}
.class-hunter{color:#abd473;border-color:rgba(171,212,115,.45);background:rgba(171,212,115,.10)}
.class-rogue{color:#fff569;border-color:rgba(255,245,105,.45);background:rgba(255,245,105,.10)}
.class-priest{color:#ffffff;border-color:rgba(255,255,255,.45);background:rgba(255,255,255,.10)}
.class-shaman{color:#0070de;border-color:rgba(0,112,222,.55);background:rgba(0,112,222,.14)}
.class-mage{color:#69ccf0;border-color:rgba(105,204,240,.50);background:rgba(105,204,240,.12)}
.class-warlock{color:#9482c9;border-color:rgba(148,130,201,.50);background:rgba(148,130,201,.12)}
.class-druid{color:#ff7d0a;border-color:rgba(255,125,10,.50);background:rgba(255,125,10,.12)}

/* Itemfarben */
.item-link,
.item-name{
  font-weight:800;
  text-decoration:none;
  text-shadow:0 0 10px rgba(0,0,0,.55);
}

.item-link:hover{text-decoration:underline}
.item-poor{color:#9d9d9d}
.item-common{color:#ffffff}
.item-uncommon{color:#1eff00}
.item-rare{color:#0070dd}
.item-epic{color:#a335ee}
.item-legendary{color:#ff8000}
.item-artifact{color:#e6cc80}
.item-heirloom{color:#00ccff}


.item-with-icon{
  display:inline-flex;
  align-items:center;
  gap:7px;
  max-width:100%;
}

.item-icon{
  width:22px;
  height:22px;
  border-radius:4px;
  border:1px solid rgba(250,204,21,.35);
  object-fit:cover;
  flex-shrink:0;
}

.tooltip{
  position:fixed;
  z-index:20000;
  width:330px;
  padding:12px;
  border-radius:8px;
  background:linear-gradient(rgba(7,12,31,.96),rgba(2,6,23,.98));
  border:1px solid rgba(148,163,184,.75);
  box-shadow:0 0 28px rgba(0,0,0,.85);
  pointer-events:none;
  font-size:11px;
  line-height:1.35;
}

.tooltip-title{font-size:16px;font-weight:900;margin-bottom:4px}
.tooltip-title.epic{color:#a335ee}.tooltip-title.rare{color:#0070dd}.tooltip-title.uncommon{color:#1eff00}.tooltip-title.legendary{color:#ff8000}
.tooltip-ilvl{color:#ffd100;font-size:12px;font-weight:900;margin-bottom:6px}
.tooltip-row,.tooltip-stat,.tooltip-bind{color:white;font-size:11px;margin-top:3px}
.tooltip-equip{color:#1eff00;font-size:11px;margin-top:6px}
.tooltip-p0{margin-top:9px;padding-top:8px;border-top:1px solid rgba(255,255,255,.18);color:#dbeafe}

@media(max-width:1000px){
  .pin-grid{grid-template-columns:1fr}
  .button-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="overlay">

<div class="topbar">
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <a class="btn-link" href="index.html">← Zurück zur Startseite</a>
    <button class="btn-link" onclick="backToRaidPrio()">← Zurück zur Prio-Auswahl</button>
  </div>

  <button class="btn danger" onclick="logout()">Logout</button>
</div>

<div class="header">
  <h1>Raidlead Panel</h1>
  <div class="subtitle">
    Lade den Raid über die Raidlead PIN und verwalte die aktuelle Prioliste.
  </div>

  <div id="roleInfo" class="status"></div>

  <div class="status">
    <label>Raidlead PIN</label>
    <div class="pin-grid">
      <input id="raidPinInput" type="text" placeholder="Raidlead PIN eingeben">
      <button class="btn neutral" onclick="loadRaidByPin()">Raid laden</button>
    </div>

    <div id="controlStatus" style="margin-top:10px">
      Bitte Raidlead PIN eingeben.
    </div>
  </div>
</div>

<div id="raidView" class="raid-card hidden"></div>

<div id="tooltip" class="tooltip hidden"></div>

<script>
const RAID_API_URL =
  "https://script.google.com/macros/s/AKfycbzwRZ1908IawmEh3WdROu_TBwfu8Yr1YXJ1VicqEIf15eZ2zzRE3Yw9OaaeJ0ZADbye2g/exec";

const MASTER_CODE = "Lichtbringer-Master";

const raids = {
  mc:{name:"Molten Core",short:"MC",role:"mc-bwl",lootPage:"loot/mc-loot.html",overviewPage:"molten-core.html"},
  bwl:{name:"Blackwing Lair",short:"BWL",role:"mc-bwl",lootPage:"loot/bwl-loot.html",overviewPage:"bwl.html"},
  aq40:{name:"Ahn'Qiraj 40",short:"AQ40",role:"aq40",lootPage:"loot/aq40-loot.html",overviewPage:"aq.html"},
  naxx:{name:"Naxxramas",short:"NAXX",role:"naxx",lootPage:"loot/naxx-loot.html",overviewPage:"naxxramas.html"},
  zg:{name:"ZG 20",short:"ZG",role:"zg-aq20",lootPage:"loot/zg-loot.html",overviewPage:"zg.html"},
  aq20:{name:"AQ 20",short:"AQ20",role:"zg-aq20",lootPage:"loot/aq20-loot.html",overviewPage:"aq20.html"},
  ony:{name:"Onyxia",short:"ONY",role:"ony",lootPage:"loot/ony-loot.html",overviewPage:"ony.html"}
};

const LOOT_CSV_URLS = {
  mc:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_MC",
  bwl:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_BWL",
  aq40:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_AQ40",
  naxx:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_NAXX",
  zg:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_ZG",
  aq20:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_AQ20",
  ony:"https://docs.google.com/spreadsheets/d/10_Rkl1biYanx7rEbiSzjd4q3LqPBa-OxH7hFSMMBNGQ/gviz/tq?tqx=out:csv&sheet=LOOT_ONY"
};

let currentRaidKey = null;
let currentRaidData = null;
let currentPrios = [];
let currentReleased = false;
let itemIdMap = {};
let itemVisualMap = {};

const classOrder = [
  "Krieger",
  "Paladin",
  "Jäger",
  "Schurke",
  "Priester",
  "Schamane",
  "Magier",
  "Hexenmeister",
  "Druide"
];

function raidKeyFromRaidId(raidId){
  const id = String(raidId || "").toUpperCase();

  if(id.startsWith("ZG-")) return "zg";
  if(id.startsWith("AQ20-")) return "aq20";
  if(id.startsWith("AQ40-")) return "aq40";
  if(id.startsWith("BWL-")) return "bwl";
  if(id.startsWith("MC-")) return "mc";
  if(id.startsWith("NAXX-")) return "naxx";
  if(id.startsWith("ONY-")) return "ony";

  return null;
}
function checkLogin(){
  const isLoggedIn = sessionStorage.getItem("raidlead");
  const role = sessionStorage.getItem("raidleadRole");

  if(isLoggedIn !== "true" || !role){
    alert("Bitte zuerst über die Startseite einloggen.");
    window.location.href = "index.html";
    return;
  }

  document.getElementById("roleInfo").innerHTML =
    `<span class="ok">Login aktiv.</span> Rolle: <strong>${role}</strong>`;

  const savedPin =
    sessionStorage.getItem("raidleadPrioPin") ||
    sessionStorage.getItem("raidleadPlayerPin") ||
    "";

  if(savedPin){
    document.getElementById("raidPinInput").value = savedPin;
    loadRaidByPin();
  }
}

function canAccessRaid(role, raid){
  return role === "master" || raids[raid].role === role;
}

function isAllowedP0Raid(){
  return ["mc","bwl","aq40","naxx"].includes(currentRaidKey);
}

async function loadRaidByPin(){
  const pin = document.getElementById("raidPinInput").value.trim();

  if(!pin){
    document.getElementById("controlStatus").innerHTML =
      `<span class="bad">Bitte Raidlead PIN eingeben.</span>`;
    return;
  }

  document.getElementById("controlStatus").innerHTML =
    `<span class="warn">Raid wird geladen …</span>`;

  const role = sessionStorage.getItem("raidleadRole") || "master";

  currentRaidKey = null;
  currentRaidData = {
    raid:"",
    raidName:"",
    raidId:"",
    playerPin:"",
    leadPin:pin,
    playerLink:"",
    createdAt:"",
    status:""
  };
  currentPrios = [];
  currentReleased = false;
  itemVisualMap = {};

  try{
    /*
      Wichtig:
      Der Raidlead-PIN ist eindeutig. Deshalb laden wir NICHT mehr MC → BWL → AQ40 usw. durch.
      Genau dadurch wurde ein AQ40-PIN fälschlich als MC angezeigt, sobald Prios gefunden wurden.
    */
    const leadResult = await fetchRaidJson([
      ["action","validateLeadPin"],
      ["leadPin",pin]
    ]);

    if(!applyRaidResult(leadResult)){
      document.getElementById("raidView").classList.add("hidden");
      document.getElementById("controlStatus").innerHTML =
        `<span class="bad">Kein Raid zu dieser Raidlead PIN gefunden.</span>`;
      return;
    }

    if(currentRaidKey && !canAccessRaid(role,currentRaidKey)){
      document.getElementById("raidView").classList.add("hidden");
      document.getElementById("controlStatus").innerHTML =
        `<span class="bad">Du hast für diesen Raid keine Berechtigung.</span>`;
      return;
    }

    await loadPriosFromSheet(currentRaidData.leadPin || pin);

    sessionStorage.setItem("raidleadPrioPin", pin);
    if(currentRaidData.playerPin){
      sessionStorage.setItem("raidleadPlayerPin", currentRaidData.playerPin);
    }

    await loadItemVisualData();

    document.getElementById("controlStatus").innerHTML =
      `<span class="ok">Raid geladen.</span>`;

    renderRaidView();

  }catch(error){
    console.error(error);
    document.getElementById("raidView").classList.add("hidden");
    document.getElementById("controlStatus").innerHTML =
      `<span class="bad">Raid konnte nicht geladen werden.</span>`;
  }
}

function raidKeyFromShort(value){
  const short = String(value || "").trim().toUpperCase();

  if(short === "MC" || short.includes("MOLTEN")) return "mc";
  if(short === "BWL" || short.includes("BLACKWING")) return "bwl";
  if(short === "AQ40" || short.includes("AHN'QIRAJ 40") || short.includes("AQ 40")) return "aq40";
  if(short === "AQ20" || short.includes("AQ 20")) return "aq20";
  if(short === "NAXX" || short.includes("NAXX")) return "naxx";
  if(short === "ZG" || short.includes("ZUL") || short.includes("ZG 20")) return "zg";
  if(short === "ONY" || short.includes("ONYXIA")) return "ony";

  return null;
}

async function fetchRaidJson(params){
  const url =
    RAID_API_URL +
    "?" +
    params.map(pair => encodeURIComponent(pair[0]) + "=" + encodeURIComponent(pair[1])).join("&") +
    "&t=" + Date.now();

  const response = await fetch(url);
  return await response.json();
}

function applyRaidResult(result){
  if(!result || result.error || result.success === false){
    return false;
  }

  const data = result.raid || result.data || result;

  currentRaidData.raidId =
    data.raidId ||
    data.RaidID ||
    data.id ||
    currentRaidData.raidId;

  const raidShort =
    data.raid ||
    data.Raid ||
    data.raidShort ||
    data.RaidShort ||
    data.short ||
    data.Short ||
    "";

  const raidName =
    data.raidName ||
    data.RaidName ||
    data.name ||
    data.Name ||
    "";

  const byId = raidKeyFromRaidId(currentRaidData.raidId);
  const byShort = raidKeyFromShort(raidShort);
  const byName = raidKeyFromShort(raidName);
  const detectedRaidKey = byId || byShort || byName || currentRaidKey;

  if(detectedRaidKey && raids[detectedRaidKey]){
    currentRaidKey = detectedRaidKey;
    currentRaidData.raid = detectedRaidKey;
    currentRaidData.raidName = raids[detectedRaidKey].name;
  }

  currentRaidData.playerPin =
    data.playerPin ||
    data.prioPin ||
    data.PrioPIN ||
    data.PlayerPIN ||
    data.SpielerPIN ||
    currentRaidData.playerPin;

  currentRaidData.leadPin =
    data.leadPin ||
    data.LeadPIN ||
    data.raidleadPin ||
    data.RaidleadPIN ||
    data.LeadPin ||
    currentRaidData.leadPin;

  currentRaidData.raidDate = data.raidDate || data.RaidDate || currentRaidData.raidDate || "";
  currentRaidData.raidTime = data.raidTime || data.RaidTime || currentRaidData.raidTime || "";

  const publishedValue =
    data.published ??
    data.freigegeben ??
    data.Freigegeben ??
    data.open ??
    data.Offen ??
    data.status ??
    false;

  const publishedText = String(publishedValue || "").trim().toLowerCase();

  currentReleased =
    publishedValue === true ||
    publishedText === "true" ||
    publishedText === "ja" ||
    publishedText === "geöffnet" ||
    publishedText === "geoefnet" ||
    publishedText === "offen" ||
    publishedText === "published";

  const prioRows = result.prios || data.prios || data.rows || data.entries || [];

  if(Array.isArray(prioRows)){
    currentPrios = prioRows.map(p => ({
      player: p.Spieler || p.player || p.Player || "",
      server: p.Server || p.server || "",
      class: p.Klasse || p.className || p.Class || p.class || "",
      p1: p.P1 || p.p1 || "",
      p2: p.P2 || p.p2 || "",
      p3: p.P3 || p.p3 || "",
      p0Plus: p.P0Plus || p.p0Plus || p.P0 || p.p0 || ""
    }));
  }

  return Boolean(currentRaidKey || currentRaidData.raidId || currentPrios.length || currentRaidData.playerPin);
}

async function loadPriosFromSheet(pin){
  currentPrios = [];

  const attempts = [
    [
      ["action","getPublishedPrios"],
      ["leadPin",pin]
    ],
    [
      ["action","getPublishedPrios"],
      ["playerPin",currentRaidData.playerPin || pin]
    ],
    [
      ["action","getPublishedPrios"],
      ["pin",pin]
    ]
  ];

  for(const params of attempts){
    try{
      const result = await fetchRaidJson(params);
      if(applyRaidResult(result)){
        return;
      }
    }catch(error){
      console.error(error);
    }
  }
}

function fireAndForgetRaidAction(params){
  const url =
    RAID_API_URL +
    "?" +
    params.map(pair => encodeURIComponent(pair[0]) + "=" + encodeURIComponent(pair[1])).join("&") +
    "&t=" + Date.now();

  /*
    Apps Script blockt bei manchen Domains die lesbare Antwort per CORS,
    der GET-Aufruf selbst kommt aber an. Darum senden wir Statusänderungen
    zusätzlich als unsichtbaren Request und aktualisieren die Anzeige lokal.
  */
  return new Promise(resolve => {
    const img = new Image();
    let done = false;
    const finish = () => {
      if(done) return;
      done = true;
      resolve(true);
    };
    img.onload = finish;
    img.onerror = finish;
    setTimeout(finish, 1200);
    img.src = url;
  });
}

async function ensureRaidIdLoaded(){
  if(currentRaidData && currentRaidData.raidId){
    return true;
  }

  const pin =
    currentRaidData?.leadPin ||
    document.getElementById("raidPinInput")?.value.trim() ||
    "";

  if(!pin || !currentRaidKey){
    return false;
  }

  await loadPriosFromSheet(pin);
  return Boolean(currentRaidData && currentRaidData.raidId);
}

function renderRaidView(){
  const view = document.getElementById("raidView");

  if(!currentRaidKey || !currentRaidData){
    view.classList.add("hidden");
    return;
  }

  const r = raids[currentRaidKey];
  view.classList.remove("hidden");

  const transferButton =
    currentReleased && isAllowedP0Raid()
      ? `<button class="btn warning" onclick="transferP0PlusPoints()">P0+ Punkte übertragen</button>`
      : `<button class="btn warning" disabled style="opacity:.45;cursor:not-allowed">P0+ Punkte übertragen</button>`;

  view.innerHTML = `

function getClassOrderValue(className){
  const normalized = normalizeClassName(className);
  const index = classOrder.findIndex(c => normalizeClassName(c) === normalized);
  return index === -1 ? 999 : index;
}

function normalizeClassName(className){
  return String(className || "")
    .toLowerCase()
    .trim()
    .replace("ä","ae")
    .replace("ö","oe")
    .replace("ü","ue");
}

function getFilteredAndSortedPrios(){
  const search = document.getElementById("prioSearch")
    ? document.getElementById("prioSearch").value.trim().toLowerCase()
    : "";

  let data = [...currentPrios];

  if(search){
    data = data.filter(entry => {
      return [
        entry.player,
        entry.server,
        entry.class,
        entry.p1,
        entry.p2,
        entry.p3,
        String(entry.p0Plus).toLowerCase() === "ja" ? entry.p1 : ""
      ].join(" ").toLowerCase().includes(search);
    });
  }

  data.sort((a,b) => {
    const classA = getClassOrderValue(a.class);
    const classB = getClassOrderValue(b.class);

    if(classA !== classB){
      return classA - classB;
    }

    return String(a.player || "").localeCompare(String(b.player || ""),"de");
  });

  return data;
}

function renderRows(){
  const rows = getFilteredAndSortedPrios();

  if(rows.length === 0){
    return `<tr><td colspan="9">Keine Einträge vorhanden oder keine Treffer für die Suche.</td></tr>`;
  }

  return rows.map((entry,index)=>{
    const isP0Plus =
      String(entry.p0Plus || "").toLowerCase() === "ja";

    const clearButton =
      currentReleased && isP0Plus && isAllowedP0Raid()
        ? `<button class="btn warning small-btn"
             onclick="clearP0PlusForPlayer('${escapeQuotes(entry.player)}','${escapeQuotes(entry.server)}','${escapeQuotes(entry.p1)}')">
             P0+ erhalten
           </button>`
        : "";

    const actionButtons = `
      <button class="btn danger small-btn"
        onclick="deleteSinglePrio('${escapeQuotes(entry.player)}','${escapeQuotes(entry.server)}')">
        Löschen
      </button>
      ${clearButton}
    `;

    if(!currentReleased){
      return `
        <tr>
          <td>${index + 1}</td>
          <td>${safe(entry.player || "-")}</td>
          <td>${safe(entry.server || "-")}</td>
          <td>${renderClass(entry.class)}</td>
          <td>${entry.p1 ? '<span class="check">✓</span>' : '<span class="cross">✗</span>'}</td>
          <td>${entry.p2 ? '<span class="check">✓</span>' : '<span class="cross">✗</span>'}</td>
          <td>${entry.p3 ? '<span class="check">✓</span>' : '<span class="cross">✗</span>'}</td>
          <td>${isP0Plus ? renderItem(entry.p1) : '<span class="cross">✗</span>'}</td>
          <td>${actionButtons}</td>
        </tr>
      `;
    }

    return `
      <tr>
        <td>${index + 1}</td>
        <td>${safe(entry.player || "-")}</td>
        <td>${safe(entry.server || "-")}</td>
        <td>${renderClass(entry.class)}</td>
        <td>${renderItem(entry.p1)}</td>
        <td>${renderItem(entry.p2)}</td>
        <td>${renderItem(entry.p3)}</td>
        <td>${isP0Plus ? renderItem(entry.p1) : 'nein'}</td>
        <td>${actionButtons}</td>
      </tr>
    `;
  }).join("");
}

  }

  const statusText = open ? "geöffnet" : "geschlossen";
  const leadPin = currentRaidData.leadPin || document.getElementById("raidPinInput").value.trim();

  try{
    await fireAndForgetRaidAction([
      ["action","setRaidStatus"],
      ["raidId",currentRaidData.raidId || ""],
      ["leadPin",leadPin],
      ["status",statusText],
      ["open",open ? "true" : "false"],
      ["published",open ? "true" : "false"],

    ]);

    currentReleased = open;

    document.getElementById("controlStatus").innerHTML =
      open
        ? `<span class="ok">Prioliste geöffnet.</span>`
        : `<span class="warn">Prioliste geschlossen.</span>`;

    renderRaidView();

    /* Nach kurzem Moment noch einmal frisch lesen. Wenn CORS die Antwort blockt,

    setTimeout(async () => {

    alert("Prioliste konnte nicht geändert werden: " + (error.message || error));

function parseCSV(text){
  const rows=[];
  let row=[];
  let value="";
  let insideQuotes=false;

  for(let i=0;i<text.length;i++){
    const char=text[i];
    const next=text[i+1];

    if(char === '"' && insideQuotes && next === '"'){
      value+='"';
      i++;
    }else if(char === '"'){
      insideQuotes=!insideQuotes;
    }else if(char === "," && !insideQuotes){
      row.push(value);
      value="";
    }else if((char === "\n" || char === "\r") && !insideQuotes){
      if(value || row.length){
        row.push(value);
        rows.push(row);
        row=[];
        value="";
      }
      if(char === "\r" && next === "\n") i++;
    }else{
      value+=char;
    }
  }

  if(value || row.length){
    row.push(value);
    rows.push(row);
  }

  return rows;
}

function itemKey(value){
  return String(value || "")
    .toLowerCase()
    .trim()
    .replace(/['’`´]/g,"")
    .replace(/[-–—]/g," ")
    .replace(/\s+/g," ");
}

function normalizeQuality(value){
  const q = String(value || "").toLowerCase().trim();

  if(q.includes("legendary") || q.includes("legendär") || q.includes("orange")) return "legendary";
  if(q.includes("epic") || q.includes("episch") || q.includes("lila")) return "epic";
  if(q.includes("rare") || q.includes("selten") || q.includes("blau")) return "rare";
  if(q.includes("uncommon") || q.includes("ungewöhnlich") || q.includes("grün") || q.includes("gruen")) return "uncommon";
  if(q.includes("common") || q.includes("gewöhnlich") || q.includes("weiß") || q.includes("weiss")) return "common";
  if(q.includes("poor") || q.includes("schlecht") || q.includes("grau")) return "poor";
  if(q.includes("artifact") || q.includes("artefakt")) return "artifact";
  if(q.includes("heirloom")) return "heirloom";

  return "";
}

function getIconUrl(iconName){
  const raw = String(iconName || "").trim();

  if(!raw){
    return "https://wow.zamimg.com/images/wow/icons/large/inv_misc_questionmark.jpg";
  }

  if(/^https?:\/\//i.test(raw)){
    return raw;
  }

  if(/^\d+$/.test(raw)){
    return "https://wow.zamimg.com/images/wow/icons/large/inv_misc_questionmark.jpg";
  }

  const clean = raw.toLowerCase().replace(/\.jpg$|\.png$/g,"");
  return "https://wow.zamimg.com/images/wow/icons/large/" + clean + ".jpg";
}

function iconFallback(img){
  img.src = "https://wow.zamimg.com/images/wow/icons/large/inv_misc_questionmark.jpg";
}

async function loadItemVisualData(){
  itemVisualMap = {};
  itemIdMap = {};

  const url = LOOT_CSV_URLS[currentRaidKey];

  if(!url){
    return;
  }

  try{
    const response = await fetch(url + "&t=" + Date.now());
    const csvText = await response.text();
    const rows = parseCSV(csvText);

    if(!rows.length){
      return;
    }

    const headers = rows.shift().map(h => String(h || "").trim());

    rows.forEach(row => {
      const obj = {};

      headers.forEach((header,index) => {
        obj[header] = row[index] || "";
      });

      const item =
        obj.Itemname_DE ||
        obj.Itemname ||
        obj.Item ||
        obj.item ||
        obj.Name ||
        obj.name ||
        obj.itemname ||
        "";

      const itemId =
        obj.ItemID ||
        obj.itemId ||
        obj.ID ||
        obj.id ||
        "";

      const quality =
        obj.Qualität ||
        obj.Quality ||
        obj.quality ||
        obj.Q ||
        obj.Rarity ||
        obj.rarity ||
        "";

      const iconName =
        obj.IconName ||
        obj.WowheadIcon ||
        obj.Iconname ||
        obj.iconName ||
        "";

      if(!item) return;

      const key = itemKey(item);
      const normalizedQuality = normalizeQuality(quality);

      const stats = String(obj.Stats_DE || obj.Stats || obj.Werte || "")
        .split("|")
        .map(v => v.trim())
        .filter(Boolean);

      itemVisualMap[key] = {
        name: String(item || "").trim(),
        itemId: String(itemId || "").trim(),
        quality: normalizedQuality || "epic",
        iconName: String(iconName || "").trim(),
        boss: obj.Boss || "",
        slot: obj.Slot_DE || obj.Slot || "",
        type: obj.Typ_DE || obj.Typ || obj.Type || "",
        dropchance: obj.Dropchance || "",
        tooltipText: obj.Tooltip_DE || obj.Tooltip || "",
        stats: stats
      };

      if(itemId){
        itemIdMap[key] = String(itemId || "").trim();
      }
    });

  }catch(error){
    console.error(error);
  }
}

function findItemInfo(itemName){
  return itemVisualMap[itemKey(itemName)] || null;
}

function renderTooltipLines(text){
  return String(text || "")
    .split("|")
    .map(s => s.trim())
    .filter(Boolean)
    .map(line => {
      const cls =
        line.startsWith("+") ||
        line.startsWith("Anlegen:") ||
        line.startsWith("Benutzen:") ||
        line.startsWith("Trefferchance:") ||
        line.startsWith("Chance bei Treffer:")
          ? "tooltip-equip"
          : "tooltip-row";

      return `<div class="${cls}">${safe(line)}</div>`;
    }).join("");
}

function showTooltip(event,itemName){
  const tooltip = document.getElementById("tooltip");
  const item = findItemInfo(itemName);

  if(!tooltip || !item){
    return;
  }

  const stats = (item.stats || [])
    .map(stat => `<div class="tooltip-stat">${safe(stat)}</div>`)
    .join("");

  tooltip.innerHTML = `
    <div class="tooltip-title ${safe(item.quality || "epic")}">${safe(item.name || itemName)}</div>
    <div class="tooltip-ilvl">${item.itemId ? "ItemID: " + safe(item.itemId) : safe(raids[currentRaidKey]?.name || "")}</div>
    ${item.slot || item.type ? `<div class="tooltip-row"><span>${safe(item.slot || "")}</span><span>${safe(item.type || "")}</span></div>` : ""}
    ${item.boss ? `<div class="tooltip-row"><strong>Boss:</strong><span>${safe(item.boss)}</span></div>` : ""}
    ${item.dropchance ? `<div class="tooltip-row"><strong>Dropchance:</strong><span>${safe(item.dropchance)}</span></div>` : ""}
    ${stats}
    ${renderTooltipLines(item.tooltipText)}
  `;

  tooltip.classList.remove("hidden");
  moveTooltip(event);
}

function moveTooltip(event){
  const tooltip = document.getElementById("tooltip");
  if(!tooltip || tooltip.classList.contains("hidden")) return;

  const margin = 16;
  let x = event.clientX + 18;
  let y = event.clientY + 18;

  const rect = tooltip.getBoundingClientRect();

  if(x + rect.width + margin > window.innerWidth){
    x = event.clientX - rect.width - 18;
  }

  if(y + rect.height + margin > window.innerHeight){
    y = window.innerHeight - rect.height - margin;
  }

  tooltip.style.left = Math.max(margin,x) + "px";
  tooltip.style.top = Math.max(margin,y) + "px";
}

function hideTooltip(){
  const tooltip = document.getElementById("tooltip");
  if(tooltip) tooltip.classList.add("hidden");
}

function getClassColorClass(className){
  const c = String(className || "").toLowerCase();

  if(c.includes("krieger") || c.includes("warrior")) return "class-warrior";
  if(c.includes("paladin")) return "class-paladin";
  if(c.includes("jäger") || c.includes("jaeger") || c.includes("hunter")) return "class-hunter";
  if(c.includes("schurke") || c.includes("rogue")) return "class-rogue";
  if(c.includes("priester") || c.includes("priest")) return "class-priest";
  if(c.includes("schamane") || c.includes("shaman")) return "class-shaman";
  if(c.includes("magier") || c.includes("mage")) return "class-mage";
  if(c.includes("hexenmeister") || c.includes("warlock")) return "class-warlock";
  if(c.includes("druide") || c.includes("druid")) return "class-druid";

  return "";
}

function renderClass(className){
  const name = String(className || "").trim();

  if(!name){
    return "-";
  }

  return `
    <span class="class-badge ${getClassColorClass(name)}">
      ${safe(name)}
    </span>
  `;
}

function renderItem(itemName){
  const name = String(itemName || "").trim();

  if(!name){
    return "-";
  }

  const info = itemVisualMap[itemKey(name)] || {};
  const quality = info.quality || "epic";
  const itemId = info.itemId || "";
  const iconName = info.iconName || "";
  const className = "item-" + quality;
  const icon = `
    <img
      class="item-icon"
      src="${getIconUrl(iconName)}"
      alt=""
      loading="lazy"
      onerror="iconFallback(this)"
    >
  `;

  const tooltipAttrs = `
    onmouseenter="showTooltip(event,'${escapeQuotes(name)}')"
    onmousemove="moveTooltip(event)"
    onmouseleave="hideTooltip()"
  `;

  if(itemId){
    return `
      <a class="item-link ${className} item-with-icon"
         href="https://www.wowhead.com/classic/item=${safe(itemId)}"
         target="_blank"
         rel="noopener noreferrer"
         ${tooltipAttrs}>
        ${icon}
        <span>${safe(name)}</span>
      </a>
    `;
  }

  return `
    <span class="item-name ${className} item-with-icon" ${tooltipAttrs}>
      ${icon}
      <span>${safe(name)}</span>
    </span>
  `;
}

function formatItemForPrio3(itemName){
  const name = String(itemName || "").trim();

  if(!name || name === "-"){
    return "";
  }

  if(/\-\d+$/.test(name)){
    return name;
  }

  const id = itemIdMap[itemKey(name)];

  if(!id){
    return name;
  }

  return name + "-" + id;
}

async function downloadPrio3ReforgedExport(){
  if(!currentRaidData){
    alert("Kein Raid geladen.");
    return;
  }

  if(!currentPrios || currentPrios.length === 0){
    alert("Keine Prios vorhanden.");
    return;
  }

  await loadItemIdsForExport();

  let content = "";

  currentPrios.forEach(entry => {
    const player = entry.player || "";
    const playerClass = entry.class || "";

    const p1 = formatItemForPrio3(entry.p1);
    const p2 = formatItemForPrio3(entry.p2);
    const p3 = formatItemForPrio3(entry.p3);

    content +=
      player + "\t\t" +
      playerClass + "\t\t" +
      p1 + "\t" +
      p2 + "\t" +
      p3 + "\n";
  });

  const filename =
    (currentRaidData.raidId || currentRaidKey || "raid") +
    "-prio3-reforged.txt";

  const blob = new Blob([content], {
    type:"text/plain;charset=utf-8"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = filename;
  a.click();

  URL.revokeObjectURL(url);
}

let addonItemInfoMap = {};

async function loadLootDataForAddonExport(){
  addonItemInfoMap = {};

  const url = LOOT_CSV_URLS[currentRaidKey];
  if(!url) return;

  try{
    const response = await fetch(url + "&t=" + Date.now());
    const csvText = await response.text();
    const rows = parseCSV(csvText);

    if(!rows.length) return;

    const headers = rows.shift().map(h => String(h || "").trim());

    rows.forEach(row => {
      const obj = {};

      headers.forEach((header,index) => {
        obj[header] = row[index] || "";
      });

      const item = obj.Itemname_DE || obj.Itemname || obj.Item || obj.item || obj.Name || obj.name || "";
      if(!item) return;

      addonItemInfoMap[itemKey(item)] = {
        boss: obj.Boss || obj.boss || "",
        slot: obj.Slot_DE || obj.Slot || obj.slot || "",
        typ: obj.Typ_DE || obj.Typ || obj.Type || obj.Kategorie || obj.typ || obj.type || "",
        icon: obj.IconName || obj.WowheadIcon || obj.Iconname || obj.Icon || obj.icon || "",
        itemId: obj.ItemID || obj.itemId || obj.ID || obj.id || ""
      };
    });

  }catch(error){
    console.error(error);
    alert("Iteminfos konnten nicht vollständig geladen werden.");
  }
}

async function downloadAddonExport(){

  if(!currentPrios || currentPrios.length === 0){
    alert("Keine Priodaten vorhanden.");
    return;
  }

  await loadLootDataForAddonExport();

  let exportText =
  "Raid;Boss;Slot;Typ;Item;Icon;Spieler;Punkte";

  currentPrios.forEach(entry => {

    const player = entry.player || "";

    if(
      String(entry.p0Plus || "").toLowerCase() === "ja"
      && entry.p1
    ){
      const info = addonItemInfoMap[itemKey(entry.p1)] || {};

      if(exportText){
        exportText += "||";
      }

      exportText +=
        raids[currentRaidKey].name + ";" +
        (info.boss || "") + ";" +
        (info.slot || "") + ";" +
        (info.typ || "") + ";" +
        entry.p1 + ";" +
        (info.icon || "") + ";" +
        player + ";" +
        "1";
    }

  });

  navigator.clipboard.writeText(exportText);

  alert(
    "Addon Export wurde in die Zwischenablage kopiert.\n\n" +
    exportText
  );
}

function safe(value){
  return String(value || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function escapeQuotes(value){
  return String(value || "")
    .replace(/\\/g,"\\\\")
    .replace(/'/g,"\\'");
}
