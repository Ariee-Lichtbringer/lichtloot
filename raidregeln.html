<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raidregeln - LichtLoot</title>
<style>
:root{
  --gold:#facc15;
  --panel:rgba(12,18,32,.88);
  --panel-soft:rgba(2,6,23,.62);
  --text:#f8fafc;
  --muted:#cbd5e1;
  --line:rgba(255,255,255,.12);
  --green:#22c55e;
  --blue:#60a5fa;
  --danger:#ef4444;
  --shadow:0 22px 48px rgba(0,0,0,.48);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--text);
  background:linear-gradient(rgba(8,17,31,.78), rgba(8,17,31,.94)),url('./images/back.jpeg');
  background-size:cover;
  background-position:center top;
  background-repeat:no-repeat;
  background-attachment:fixed;
}

.overlay{
  min-height:100vh;
  padding:24px 24px 42px;
  backdrop-filter:blur(3px);
}

.logo-banner{
  display:block;
  width:min(560px,82vw);
  max-height:170px;
  object-fit:contain;
  margin:0 auto 12px;
  filter:drop-shadow(0 16px 26px rgba(0,0,0,.55));
}

.brand-fallback{
  display:block;
  text-align:center;
  color:var(--gold);
  font-size:clamp(34px,5vw,58px);
  font-weight:950;
  line-height:1;
  margin:18px auto 16px;
  text-shadow:0 0 22px rgba(250,204,21,.20),0 10px 28px rgba(0,0,0,.55);
}

.main-nav{
  width:min(980px,calc(100vw - 48px));
  margin:12px auto 24px;
  padding:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  border-radius:22px;
  border:1px solid rgba(250,204,21,.34);
  background:linear-gradient(135deg,rgba(12,18,32,.78),rgba(2,6,23,.56));
  box-shadow:0 18px 38px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
}

.nav-btn{
  min-height:42px;
  padding:10px 16px;
  border-radius:14px;
  border:1px solid rgba(250,204,21,.28);
  background:rgba(2,6,23,.58);
  color:#f8fafc;
  font-weight:900;
  text-decoration:none;
  cursor:pointer;
  text-shadow:0 2px 8px rgba(0,0,0,.65);
}

.nav-btn:hover,
.nav-primary{
  border-color:rgba(250,204,21,.70);
  background:linear-gradient(135deg,rgba(250,204,21,.34),rgba(96,165,250,.20));
}

.rules-shell{
  width:min(1220px,calc(100vw - 36px));
  margin:0 auto;
  padding:24px;
  border:1px solid rgba(250,204,21,.30);
  border-radius:24px;
  background:linear-gradient(180deg,rgba(12,18,32,.93),rgba(2,6,23,.89));
  box-shadow:var(--shadow);
}

.rules-head{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(280px,420px);
  gap:18px;
  align-items:end;
  padding-bottom:20px;
  border-bottom:1px solid var(--line);
}

.rules-kicker{
  color:var(--gold);
  font-size:13px;
  font-weight:950;
  letter-spacing:.12em;
  text-transform:uppercase;
}

h1{
  color:var(--gold);
  margin-top:6px;
  font-size:clamp(34px,5vw,58px);
  line-height:1.02;
}

.rules-head p{
  margin-top:10px;
  color:var(--muted);
  line-height:1.55;
  font-size:15px;
  font-weight:750;
}

.rules-search{
  display:grid;
  gap:8px;
}

.rules-search label{
  color:#94a3b8;
  font-size:12px;
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:.08em;
}

.rules-search input,
.rules-select{
  width:100%;
  min-height:46px;
  padding:11px 13px;
  border-radius:8px;
  border:1px solid rgba(250,204,21,.32);
  background:rgba(2,6,23,.78);
  color:white;
  font-weight:850;
  outline:none;
}

.rules-tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:18px 0;
}

.rules-tab,
.filter-btn{
  min-height:38px;
  padding:8px 13px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(15,23,42,.72);
  color:#f8fafc;
  font-weight:900;
  cursor:pointer;
}

.rules-tab.active,
.filter-btn.active{
  border-color:rgba(250,204,21,.58);
  background:linear-gradient(90deg,rgba(250,204,21,.28),rgba(250,204,21,.06));
  color:var(--gold);
}

.rules-panel{display:none}
.rules-panel.active{display:block}

.rules-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}

.rule-card{
  border:1px solid rgba(255,255,255,.11);
  border-radius:8px;
  background:var(--panel-soft);
  overflow:hidden;
}

.rule-card h2,
.rule-card h3{
  padding:14px 16px;
  color:var(--gold);
  font-size:18px;
  line-height:1.2;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.rule-list{
  list-style:none;
  display:grid;
  gap:0;
}

.rule-list li{
  padding:11px 14px;
  color:#dbeafe;
  line-height:1.46;
  font-size:14px;
  font-weight:760;
  border-bottom:1px solid rgba(255,255,255,.07);
}

.rule-list li:last-child{border-bottom:0}

.rule-list li:before{
  content:"";
  display:inline-block;
  width:7px;
  height:7px;
  margin-right:9px;
  border-radius:999px;
  background:var(--gold);
  box-shadow:0 0 12px rgba(250,204,21,.45);
}

.raid-filter,
.class-filter{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.raid-layout{
  display:grid;
  grid-template-columns:240px minmax(0,1fr);
  gap:16px;
  align-items:start;
}

.raid-menu{
  position:sticky;
  top:16px;
  display:grid;
  gap:8px;
  padding:10px;
  border:1px solid rgba(250,204,21,.22);
  border-radius:8px;
  background:rgba(2,6,23,.48);
}

.raid-menu button{
  width:100%;
  min-height:42px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:7px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(15,23,42,.64);
  color:#f8fafc;
  font-weight:950;
  text-align:left;
  cursor:pointer;
}

.raid-menu button.active,
.raid-menu button:hover{
  border-color:rgba(250,204,21,.58);
  background:linear-gradient(90deg,rgba(250,204,21,.26),rgba(250,204,21,.05));
  color:var(--gold);
}

.raid-menu small{
  color:#94a3b8;
  font-size:11px;
  font-weight:900;
}

.raid-detail{
  display:grid;
  gap:14px;
}

.raid-hero{
  padding:18px;
  border:1px solid rgba(250,204,21,.24);
  border-radius:8px;
  background:linear-gradient(135deg,rgba(250,204,21,.12),rgba(96,165,250,.08)),rgba(2,6,23,.62);
}

.raid-hero h2{
  color:var(--gold);
  font-size:clamp(28px,4vw,44px);
  line-height:1.05;
  margin-bottom:8px;
}

.raid-hero p{
  color:#dbeafe;
  line-height:1.5;
  font-size:15px;
  font-weight:800;
}

.quick-rules{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-top:14px;
}

.quick-rule{
  min-height:72px;
  padding:12px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(15,23,42,.58);
}

.quick-rule strong{
  display:block;
  color:#86efac;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.05em;
  margin-bottom:5px;
}

.quick-rule span{
  color:#f8fafc;
  font-size:14px;
  line-height:1.35;
  font-weight:850;
}

.raid-section-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}

.raid-section-card{
  border:1px solid rgba(255,255,255,.11);
  border-radius:8px;
  background:var(--panel-soft);
  overflow:hidden;
}

.raid-section-card.is-wide{
  grid-column:1 / -1;
}

.raid-section-card h3{
  padding:13px 15px;
  color:var(--gold);
  font-size:16px;
  line-height:1.2;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.requirement-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  padding:12px;
}

.requirement-card{
  display:grid;
  gap:8px;
  padding:12px;
  border-radius:8px;
  border:1px solid color-mix(in srgb, var(--class-color) 48%, rgba(255,255,255,.10));
  background:linear-gradient(135deg,color-mix(in srgb, var(--class-color) 13%, rgba(15,23,42,.78)),rgba(2,6,23,.58));
}

.requirement-class{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.requirement-class strong{
  color:var(--class-color);
  font-size:15px;
  font-weight:950;
}

.requirement-type{
  color:#94a3b8;
  font-size:11px;
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:.05em;
}

.requirement-values{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.requirement-chip{
  min-height:25px;
  padding:5px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(2,6,23,.58);
  color:#f8fafc;
  font-size:12px;
  font-weight:950;
}

.requirement-note{
  padding:0 12px 12px;
  color:#cbd5e1;
  font-size:13px;
  line-height:1.45;
  font-weight:800;
}

.naxx-requirement-list{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  padding:12px;
}

.naxx-requirement-box{
  display:grid;
  gap:8px;
  padding:13px;
  border-radius:8px;
  border:1px solid rgba(250,204,21,.24);
  background:rgba(15,23,42,.58);
}

.naxx-requirement-box strong{
  color:var(--gold);
  font-size:14px;
  font-weight:950;
}

.naxx-requirement-box span{
  color:#dbeafe;
  font-size:13px;
  line-height:1.45;
  font-weight:850;
}

.table-wrap{
  overflow:auto;
  border:1px solid rgba(255,255,255,.10);
  border-radius:8px;
  background:rgba(2,6,23,.46);
}

table{
  width:100%;
  min-width:760px;
  border-collapse:collapse;
}

th,td{
  padding:10px 12px;
  text-align:left;
  border-bottom:1px solid rgba(255,255,255,.08);
  color:#dbeafe;
  font-size:13px;
  font-weight:800;
  vertical-align:top;
}

th{
  position:sticky;
  top:0;
  z-index:1;
  color:var(--gold);
  background:rgba(2,6,23,.92);
  text-transform:uppercase;
  font-size:11px;
  letter-spacing:.04em;
}

.pill-row{display:flex;gap:6px;flex-wrap:wrap}

.pill{
  display:inline-flex;
  align-items:center;
  min-height:24px;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(15,23,42,.72);
  color:#f8fafc;
  font-size:12px;
  font-weight:950;
}

.pill.required{border-color:rgba(34,197,94,.45);color:#86efac}
.pill.optional{border-color:rgba(96,165,250,.45);color:#bfdbfe}
.class-pill{
  border-color:color-mix(in srgb, var(--class-color) 62%, transparent);
  color:var(--class-color);
  background:color-mix(in srgb, var(--class-color) 18%, rgba(15,23,42,.72));
}
.class-warrior{--class-color:#c79c6e}
.class-rogue{--class-color:#fff569}
.class-hunter{--class-color:#abd473}
.class-mage{--class-color:#69ccf0}
.class-warlock{--class-color:#9482c9}
.class-priest{--class-color:#ffffff}
.class-paladin{--class-color:#f58cba}
.class-druid{--class-color:#ff7d0a}
.class-tank{--class-color:#f97316}
.class-healer{--class-color:#86efac}
.class-hybrid{--class-color:#cbd5e1}

.empty-state{
  padding:18px;
  color:#fecaca;
  font-weight:900;
  border:1px solid rgba(239,68,68,.28);
  border-radius:8px;
  background:rgba(127,29,29,.18);
}

.rules-footer{
  margin-top:22px;
  padding-top:16px;
  border-top:1px solid var(--line);
  color:#94a3b8;
  font-size:12px;
  font-weight:800;
}

@media(max-width:860px){
  .overlay{padding:18px 12px 32px}
  .rules-shell{width:100%;padding:16px;border-radius:16px}
  .rules-head{grid-template-columns:1fr}
  .rules-grid{grid-template-columns:1fr}
  .raid-layout{grid-template-columns:1fr}
  .raid-menu{position:static;display:flex;overflow-x:auto}
  .raid-menu button{min-width:160px}
  .quick-rules,.raid-section-grid,.requirement-grid,.naxx-requirement-list{grid-template-columns:1fr}
  .main-nav{width:100%;justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}
  .nav-btn,.rules-tab,.filter-btn{white-space:nowrap}
}
</style>
</head>
<body>
<div class="overlay">
  <img src="images/content.png" alt="LichtLoot" class="logo-banner" onerror="this.replaceWith(Object.assign(document.createElement('strong'),{className:'brand-fallback',textContent:'LichtLoot'}))">

  <nav class="main-nav" aria-label="Navigation">
    <a class="nav-btn" href="start.html">Dashboard</a>
    <a class="nav-btn nav-primary" href="raidregeln.html">Raidregeln</a>
    <a class="nav-btn" href="loot/mc-loot.html">MC</a>
    <a class="nav-btn" href="loot/bwl-loot.html">BWL</a>
    <a class="nav-btn" href="loot/aq40-loot.html">AQ40</a>
    <a class="nav-btn" href="loot/naxx-loot.html">Naxx</a>
  </nav>

  <main class="rules-shell">
    <section class="rules-head">
      <div>
        <div class="rules-kicker">Lichtbringer Raids</div>
        <h1>Raidregeln</h1>
        <p>Regeln, Raid-Sonderfälle, Consumables und Verzauberungen kompakt an einem Ort.</p>
      </div>
      <div class="rules-search">
        <label for="rulesSearch">Suche</label>
        <input id="rulesSearch" type="search" placeholder="P0, BWL, Ersatzbank, Flask, Verzauberung ..." oninput="renderActivePanel()">
      </div>
    </section>

    <div class="rules-tabs" role="tablist">
      <button class="rules-tab active" type="button" data-tab="raids" onclick="switchRulesTab('raids')">Raids</button>
      <button class="rules-tab" type="button" data-tab="general" onclick="switchRulesTab('general')">Alle Regeln</button>
      <button class="rules-tab" type="button" data-tab="consumables" onclick="switchRulesTab('consumables')">Consumables</button>
      <button class="rules-tab" type="button" data-tab="enchants" onclick="switchRulesTab('enchants')">Verzauberungen</button>
    </div>

    <section id="panelGeneral" class="rules-panel"></section>
    <section id="panelRaids" class="rules-panel active"></section>
    <section id="panelConsumables" class="rules-panel"></section>
    <section id="panelEnchants" class="rules-panel"></section>

    <div id="rulesFooter" class="rules-footer">Raidregeln werden geladen.</div>
  </main>
</div>

<script>
let rulesData=null;
let activeTab="raids";
let activeRaid="bwl";
let activeClass="all";

const generalLabels={
  prio:"Prio & Loot",
  invite:"Invite & Anmeldung",
  ersatzbank:"Ersatzbank",
  consumables:"Verbrauchsmaterial",
  verzauberungen:"Ausrüstung & Verzauberungen",
  leistung:"Leistung & Klassen",
  charakterwechsel:"Charakterwechsel",
  sonstiges:"Sonstiges"
};

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g, char => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[char]));
}

function getSearchTerm(){
  return document.getElementById("rulesSearch").value.trim().toLowerCase();
}

function matchesSearch(text){
  const term=getSearchTerm();
  if(!term) return true;
  return String(text || "").toLowerCase().includes(term);
}

function filteredRules(rules){
  const term=getSearchTerm();
  if(!term) return rules;
  return rules.filter(rule => matchesSearch(rule));
}

function switchRulesTab(tab){
  activeTab=tab;
  document.querySelectorAll(".rules-tab").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
  document.querySelectorAll(".rules-panel").forEach(panel => panel.classList.remove("active"));
  document.getElementById("panel" + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add("active");
  renderActivePanel();
}

function renderRuleCard(title,rules){
  const visible=filteredRules(rules);
  if(!visible.length) return "";
  return `
    <article class="rule-card">
      <h2>${escapeHtml(title)}</h2>
      <ul class="rule-list">
        ${visible.map(rule => `<li>${escapeHtml(rule)}</li>`).join("")}
      </ul>
    </article>
  `;
}

function renderGeneral(){
  const panel=document.getElementById("panelGeneral");
  const cards=Object.entries(generalLabels)
    .map(([key,label]) => renderRuleCard(label, rulesData.general[key] || []))
    .filter(Boolean);
  panel.innerHTML=cards.length ? `<div class="rules-grid">${cards.join("")}</div>` : `<div class="empty-state">Keine Regeln gefunden.</div>`;
}

function setRaidFilter(raidId){
  activeRaid=raidId;
  renderRaids();
}

const raidCategoryLabels={
  prio:"Prio & P0",
  loot:"Loot-Sonderregeln",
  requirements:"Anforderungen",
  flow:"Raidablauf",
  worldbuff:"Worldbuffs",
  other:"Weitere Regeln"
};

function getRaidCategory(rule){
  const text=String(rule || "").toLowerCase();
  if(/prio|p0|p1|p2|p3|freigabe|teilnahmen|mainspec/.test(text)) return "prio";
  if(/gelockt|gildenbank|gbank|elementium|fesseln|auge|götzen|skarabaen|bücher|boe|kopf|herz|beschworenen boss|schmuckstücke|blutreben|puppen|splitter|kristalle|armbrust/.test(text)) return "loot";
  if(/anforderung|ausrüstungsstand|verzauber|resist|resi|t3|spellpower|heal|rüstung|ap|hit|consumable|verbrauch|tränke/.test(text)) return "requirements";
  if(/raidleitung|invite|später|rainanmeldechannel|raidstart|mittwoch|id|pull/.test(text)) return "flow";
  if(/worldbuff|abgabe der quest/.test(text)) return "worldbuff";
  return "other";
}

function groupRaidRules(raid){
  const groups={prio:[],loot:[],requirements:[],flow:[],worldbuff:[],other:[]};
  raid.rules.forEach(rule => {
    if(!matchesSearch(rule)) return;
    groups[getRaidCategory(rule)].push(rule);
  });
  return groups;
}

function getRaidSummary(raid){
  const groups=groupRaidRules(raid);
  if(raid.id === "naxx"){
    groups.requirements=groups.requirements.filter(rule => !isNaxxRequirementLine(rule));
  }
  const pick = rules => rules.find(Boolean) || "Keine Angabe in den importierten Regeln.";
  return [
    {label:"P0", text:pick(groups.prio.filter(rule => /grundregel|freigabe|prio 0|p0/i.test(rule)))},
    {label:"Loot", text:pick(groups.loot)},
    {label:"Anforderungen", text:pick(groups.requirements)},
    {label:"Ablauf", text:pick(groups.flow)}
  ];
}

function renderRaidSection(title,rules,wide=false){
  if(!rules.length) return "";
  return `
    <article class="raid-section-card ${wide ? "is-wide" : ""}">
      <h3>${escapeHtml(title)}</h3>
      <ul class="rule-list">
        ${rules.map(rule => `<li>${escapeHtml(rule)}</li>`).join("")}
      </ul>
    </article>
  `;
}

const naxxRequirementRules=[
  {name:"Krieger", type:"Melee", values:["ab 1150 AP"]},
  {name:"Schurken", type:"Melee", values:["ab 1100 AP"]},
  {name:"Jäger", type:"Ranged", values:["ab 6x T3", "ab 1330 AP"]},
  {name:"Hexer", type:"Caster", values:["ab 600 Spellpower", "10% Hit"]},
  {name:"Magier", type:"Caster", values:["ab 600 Spellpower", "16% Hit"]},
  {name:"Tanks", type:"Tank", values:["ab 6 T3 Teile"]},
  {name:"FeralDruid", type:"Tank / Feral", values:["11,5k Rüstung", "1050 AP"]},
  {name:"HealPala", type:"Heal", values:["ab 1050 +Heal"]},
  {name:"HealPriest", type:"Heal", values:["ab 1100 +Heal"]},
  {name:"HealDruide", type:"Heal", values:["ab 1100 +Heal"]},
  {name:"Eule", type:"Caster", values:["ab 600 Spellpower", "12% Hit"]}
];

function isNaxxRequirementLine(rule){
  return /Werte je nach Klasse|Krieger ab 1150|Schurken ab 1100|Tanks ab 6 T3|Hexer ab 600|Jäger ab 6x T3|alle Verzauberungen|VERBRAUCHSMATERIAL|RÜSTUNGSTEILEN|Frostresi|VERZAUBERUNGEN DER GEGENSTÄNDE|Item-Slot maximal|Consumables im Naxx|maximal.*Consumables|Reiter.*Consumables|log Analyse/i.test(String(rule || ""));
}

function requirementMatchesSearch(item){
  const searchText=[item.name,item.type,...item.values].join(" ");
  return matchesSearch(searchText);
}

function renderNaxxRequirements(){
  const items=naxxRequirementRules.filter(requirementMatchesSearch);
  const generalRequirements=[
    {
      title:"Verzauberungen",
      text:"Alle Item-Slots maximal verzaubert, inklusive ZG- oder Naxx-Schulterverzauberung."
    },
    {
      title:"Frostresi & Gear",
      text:"Frostresi und Ausrüstungsanforderungen gelten laut DC-Channel Naxx Vorbereitung."
    },
    {
      title:"Consumables",
      text:"Maximal mögliche Consumables. Benötigte Tränke richten sich nach den geplanten Bossen im Raidanmeldechannel."
    }
  ].filter(item => matchesSearch([item.title,item.text].join(" ")));
  if(!items.length && !generalRequirements.length) return "";
  return `
    <article class="raid-section-card is-wide">
      <h3>Naxx P0-Voraussetzungen nach Klasse</h3>
      ${items.length ? `
        <div class="requirement-grid">
          ${items.map(item => `
            <div class="requirement-card ${getClassColorClass(item.name)}">
              <div class="requirement-class">
                <strong>${escapeHtml(item.name)}</strong>
                <span class="requirement-type">${escapeHtml(item.type)}</span>
              </div>
              <div class="requirement-values">
                ${item.values.map(value => `<span class="requirement-chip">${escapeHtml(value)}</span>`).join("")}
              </div>
            </div>
          `).join("")}
        </div>
      ` : ""}
      ${generalRequirements.length ? `
        <div class="naxx-requirement-list">
          ${generalRequirements.map(item => `
            <div class="naxx-requirement-box">
              <strong>${escapeHtml(item.title)}</strong>
              <span>${escapeHtml(item.text)}</span>
            </div>
          `).join("")}
        </div>
      ` : ""}
      <div class="requirement-note">Zusätzlich gelten die normalen Naxx-P0-Regeln: Freigabe durch Leitung/Klassenleitung und die geforderten Teilnahmen.</div>
    </article>
  `;
}

function renderRaids(){
  const panel=document.getElementById("panelRaids");
  if(!rulesData.raids.some(raid => raid.id === activeRaid)){
    activeRaid=rulesData.raids[0]?.id || "";
  }
  const raid=rulesData.raids.find(entry => entry.id === activeRaid);
  if(!raid){
    panel.innerHTML='<div class="empty-state">Keine Raidregeln gefunden.</div>';
    return;
  }
  const menu=rulesData.raids.map(entry => `
    <button class="${activeRaid === entry.id ? "active" : ""}" type="button" onclick="setRaidFilter('${escapeHtml(entry.id)}')">
      <span>${escapeHtml(entry.name)}</span>
      <small>${escapeHtml(entry.id.toUpperCase())}</small>
    </button>
  `).join("");
  const groups=groupRaidRules(raid);
  if(raid.id === "naxx"){
    groups.requirements=groups.requirements.filter(rule => !isNaxxRequirementLine(rule));
  }
  const summary=getRaidSummary(raid);
  const sections=[
    renderRaidSection(raidCategoryLabels.prio, groups.prio),
    renderRaidSection(raidCategoryLabels.loot, groups.loot),
    raid.id === "naxx" ? renderNaxxRequirements() : "",
    renderRaidSection(raidCategoryLabels.requirements, groups.requirements),
    renderRaidSection(raidCategoryLabels.flow, groups.flow),
    renderRaidSection(raidCategoryLabels.worldbuff, groups.worldbuff),
    renderRaidSection(raidCategoryLabels.other, groups.other, true)
  ].filter(Boolean).join("");
  const count=Object.values(groups).reduce((total,rules) => total + rules.length, 0);
  panel.innerHTML=`
    <div class="raid-layout">
      <aside class="raid-menu" aria-label="Raid auswählen">${menu}</aside>
      <div class="raid-detail">
        <section class="raid-hero">
          <h2>${escapeHtml(raid.name)}</h2>
          <p>${count ? `${count} passende Regeln in klaren Bereichen.` : "Für diese Suche wurden keine Regeln gefunden."}</p>
          <div class="quick-rules">
            ${summary.map(item => `
              <div class="quick-rule">
                <strong>${escapeHtml(item.label)}</strong>
                <span>${escapeHtml(item.text)}</span>
              </div>
            `).join("")}
          </div>
        </section>
        ${sections ? `<div class="raid-section-grid">${sections}</div>` : `<div class="empty-state">Keine Raidregeln gefunden.</div>`}
      </div>
    </div>
  `;
}

function allConsumableClasses(){
  const classes=new Set();
  rulesData.consumables.forEach(item => item.classes.forEach(cls => classes.add(cls)));
  return [...classes];
}

function setClassFilter(className){
  activeClass=className;
  renderActivePanel();
}

function renderClassFilters(classes){
  return [
    `<button class="filter-btn ${activeClass === "all" ? "active" : ""}" type="button" onclick="setClassFilter('all')">Alle</button>`,
    ...classes.map(cls => `<button class="filter-btn ${activeClass === cls ? "active" : ""}" type="button" onclick="setClassFilter('${escapeHtml(cls)}')">${escapeHtml(cls)}</button>`)
  ].join("");
}

function getClassColorClass(className){
  const value=String(className || "").toLowerCase();
  if(value.includes("krieger")) return "class-warrior";
  if(value.includes("schur")) return "class-rogue";
  if(value.includes("jäger") || value.includes("jaeger")) return "class-hunter";
  if(value.includes("mage") || value.includes("magier")) return "class-mage";
  if(value.includes("hexer")) return "class-warlock";
  if(value.includes("priester") || value.includes("priest")) return "class-priest";
  if(value.includes("pala")) return "class-paladin";
  if(value.includes("druid") || value.includes("druide")) return "class-druid";
  if(value.includes("tank")) return "class-tank";
  if(value.includes("heal") || value.includes("heiler")) return "class-healer";
  if(value.includes("hybrid")) return "class-hybrid";
  return "class-hybrid";
}

function renderClassPill(className){
  return `<span class="pill class-pill ${getClassColorClass(className)}">${escapeHtml(className)}</span>`;
}

function renderConsumables(){
  const panel=document.getElementById("panelConsumables");
  const classes=allConsumableClasses();
  const rows=rulesData.consumables.filter(item => {
    const classMatch=activeClass === "all" || item.classes.includes(activeClass);
    const searchText=[item.name,item.required ? "wichtig" : "",item.optional ? "optional" : "",...item.classes].join(" ");
    return classMatch && matchesSearch(searchText);
  });
  panel.innerHTML=`
    <div class="class-filter">${renderClassFilters(classes)}</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Item</th><th>Status</th><th>Klassen/Rollen</th></tr></thead>
        <tbody>
          ${rows.map(item => `
            <tr>
              <td>${escapeHtml(item.name)}</td>
              <td><span class="pill ${item.required ? "required" : "optional"}">${item.required ? "wichtig" : "optional"}</span></td>
              <td><div class="pill-row">${item.classes.map(cls => renderClassPill(cls)).join("")}</div></td>
            </tr>
          `).join("") || `<tr><td colspan="3">Keine Consumables gefunden.</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

function parseEnchantSlot(text){
  const idx=String(text).indexOf(":");
  if(idx === -1) return {slot:"Sonstiges", value:text};
  return {slot:text.slice(0,idx).trim(), value:text.slice(idx + 1).trim()};
}

function renderEnchants(){
  const panel=document.getElementById("panelEnchants");
  const classes=rulesData.enchantments.classes || [];
  const rows=[];
  rulesData.enchantments.rows.forEach(entryRow => {
    entryRow.forEach(entry => {
      if(activeClass !== "all" && entry.className !== activeClass) return;
      const parsed=parseEnchantSlot(entry.text);
      const searchText=[entry.className,parsed.slot,parsed.value].join(" ");
      if(!matchesSearch(searchText)) return;
      rows.push({className:entry.className,...parsed});
    });
  });
  panel.innerHTML=`
    <div class="class-filter">${renderClassFilters(classes)}</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Klasse/Rolle</th><th>Slot</th><th>Verzauberung</th></tr></thead>
        <tbody>
          ${rows.map(row => `
            <tr>
              <td>${renderClassPill(row.className)}</td>
              <td>${escapeHtml(row.slot)}</td>
              <td>${escapeHtml(row.value)}</td>
            </tr>
          `).join("") || `<tr><td colspan="3">Keine Verzauberungen gefunden.</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

function renderActivePanel(){
  if(!rulesData) return;
  if(activeTab === "general") renderGeneral();
  if(activeTab === "raids") renderRaids();
  if(activeTab === "consumables") renderConsumables();
  if(activeTab === "enchants") renderEnchants();
}

async function loadRules(){
  try{
    const response=await fetch("data/raidregeln.json?v=20260625");
    if(!response.ok) throw new Error("Regeln konnten nicht geladen werden.");
    rulesData=await response.json();
    renderRaids();
    const updated=rulesData.updatedAt ? new Date(rulesData.updatedAt).toLocaleString("de-DE",{dateStyle:"medium",timeStyle:"short"}) : "unbekannt";
    document.getElementById("rulesFooter").textContent=`Quelle: ${rulesData.source || "CSV Export"} · Stand: ${updated}`;
  }catch(error){
    document.getElementById("panelGeneral").innerHTML='<div class="empty-state">Raidregeln konnten nicht geladen werden.</div>';
    document.getElementById("rulesFooter").textContent="Bitte später erneut laden.";
  }
}

loadRules();
</script>
</body>
</html>
