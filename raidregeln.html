<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raidregeln - LichtLoot</title>
<style>
:root{
  --gold:#facc15;
  --panel:rgba(12,18,32,.88);
  --panel-soft:rgba(2,6,23,.62);
  --text:#f8fafc;
  --muted:#cbd5e1;
  --line:rgba(255,255,255,.12);
  --green:#22c55e;
  --blue:#60a5fa;
  --danger:#ef4444;
  --shadow:0 22px 48px rgba(0,0,0,.48);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--text);
  background:linear-gradient(rgba(8,17,31,.78), rgba(8,17,31,.94)),url('./images/back.jpeg');
  background-size:cover;
  background-position:center top;
  background-repeat:no-repeat;
  background-attachment:fixed;
}

.overlay{
  min-height:100vh;
  padding:24px 24px 42px;
  backdrop-filter:blur(3px);
}

.logo-banner{
  display:block;
  width:min(560px,82vw);
  max-height:170px;
  object-fit:contain;
  margin:0 auto 12px;
  filter:drop-shadow(0 16px 26px rgba(0,0,0,.55));
}

.brand-fallback{
  display:block;
  text-align:center;
  color:var(--gold);
  font-size:clamp(34px,5vw,58px);
  font-weight:950;
  line-height:1;
  margin:18px auto 16px;
  text-shadow:0 0 22px rgba(250,204,21,.20),0 10px 28px rgba(0,0,0,.55);
}

.main-nav{
  width:min(980px,calc(100vw - 48px));
  margin:12px auto 24px;
  padding:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  border-radius:22px;
  border:1px solid rgba(250,204,21,.34);
  background:linear-gradient(135deg,rgba(12,18,32,.78),rgba(2,6,23,.56));
  box-shadow:0 18px 38px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
}

.nav-btn{
  min-height:42px;
  padding:10px 16px;
  border-radius:14px;
  border:1px solid rgba(250,204,21,.28);
  background:rgba(2,6,23,.58);
  color:#f8fafc;
  font-weight:900;
  text-decoration:none;
  cursor:pointer;
  text-shadow:0 2px 8px rgba(0,0,0,.65);
}

.nav-btn:hover,
.nav-primary{
  border-color:rgba(250,204,21,.70);
  background:linear-gradient(135deg,rgba(250,204,21,.34),rgba(96,165,250,.20));
}

.rules-shell{
  width:min(1220px,calc(100vw - 36px));
  margin:0 auto;
  padding:24px;
  border:1px solid rgba(250,204,21,.30);
  border-radius:24px;
  background:linear-gradient(180deg,rgba(12,18,32,.93),rgba(2,6,23,.89));
  box-shadow:var(--shadow);
}

.rules-head{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(280px,420px);
  gap:18px;
  align-items:end;
  padding-bottom:20px;
  border-bottom:1px solid var(--line);
}

.rules-kicker{
  color:var(--gold);
  font-size:13px;
  font-weight:950;
  letter-spacing:.12em;
  text-transform:uppercase;
}

h1{
  color:var(--gold);
  margin-top:6px;
  font-size:clamp(34px,5vw,58px);
  line-height:1.02;
}

.rules-head p{
  margin-top:10px;
  color:var(--muted);
  line-height:1.55;
  font-size:15px;
  font-weight:750;
}

.rules-search{
  display:grid;
  gap:8px;
}

.rules-search label{
  color:#94a3b8;
  font-size:12px;
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:.08em;
}

.rules-search input,
.rules-select{
  width:100%;
  min-height:46px;
  padding:11px 13px;
  border-radius:8px;
  border:1px solid rgba(250,204,21,.32);
  background:rgba(2,6,23,.78);
  color:white;
  font-weight:850;
  outline:none;
}

.rules-tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:18px 0;
}

.rules-tab,
.filter-btn{
  min-height:38px;
  padding:8px 13px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(15,23,42,.72);
  color:#f8fafc;
  font-weight:900;
  cursor:pointer;
}

.rules-tab.active,
.filter-btn.active{
  border-color:rgba(250,204,21,.58);
  background:linear-gradient(90deg,rgba(250,204,21,.28),rgba(250,204,21,.06));
  color:var(--gold);
}

.rules-panel{display:none}
.rules-panel.active{display:block}

.rules-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}

.rule-card{
  border:1px solid rgba(255,255,255,.11);
  border-radius:8px;
  background:var(--panel-soft);
  overflow:hidden;
}

.rule-card h2,
.rule-card h3{
  padding:14px 16px;
  color:var(--gold);
  font-size:18px;
  line-height:1.2;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.rule-list{
  list-style:none;
  display:grid;
  gap:0;
}

.rule-list li{
  padding:11px 14px;
  color:#dbeafe;
  line-height:1.46;
  font-size:14px;
  font-weight:760;
  border-bottom:1px solid rgba(255,255,255,.07);
}

.rule-list li:last-child{border-bottom:0}

.rule-list li:before{
  content:"";
  display:inline-block;
  width:7px;
  height:7px;
  margin-right:9px;
  border-radius:999px;
  background:var(--gold);
  box-shadow:0 0 12px rgba(250,204,21,.45);
}

.raid-filter,
.class-filter{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.table-wrap{
  overflow:auto;
  border:1px solid rgba(255,255,255,.10);
  border-radius:8px;
  background:rgba(2,6,23,.46);
}

table{
  width:100%;
  min-width:760px;
  border-collapse:collapse;
}

th,td{
  padding:10px 12px;
  text-align:left;
  border-bottom:1px solid rgba(255,255,255,.08);
  color:#dbeafe;
  font-size:13px;
  font-weight:800;
  vertical-align:top;
}

th{
  position:sticky;
  top:0;
  z-index:1;
  color:var(--gold);
  background:rgba(2,6,23,.92);
  text-transform:uppercase;
  font-size:11px;
  letter-spacing:.04em;
}

.pill-row{display:flex;gap:6px;flex-wrap:wrap}

.pill{
  display:inline-flex;
  align-items:center;
  min-height:24px;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(15,23,42,.72);
  color:#f8fafc;
  font-size:12px;
  font-weight:950;
}

.pill.required{border-color:rgba(34,197,94,.45);color:#86efac}
.pill.optional{border-color:rgba(96,165,250,.45);color:#bfdbfe}

.empty-state{
  padding:18px;
  color:#fecaca;
  font-weight:900;
  border:1px solid rgba(239,68,68,.28);
  border-radius:8px;
  background:rgba(127,29,29,.18);
}

.rules-footer{
  margin-top:22px;
  padding-top:16px;
  border-top:1px solid var(--line);
  color:#94a3b8;
  font-size:12px;
  font-weight:800;
}

@media(max-width:860px){
  .overlay{padding:18px 12px 32px}
  .rules-shell{width:100%;padding:16px;border-radius:16px}
  .rules-head{grid-template-columns:1fr}
  .rules-grid{grid-template-columns:1fr}
  .main-nav{width:100%;justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}
  .nav-btn,.rules-tab,.filter-btn{white-space:nowrap}
}
</style>
</head>
<body>
<div class="overlay">
  <img src="images/content.png" alt="LichtLoot" class="logo-banner" onerror="this.replaceWith(Object.assign(document.createElement('strong'),{className:'brand-fallback',textContent:'LichtLoot'}))">

  <nav class="main-nav" aria-label="Navigation">
    <a class="nav-btn" href="start.html">Dashboard</a>
    <a class="nav-btn nav-primary" href="raidregeln.html">Raidregeln</a>
    <a class="nav-btn" href="loot/mc-loot.html">MC</a>
    <a class="nav-btn" href="loot/bwl-loot.html">BWL</a>
    <a class="nav-btn" href="loot/aq40-loot.html">AQ40</a>
    <a class="nav-btn" href="loot/naxx-loot.html">Naxx</a>
  </nav>

  <main class="rules-shell">
    <section class="rules-head">
      <div>
        <div class="rules-kicker">Lichtbringer Raids</div>
        <h1>Raidregeln</h1>
        <p>Regeln, Raid-Sonderfälle, Consumables und Verzauberungen kompakt an einem Ort.</p>
      </div>
      <div class="rules-search">
        <label for="rulesSearch">Suche</label>
        <input id="rulesSearch" type="search" placeholder="P0, BWL, Ersatzbank, Flask, Verzauberung ..." oninput="renderActivePanel()">
      </div>
    </section>

    <div class="rules-tabs" role="tablist">
      <button class="rules-tab active" type="button" data-tab="general" onclick="switchRulesTab('general')">Allgemein</button>
      <button class="rules-tab" type="button" data-tab="raids" onclick="switchRulesTab('raids')">Raids</button>
      <button class="rules-tab" type="button" data-tab="consumables" onclick="switchRulesTab('consumables')">Consumables</button>
      <button class="rules-tab" type="button" data-tab="enchants" onclick="switchRulesTab('enchants')">Verzauberungen</button>
    </div>

    <section id="panelGeneral" class="rules-panel active"></section>
    <section id="panelRaids" class="rules-panel"></section>
    <section id="panelConsumables" class="rules-panel"></section>
    <section id="panelEnchants" class="rules-panel"></section>

    <div id="rulesFooter" class="rules-footer">Raidregeln werden geladen.</div>
  </main>
</div>

<script>
let rulesData=null;
let activeTab="general";
let activeRaid="all";
let activeClass="all";

const generalLabels={
  prio:"Prio & Loot",
  invite:"Invite & Anmeldung",
  ersatzbank:"Ersatzbank",
  consumables:"Verbrauchsmaterial",
  verzauberungen:"Ausrüstung & Verzauberungen",
  leistung:"Leistung & Klassen",
  charakterwechsel:"Charakterwechsel",
  sonstiges:"Sonstiges"
};

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g, char => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[char]));
}

function getSearchTerm(){
  return document.getElementById("rulesSearch").value.trim().toLowerCase();
}

function matchesSearch(text){
  const term=getSearchTerm();
  if(!term) return true;
  return String(text || "").toLowerCase().includes(term);
}

function filteredRules(rules){
  const term=getSearchTerm();
  if(!term) return rules;
  return rules.filter(rule => matchesSearch(rule));
}

function switchRulesTab(tab){
  activeTab=tab;
  document.querySelectorAll(".rules-tab").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
  document.querySelectorAll(".rules-panel").forEach(panel => panel.classList.remove("active"));
  document.getElementById("panel" + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add("active");
  renderActivePanel();
}

function renderRuleCard(title,rules){
  const visible=filteredRules(rules);
  if(!visible.length) return "";
  return `
    <article class="rule-card">
      <h2>${escapeHtml(title)}</h2>
      <ul class="rule-list">
        ${visible.map(rule => `<li>${escapeHtml(rule)}</li>`).join("")}
      </ul>
    </article>
  `;
}

function renderGeneral(){
  const panel=document.getElementById("panelGeneral");
  const cards=Object.entries(generalLabels)
    .map(([key,label]) => renderRuleCard(label, rulesData.general[key] || []))
    .filter(Boolean);
  panel.innerHTML=cards.length ? `<div class="rules-grid">${cards.join("")}</div>` : `<div class="empty-state">Keine Regeln gefunden.</div>`;
}

function setRaidFilter(raidId){
  activeRaid=raidId;
  renderRaids();
}

function renderRaids(){
  const panel=document.getElementById("panelRaids");
  const filters=[
    `<button class="filter-btn ${activeRaid === "all" ? "active" : ""}" type="button" onclick="setRaidFilter('all')">Alle</button>`,
    ...rulesData.raids.map(raid => `<button class="filter-btn ${activeRaid === raid.id ? "active" : ""}" type="button" onclick="setRaidFilter('${escapeHtml(raid.id)}')">${escapeHtml(raid.name)}</button>`)
  ].join("");
  const cards=rulesData.raids
    .filter(raid => activeRaid === "all" || raid.id === activeRaid)
    .map(raid => renderRuleCard(raid.name, raid.rules))
    .filter(Boolean);
  panel.innerHTML=`
    <div class="raid-filter">${filters}</div>
    ${cards.length ? `<div class="rules-grid">${cards.join("")}</div>` : `<div class="empty-state">Keine Raidregeln gefunden.</div>`}
  `;
}

function allConsumableClasses(){
  const classes=new Set();
  rulesData.consumables.forEach(item => item.classes.forEach(cls => classes.add(cls)));
  return [...classes];
}

function setClassFilter(className){
  activeClass=className;
  renderActivePanel();
}

function renderClassFilters(classes){
  return [
    `<button class="filter-btn ${activeClass === "all" ? "active" : ""}" type="button" onclick="setClassFilter('all')">Alle</button>`,
    ...classes.map(cls => `<button class="filter-btn ${activeClass === cls ? "active" : ""}" type="button" onclick="setClassFilter('${escapeHtml(cls)}')">${escapeHtml(cls)}</button>`)
  ].join("");
}

function renderConsumables(){
  const panel=document.getElementById("panelConsumables");
  const classes=allConsumableClasses();
  const rows=rulesData.consumables.filter(item => {
    const classMatch=activeClass === "all" || item.classes.includes(activeClass);
    const searchText=[item.name,item.required ? "wichtig" : "",item.optional ? "optional" : "",...item.classes].join(" ");
    return classMatch && matchesSearch(searchText);
  });
  panel.innerHTML=`
    <div class="class-filter">${renderClassFilters(classes)}</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Item</th><th>Status</th><th>Klassen/Rollen</th></tr></thead>
        <tbody>
          ${rows.map(item => `
            <tr>
              <td>${escapeHtml(item.name)}</td>
              <td><span class="pill ${item.required ? "required" : "optional"}">${item.required ? "wichtig" : "optional"}</span></td>
              <td><div class="pill-row">${item.classes.map(cls => `<span class="pill">${escapeHtml(cls)}</span>`).join("")}</div></td>
            </tr>
          `).join("") || `<tr><td colspan="3">Keine Consumables gefunden.</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

function parseEnchantSlot(text){
  const idx=String(text).indexOf(":");
  if(idx === -1) return {slot:"Sonstiges", value:text};
  return {slot:text.slice(0,idx).trim(), value:text.slice(idx + 1).trim()};
}

function renderEnchants(){
  const panel=document.getElementById("panelEnchants");
  const classes=rulesData.enchantments.classes || [];
  const rows=[];
  rulesData.enchantments.rows.forEach(entryRow => {
    entryRow.forEach(entry => {
      if(activeClass !== "all" && entry.className !== activeClass) return;
      const parsed=parseEnchantSlot(entry.text);
      const searchText=[entry.className,parsed.slot,parsed.value].join(" ");
      if(!matchesSearch(searchText)) return;
      rows.push({className:entry.className,...parsed});
    });
  });
  panel.innerHTML=`
    <div class="class-filter">${renderClassFilters(classes)}</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Klasse/Rolle</th><th>Slot</th><th>Verzauberung</th></tr></thead>
        <tbody>
          ${rows.map(row => `
            <tr>
              <td><span class="pill">${escapeHtml(row.className)}</span></td>
              <td>${escapeHtml(row.slot)}</td>
              <td>${escapeHtml(row.value)}</td>
            </tr>
          `).join("") || `<tr><td colspan="3">Keine Verzauberungen gefunden.</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

function renderActivePanel(){
  if(!rulesData) return;
  if(activeTab === "general") renderGeneral();
  if(activeTab === "raids") renderRaids();
  if(activeTab === "consumables") renderConsumables();
  if(activeTab === "enchants") renderEnchants();
}

async function loadRules(){
  try{
    const response=await fetch("data/raidregeln.json?v=20260625");
    if(!response.ok) throw new Error("Regeln konnten nicht geladen werden.");
    rulesData=await response.json();
    renderGeneral();
    const updated=rulesData.updatedAt ? new Date(rulesData.updatedAt).toLocaleString("de-DE",{dateStyle:"medium",timeStyle:"short"}) : "unbekannt";
    document.getElementById("rulesFooter").textContent=`Quelle: ${rulesData.source || "CSV Export"} · Stand: ${updated}`;
  }catch(error){
    document.getElementById("panelGeneral").innerHTML='<div class="empty-state">Raidregeln konnten nicht geladen werden.</div>';
    document.getElementById("rulesFooter").textContent="Bitte später erneut laden.";
  }
}

loadRules();
</script>
</body>
</html>
