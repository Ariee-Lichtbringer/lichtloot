<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lichtbringer – Loot- und Raidregeln</title>

  <style>
    :root{
      --gold:#facc15;
      --bg:#08111f;
      --panel:rgba(12,18,32,.86);
      --panel-strong:rgba(15,23,42,.94);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --line:rgba(255,255,255,.11);
      --shadow:0 22px 55px rgba(0,0,0,.48);
    }

    *{ margin:0; padding:0; box-sizing:border-box; }

    body{
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(8,17,31,.82), rgba(8,17,31,.94)),
        url('https://cdn.discordapp.com/attachments/1470114311794987201/1505009929394851981/Screenshot_2026-03-04_231132.jpeg?ex=6a091138&is=6a07bfb8&hm=a1ec0a102aa2326db202409acb16c86f8cb9a702be6ef1507c8f420e0635c669');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:fixed;
    }

    .page{
      min-height:100vh;
      backdrop-filter:blur(3px);
      padding:28px 24px 70px;
    }

    .topbar{
      width:min(1100px,100%);
      margin:0 auto 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .back{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:0 18px;
      border-radius:999px;
      color:var(--gold);
      text-decoration:none;
      font-weight:900;
      background:rgba(12,18,32,.78);
      border:1px solid rgba(250,204,21,.25);
      box-shadow:0 10px 28px rgba(0,0,0,.35);
      transition:.18s ease;
    }

    .back:hover{
      transform:translateY(-2px);
      border-color:rgba(250,204,21,.55);
      background:rgba(250,204,21,.10);
    }

    .status-pill{
      padding:12px 16px;
      border-radius:999px;
      color:#dbeafe;
      font-size:13px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      background:rgba(12,18,32,.78);
      border:1px solid rgba(96,165,250,.22);
      box-shadow:0 10px 28px rgba(0,0,0,.28);
    }

    .hero{
      width:min(1100px,100%);
      margin:0 auto 24px;
      position:relative;
      overflow:hidden;
      border-radius:30px;
      border:1px solid rgba(250,204,21,.22);
      background:
        linear-gradient(120deg, rgba(8,17,31,.92), rgba(30,64,175,.28)),
        url('https://cdn.discordapp.com/attachments/1494701087763075222/1505571044684206192/loot.jpg?ex=6a0b1bcd&is=6a09ca4d&hm=9307058f220ca607f4cf99e3bedb04485d8923923585aa891ff210e21c1bad22');
      background-size:cover;
      background-position:center;
      box-shadow:var(--shadow);
    }

    .hero::after{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(8,17,31,.98), rgba(8,17,31,.42));
      pointer-events:none;
    }

    .hero-content{
      position:relative;
      z-index:2;
      padding:36px;
    }

    .eyebrow{
      display:inline-flex;
      padding:8px 12px;
      border-radius:999px;
      color:var(--gold);
      background:rgba(250,204,21,.12);
      border:1px solid rgba(250,204,21,.24);
      font-size:12px;
      font-weight:950;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:16px;
    }

    h1{
      font-size:clamp(34px,5vw,64px);
      line-height:1;
      font-weight:950;
      text-shadow:0 0 24px rgba(250,204,21,.25);
    }

    .hero-text{
      max-width:820px;
      margin-top:14px;
      color:#dbeafe;
      line-height:1.65;
      font-size:16px;
      font-weight:650;
    }

    .content{
      width:min(1100px,100%);
      margin:0 auto;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      padding:22px;
    }

    .search-box{
      margin-bottom:22px;
    }

    #ruleSearch{
      width:100%;
      padding:15px 18px;
      border-radius:18px;
      border:1px solid rgba(250,204,21,.34);
      background:rgba(8,17,31,.88);
      color:var(--text);
      font-size:16px;
      font-weight:850;
    }

    #ruleSearch:focus{
      outline:none;
      border-color:rgba(250,204,21,.78);
      box-shadow:0 0 0 3px rgba(250,204,21,.18);
    }

    .section{
      margin-bottom:18px;
      border-radius:22px;
      overflow:hidden;
      background:var(--panel-strong);
      border:1px solid rgba(255,255,255,.10);
    }

    .section:last-child{ margin-bottom:0; }

    .section-head{
      padding:17px 20px;
      background:linear-gradient(90deg, rgba(250,204,21,.20), rgba(96,165,250,.10));
      border-bottom:1px solid rgba(255,255,255,.10);
    }

    .section-head h2{
      color:var(--gold);
      font-size:22px;
      line-height:1.25;
      font-weight:950;
    }

    .rule-list{
      padding:18px;
      display:grid;
      gap:12px;
    }

    .rule-card{
      padding:15px 16px;
      border-radius:16px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      color:var(--muted);
      line-height:1.55;
      font-size:15px;
      font-weight:760;
      white-space:pre-wrap;
    }

    .rule-card.important{
      border-color:rgba(250,204,21,.28);
      background:rgba(250,204,21,.075);
    }

    .empty{
      padding:22px;
      border:1px dashed rgba(250,204,21,.32);
      border-radius:20px;
      color:var(--muted);
      background:rgba(250,204,21,.055);
      line-height:1.55;
      font-weight:800;
    }

    mark{
      background:rgba(250,204,21,.28);
      color:var(--text);
      border-radius:5px;
      padding:0 2px;
    }

    @media(max-width:700px){
      .page{ padding:18px 14px 50px; }
      .topbar{ flex-direction:column; align-items:stretch; }
      .hero-content{ padding:28px; }
      .content{ padding:16px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="topbar">
      <a class="back" href="index.html">← Zur Startseite</a>
      <div class="status-pill">Loot- und Raidregeln</div>
    </div>

    <section class="hero">
      <div class="hero-content">
        <span class="eyebrow">Lichtbringer · Regelwerk</span>
        <h1>Loot- und Raidregeln</h1>
        <p class="hero-text">
          Die wichtigsten Regeln für Raidteilnahme, P0/P0+, Lootvergabe und Vorbereitung.
          Die Inhalte werden beim Neuladen direkt aus dem Google Sheet übernommen.
        </p>
      </div>
    </section>

    <main class="content">
      <div class="search-box">
        <input id="ruleSearch" type="search" placeholder="Regeln durchsuchen …" />
      </div>

      <div id="rulesContent">
        <div class="empty">Lade Regeln aus dem Sheet …</div>
      </div>
    </main>
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1Fzc5PFcw0MYbPIOzHJprLqrccfhN7QaaeIG3bK67RS8/export?format=csv&gid=0";

    const CORE_KEYWORDS = [
      "prio", "p0", "p0+", "loot", "raid", "invite", "ersatzbank", "anmeldung",
      "verbrauch", "consum", "verzauber", "vz", "worldbuff", "buff", "vorbereitung",
      "main", "twink", "freigabe", "teilnahme", "raidbeginn", "discord"
    ];

    const SECTION_TITLES = {
      loot:"Loot & Prio-System",
      raid:"Raidteilnahme & Anmeldung",
      prep:"Vorbereitung: Buffs, Consumables & Verzauberungen",
      orga:"Organisation & Verhalten"
    };

    let allRules = [];

    const rulesContent = document.getElementById("rulesContent");
    const searchInput = document.getElementById("ruleSearch");

    function normalize(text){
      return String(text || "")
        .toLowerCase()
        .replace(/ä/g,"ae")
        .replace(/ö/g,"oe")
        .replace(/ü/g,"ue")
        .replace(/ß/g,"ss")
        .trim();
    }

    function escapeHTML(value){
      return String(value || "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    function highlight(text, query){
      const safe = escapeHTML(text);
      if(!query) return safe;
      const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return safe.replace(new RegExp(`(${escapedQuery})`, "gi"), "<mark>$1</mark>");
    }

    async function loadRules(){
      try{
        const separator = SHEET_CSV_URL.includes("?") ? "&" : "?";
        const response = await fetch(SHEET_CSV_URL + separator + "cachebust=" + Date.now());
        const csvText = await response.text();
        const rows = parseCSV(csvText);
        allRules = extractCoreRules(rows);
        renderRules();
      }catch(error){
        console.error("Fehler beim Laden der Regeln:", error);
        rulesContent.innerHTML = '<div class="empty">Die Regeln konnten nicht geladen werden. Bitte prüfe, ob das Google Sheet öffentlich lesbar ist.</div>';
      }
    }

    function parseCSV(text){
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let insideQuotes = false;
      const delimiter = detectDelimiter(text);

      for(let i=0;i<text.length;i++){
        const char = text[i];
        const nextChar = text[i+1];

        if(char === '"' && insideQuotes && nextChar === '"'){
          currentValue += '"';
          i++;
        }else if(char === '"'){
          insideQuotes = !insideQuotes;
        }else if(char === delimiter && !insideQuotes){
          currentRow.push(currentValue.trim());
          currentValue = "";
        }else if((char === "\n" || char === "\r") && !insideQuotes){
          if(currentValue || currentRow.length){
            currentRow.push(currentValue.trim());
            rows.push(currentRow);
          }
          currentRow = [];
          currentValue = "";
          if(char === "\r" && nextChar === "\n") i++;
        }else{
          currentValue += char;
        }
      }

      if(currentValue || currentRow.length){
        currentRow.push(currentValue.trim());
        rows.push(currentRow);
      }

      return rows;
    }

    function detectDelimiter(text){
      const firstLine = text.split(/\r?\n/)[0] || "";
      const commas = (firstLine.match(/,/g) || []).length;
      const semicolons = (firstLine.match(/;/g) || []).length;
      return semicolons > commas ? ";" : ",";
    }

    function flattenRows(rows){
      return rows
        .map(row => row.map(cell => String(cell || "").trim()).filter(Boolean))
        .filter(cells => cells.length)
        .map(cells => cells.join("\n"));
    }

    function extractCoreRules(rows){
      const lines = flattenRows(rows);
      const seen = new Set();

      return lines
        .map(line => line.replace(/\s+/g," ").trim())
        .filter(line => line.length > 20)
        .filter(line => CORE_KEYWORDS.some(keyword => normalize(line).includes(keyword)))
        .map(line => ({ text:line, group:getGroup(line), important:isImportant(line) }))
        .filter(rule => {
          const key = normalize(rule.text);
          if(seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .slice(0,40);
    }

    function getGroup(text){
      const n = normalize(text);
      if(n.includes("prio") || n.includes("loot") || n.includes("p0")) return "loot";
      if(n.includes("verbrauch") || n.includes("consum") || n.includes("verzauber") || n.includes("vz") || n.includes("buff")) return "prep";
      if(n.includes("invite") || n.includes("ersatzbank") || n.includes("anmeldung") || n.includes("raidbeginn") || n.includes("teilnahme")) return "raid";
      return "orga";
    }

    function isImportant(text){
      const n = normalize(text);
      return n.includes("30 minuten") || n.includes("p0") || n.includes("verzauber") || n.includes("verbrauch") || n.includes("invite") || n.includes("ersatzbank");
    }

    function renderRules(){
      const query = normalize(searchInput.value);
      const groups = { loot:[], raid:[], prep:[], orga:[] };

      allRules.forEach(rule => {
        const matches = !query || normalize(rule.text).includes(query);
        if(matches) groups[rule.group].push(rule);
      });

      const html = Object.entries(groups)
        .filter(([,rules]) => rules.length)
        .map(([group,rules]) => `
          <section class="section">
            <div class="section-head">
              <h2>${SECTION_TITLES[group]}</h2>
            </div>
            <div class="rule-list">
              ${rules.map(rule => `
                <article class="rule-card ${rule.important ? "important" : ""}">
                  ${highlight(rule.text, query)}
                </article>
              `).join("")}
            </div>
          </section>
        `).join("");

      rulesContent.innerHTML = html || '<div class="empty">Keine passenden Kerninformationen gefunden.</div>';
    }

    searchInput.addEventListener("input", renderRules);
    loadRules();
  </script>
</body>
</html>
